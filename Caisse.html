<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VisioPro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --c-bg: #F7F6F3;
    --c-surface: #FFFFFF;
    --c-surface2: #F0EEE9;
    --c-ink: #1A1916;
    --c-ink2: #6B6860;
    --c-ink3: #A8A69F;
    --c-border: #E3E1DB;
    --c-border2: #C8C5BC;
    --c-accent: #3D4FE0;
    --c-accent-lt: #EEF0FD;
    --c-accent-dk: #2534B8;
    --c-green: #1A8A5A;
    --c-green-lt: #E6F5EE;
    --c-red: #C43B3B;
    --c-red-lt: #FCEAEA;
    --c-amber: #B07020;
    --c-amber-lt: #FDF3E3;
    --shadow-sm: 0 1px 3px rgba(26,25,22,.06), 0 1px 2px rgba(26,25,22,.04);
    --shadow-md: 0 4px 12px rgba(26,25,22,.08), 0 2px 4px rgba(26,25,22,.04);
    --shadow-lg: 0 12px 32px rgba(26,25,22,.10), 0 4px 8px rgba(26,25,22,.06);
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 20px;
    --ease: cubic-bezier(.4,0,.2,1);
}

body {
    background: var(--c-bg);
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--c-ink);
    min-height: 100vh;
    padding-bottom: 80px;
    -webkit-font-smoothing: antialiased;
}

@keyframes fadeUp { 
    from { opacity: 0; transform: translateY(8px); } 
    to { opacity: 1; transform: translateY(0); } 
}

@keyframes toastIn { 
    from { opacity: 0; transform: translateX(16px); } 
    to { opacity: 1; transform: translateX(0); } 
}

@keyframes spin { 
    to { transform: rotate(360deg); } 
}

@keyframes btnPulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(61,79,224,0.7); }
    70% { transform: scale(0.98); box-shadow: 0 0 0 10px rgba(61,79,224,0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(61,79,224,0); }
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: scale(0.9) translateY(-20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes ripple { 
    to { transform: scale(4); opacity: 0; } 
}

.shell { 
    max-width: 1800px; 
    margin: 0 auto; 
    padding: 1.25rem 1.25rem 0; 
    animation: fadeUp .4s var(--ease) both; 
}

.topbar {
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    background: var(--c-surface); 
    border: 1px solid var(--c-border);
    border-radius: var(--r-xl); 
    padding: .75rem 1.25rem;
    margin-bottom: 1.25rem; 
    box-shadow: var(--shadow-sm);
}

.topbar-brand { 
    display: flex; 
    align-items: center; 
    gap: .75rem; 
}

.brand-mark { 
    width: 36px; 
    height: 36px; 
    background: var(--c-accent); 
    border-radius: var(--r-md); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: #fff; 
    font-size: .85rem; 
}
.brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.brand-name { 
    font-size: 1.05rem; 
    font-weight: 600; 
    letter-spacing: -.02em; 
    color: var(--c-ink); 
}

.brand-name span { 
    color: var(--c-accent); 
}

.topbar-right { 
    display: flex; 
    align-items: center; 
    gap: .75rem; 
}

.topbar-date { 
    font-size: .8rem; 
    color: var(--c-ink3); 
    font-variant-numeric: tabular-nums; 
}

.avatar { 
    width: 34px; 
    height: 34px; 
    border-radius: 50%; 
    border: 2px solid var(--c-border); 
    object-fit: cover; 
}

.main { 
    display: flex; 
    gap: 1.25rem; 
}

.sidebar { 
    flex: 0 0 200px; 
    display: flex; 
    flex-direction: column; 
    gap: .5rem; 
}

.sidebar-label { 
    font-size: .7rem; 
    font-weight: 600; 
    letter-spacing: .08em; 
    text-transform: uppercase; 
    color: var(--c-ink3); 
    padding: .25rem .75rem; 
    margin-bottom: .25rem; 
}

.nav-item {
    display: flex; 
    align-items: center; 
    gap: .65rem; 
    padding: .65rem .9rem;
    border-radius: var(--r-md); 
    border: 1px solid transparent; 
    background: transparent;
    color: var(--c-ink2); 
    font-family: inherit; 
    font-size: .88rem; 
    font-weight: 500;
    cursor: pointer; 
    transition: all .2s var(--ease); 
    width: 100%; 
    text-align: left;
}

.nav-item:hover { 
    background: var(--c-surface2); 
    color: var(--c-ink); 
}

.nav-item.active { 
    background: var(--c-accent-lt); 
    color: var(--c-accent); 
    border-color: rgba(61,79,224,.12); 
}

.content { 
    flex: 1; 
    min-width: 0; 
}

.section { 
    display: none; 
    animation: fadeUp .35s var(--ease) both; 
}

.section.active { 
    display: block; 
}

.section-head { 
    display: flex; 
    align-items: flex-start; 
    justify-content: space-between; 
    gap: 1rem; 
    margin-bottom: 1.25rem; 
    flex-wrap: wrap; 
}

.section-title { 
    font-size: 1.25rem; 
    font-weight: 600; 
    letter-spacing: -.025em; 
    color: var(--c-ink); 
    margin-bottom: .2rem; 
}

.section-sub { 
    font-size: .82rem; 
    color: var(--c-ink3); 
}

.section-actions { 
    display: flex; 
    gap: .5rem; 
    align-items: center; 
}

.btn { 
    display: inline-flex; 
    align-items: center; 
    gap: .4rem; 
    padding: .55rem 1rem; 
    border-radius: var(--r-md); 
    font-family: inherit; 
    font-size: .83rem; 
    font-weight: 500; 
    border: 1px solid transparent; 
    cursor: pointer; 
    transition: all .15s var(--ease); 
    white-space: nowrap; 
    position: relative; 
    overflow: hidden; 
}

.btn-ghost { 
    background: var(--c-surface); 
    color: var(--c-ink2); 
    border-color: var(--c-border); 
}

.btn-ghost:hover { 
    background: var(--c-surface2); 
    color: var(--c-ink); 
    border-color: var(--c-border2); 
    transform: translateY(-1px); 
}

.btn-accent { 
    background: var(--c-accent); 
    color: #fff; 
    border-color: var(--c-accent); 
}

.btn-accent:hover { 
    background: var(--c-accent-dk); 
    transform: translateY(-1px); 
    box-shadow: 0 4px 12px rgba(61,79,224,.35); 
}

.btn-accent:active { 
    transform: scale(0.96); 
}

.btn-accent .ripple { 
    position: absolute; 
    border-radius: 50%; 
    background-color: rgba(255,255,255,0.6); 
    transform: scale(0); 
    animation: ripple 0.6s linear; 
    pointer-events: none; 
}

.btn-accent.btn-clicked { 
    animation: btnPulse 0.4s ease-out; 
}

.btn-accent::before { 
    content: ''; 
    position: absolute; 
    top: 0; 
    left: -100%; 
    width: 100%; 
    height: 100%; 
    background: linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent); 
    transition: left .5s; 
}

.btn-accent:hover::before { 
    left: 100%; 
}

.kpi-grid { 
    display: grid; 
    grid-template-columns: repeat(4,1fr); 
    gap: .75rem; 
    margin-bottom: 1.25rem; 
}

.kpi-card { 
    background: var(--c-surface); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-lg); 
    padding: 1rem 1.1rem; 
    box-shadow: var(--shadow-sm); 
    transition: all .2s var(--ease); 
}

.kpi-card:hover { 
    transform: translateY(-2px); 
    box-shadow: var(--shadow-md); 
}

.kpi-label { 
    font-size: .75rem; 
    font-weight: 500; 
    color: var(--c-ink3); 
    letter-spacing: .02em; 
    text-transform: uppercase; 
    margin-bottom: .6rem; 
    display: flex; 
    align-items: center; 
    gap: .4rem; 
}

.kpi-icon { 
    width: 22px; 
    height: 22px; 
    border-radius: 6px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: .65rem; 
}

.kpi-value { 
    font-family: 'DM Mono', monospace; 
    font-size: 1.35rem; 
    font-weight: 500; 
    letter-spacing: -.02em; 
    color: var(--c-ink); 
    line-height: 1; 
    margin-bottom: .25rem; 
}

.kpi-unit { 
    font-size: .72rem; 
    color: var(--c-ink3); 
    margin-left: .2rem; 
    font-family: 'DM Sans', sans-serif; 
}

/* ── TOOLBAR AVEC FILTRES ── */
.toolbar {
    background: var(--c-surface); 
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg); 
    padding: .65rem .85rem;
    margin-bottom: .75rem; 
    display: flex; 
    gap: .6rem;
    align-items: center; 
    box-shadow: var(--shadow-sm); 
    flex-wrap: wrap;
}

.search-wrap { 
    flex: 1; 
    min-width: 180px; 
    position: relative; 
}

.search-wrap i { 
    position: absolute; 
    left: .75rem; 
    top: 50%; 
    transform: translateY(-50%); 
    color: var(--c-ink3); 
    font-size: .78rem; 
    pointer-events: none; 
}

.search-input { 
    width: 100%; 
    padding: .5rem .8rem .5rem 2.1rem; 
    background: var(--c-bg); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-md); 
    font-family: inherit; 
    font-size: .85rem; 
    color: var(--c-ink); 
    transition: all .15s; 
    outline: none; 
}

.search-input:focus { 
    border-color: var(--c-accent); 
    box-shadow: 0 0 0 3px rgba(61,79,224,.1); 
}

.search-input::placeholder { 
    color: var(--c-ink3); 
}

.filters-row { 
    display: flex; 
    gap: .4rem; 
    align-items: center; 
    flex-wrap: wrap; 
}

/* chip */
.filter-chip {
    display: flex; 
    align-items: center; 
    gap: .3rem;
    padding: 0 .1rem 0 .6rem; 
    height: 30px;
    background: var(--c-surface2); 
    border: 1px solid var(--c-border);
    border-radius: 999px; 
    font-family: inherit; 
    font-size: .78rem;
    color: var(--c-ink2); 
    cursor: pointer;
    transition: border-color .12s, background .12s, color .12s;
    white-space: nowrap; 
    position: relative; 
    user-select: none;
}

.filter-chip:hover { 
    border-color: var(--c-border2); 
    background: var(--c-surface); 
    color: var(--c-ink); 
}

.filter-chip.active { 
    background: var(--c-accent-lt); 
    border-color: rgba(61,79,224,.25); 
    color: var(--c-accent); 
}

.chip-label { 
    font-weight: 500; 
}

.chip-val { 
    font-weight: 600; 
    font-size: .76rem; 
    max-width: 72px; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    display: none; 
}

.filter-chip.active .chip-val { 
    display: inline; 
}

.chip-caret { 
    width: 22px; 
    height: 22px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border-radius: 999px; 
    margin-right: 2px; 
    flex-shrink: 0; 
    font-size: .65rem; 
    color: var(--c-ink3); 
}

.filter-chip.active .chip-caret { 
    color: var(--c-accent); 
}

/* dropdown */
.chip-drop {
    position: absolute; 
    top: calc(100% + 6px); 
    left: 0; 
    min-width: 170px;
    background: var(--c-surface); 
    border: 1px solid var(--c-border);
    border-radius: var(--r-lg); 
    padding: .3rem;
    z-index: 200; 
    display: none;
    box-shadow: 0 6px 20px rgba(26,25,22,.1);
}

.chip-drop.open { 
    display: block; 
    animation: fadeUp .15s var(--ease) both; 
}

.drop-item {
    display: flex; 
    align-items: center; 
    gap: .5rem; 
    padding: .42rem .65rem;
    border-radius: var(--r-md); 
    font-size: .82rem; 
    cursor: pointer;
    color: var(--c-ink); 
    transition: background .1s;
}

.drop-item:hover { 
    background: var(--c-surface2); 
}

.drop-item.sel { 
    background: var(--c-accent-lt); 
    color: var(--c-accent); 
    font-weight: 500; 
}

.drop-item .di-check { 
    margin-left: auto; 
    font-size: .7rem; 
    display: none; 
}

.drop-item.sel .di-check { 
    display: inline; 
}

.drop-sep { 
    height: 1px; 
    background: var(--c-border); 
    margin: .25rem .2rem; 
}

/* date dropdown */
.drop-date-body { 
    padding: .4rem .5rem .5rem; 
    display: flex; 
    flex-direction: column; 
    gap: .35rem; 
    min-width: 190px; 
}

.drop-date-body label { 
    font-size: .72rem; 
    font-weight: 500; 
    color: var(--c-ink2); 
}

.drop-date-body input[type=date] { 
    width: 100%; 
    padding: .35rem .6rem; 
    background: var(--c-bg); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-sm); 
    font-family: inherit; 
    font-size: .8rem; 
    color: var(--c-ink); 
    outline: none; 
}

.drop-date-body input[type=date]:focus { 
    border-color: var(--c-accent); 
}

.drop-date-clear { 
    margin-top: .15rem; 
    padding: .32rem .65rem; 
    background: transparent; 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-sm); 
    font-family: inherit; 
    font-size: .75rem; 
    color: var(--c-ink3); 
    cursor: pointer; 
    transition: all .12s; 
}

.drop-date-clear:hover { 
    border-color: var(--c-red); 
    color: var(--c-red); 
}

.clear-all-btn { 
    background: none; 
    border: none; 
    cursor: pointer; 
    font-family: inherit; 
    font-size: .75rem; 
    color: var(--c-ink3); 
    padding: .28rem .5rem; 
    border-radius: var(--r-sm); 
    transition: color .12s; 
    display: none; 
    white-space: nowrap; 
}

.clear-all-btn:hover { 
    color: var(--c-red); 
}

.clear-all-btn.visible { 
    display: inline-flex; 
    align-items: center; 
    gap: .3rem; 
}

.result-count { 
    font-size: .79rem; 
    color: var(--c-ink3); 
    white-space: nowrap; 
    margin-left: auto; 
}
/* ── FIN TOOLBAR ── */

.table-card { 
    background: var(--c-surface); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-lg); 
    overflow: hidden; 
    box-shadow: var(--shadow-sm); 
}

.table-scroll { 
    max-height: 420px; 
    overflow-y: auto; 
    overflow-x: auto; 
}

.table-scroll::-webkit-scrollbar { 
    width: 6px; 
    height: 6px; 
}

.table-scroll::-webkit-scrollbar-track { 
    background: transparent; 
}

.table-scroll::-webkit-scrollbar-thumb { 
    background: var(--c-border2); 
    border-radius: 3px; 
}

.data-table { 
    width: 100%; 
    border-collapse: collapse; 
    min-width: 580px; 
}

.data-table thead { 
    position: sticky; 
    top: 0; 
    z-index: 10; 
}

.data-table th { 
    background: var(--c-surface2); 
    padding: .65rem .85rem; 
    text-align: left; 
    font-size: .75rem; 
    font-weight: 600; 
    color: var(--c-ink2); 
    letter-spacing: .04em; 
    text-transform: uppercase; 
    border-bottom: 1px solid var(--c-border); 
}

.data-table tbody tr { 
    border-bottom: 1px solid var(--c-border); 
    transition: background .12s; 
}

.data-table tbody tr:hover { 
    background: var(--c-accent-lt); 
}

.data-table td { 
    padding: .7rem .85rem; 
    font-size: .84rem; 
    color: var(--c-ink); 
    vertical-align: middle; 
}

.td-date { 
    font-family: 'DM Mono', monospace; 
    font-size: .78rem; 
    color: var(--c-ink2); 
}

.td-amount { 
    font-family: 'DM Mono', monospace; 
    font-weight: 500; 
}

.badge { 
    display: inline-flex; 
    align-items: center; 
    gap: .3rem; 
    padding: .22rem .6rem; 
    border-radius: 999px; 
    font-size: .73rem; 
    font-weight: 600; 
}

.badge-entree { 
    background: var(--c-green-lt); 
    color: var(--c-green); 
}

.badge-sortie { 
    background: var(--c-red-lt); 
    color: var(--c-red); 
}

.cat-pill { 
    display: inline-block; 
    padding: .18rem .55rem; 
    border-radius: var(--r-sm); 
    font-size: .73rem; 
    background: var(--c-surface2); 
    color: var(--c-ink2); 
}

.empty-state { 
    padding: 3rem 1rem; 
    text-align: center; 
    color: var(--c-ink3); 
}

.empty-state i { 
    font-size: 1.8rem; 
    margin-bottom: .75rem; 
    display: block; 
    opacity: .4; 
}

.modal-overlay { 
    position: fixed; 
    inset: 0; 
    background: rgba(26,25,22,.75); 
    backdrop-filter: blur(4px); 
    display: none; 
    align-items: center; 
    justify-content: center; 
    z-index: 2000; 
    padding: 1rem; 
}

.modal-overlay.active { 
    display: flex; 
}

.modal { 
    background: var(--c-surface); 
    border-radius: var(--r-xl); 
    box-shadow: var(--shadow-lg); 
    width: 100%; 
    max-width: 460px; 
    overflow: hidden; 
    animation: modalSlideIn .3s var(--ease); 
}

.modal-head { 
    padding: 1.25rem 1.5rem 1rem; 
    border-bottom: 1px solid var(--c-border); 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

.modal-head-title { 
    font-size: 1rem; 
    font-weight: 600; 
}

.modal-close { 
    width: 28px; 
    height: 28px; 
    border-radius: var(--r-sm); 
    border: 1px solid var(--c-border); 
    background: transparent; 
    color: var(--c-ink2); 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all .15s; 
}

.modal-close:hover { 
    background: var(--c-surface2); 
    transform: rotate(90deg); 
}

.modal-body { 
    padding: 1.25rem 1.5rem; 
    max-height: 60vh; 
    overflow-y: auto; 
}

.modal-foot { 
    padding: 1rem 1.5rem; 
    border-top: 1px solid var(--c-border); 
    display: flex; 
    justify-content: flex-end; 
    gap: .5rem; 
}

.form-group { 
    margin-bottom: 1rem; 
}

.form-label { 
    display: block; 
    font-size: .8rem; 
    font-weight: 500; 
    color: var(--c-ink2); 
    margin-bottom: .35rem; 
}

.form-control { 
    width: 100%; 
    padding: .6rem .85rem; 
    background: var(--c-bg); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-md); 
    font-family: inherit; 
    font-size: .88rem; 
    color: var(--c-ink); 
    outline: none; 
    transition: all .15s; 
}

.form-control:focus { 
    border-color: var(--c-accent); 
    box-shadow: 0 0 0 3px rgba(61,79,224,.1); 
    background: var(--c-surface); 
}

.form-control[readonly] { 
    background: var(--c-surface2); 
    cursor: not-allowed; 
}

.toast-zone { 
    position: fixed; 
    top: 1rem; 
    right: 1rem; 
    z-index: 9999; 
    display: flex; 
    flex-direction: column; 
    gap: .5rem; 
    pointer-events: none; 
}

.toast { 
    display: flex; 
    align-items: center; 
    gap: .65rem; 
    padding: .75rem 1rem; 
    background: var(--c-surface); 
    border: 1px solid var(--c-border); 
    border-radius: var(--r-lg); 
    box-shadow: var(--shadow-md); 
    font-size: .85rem; 
    font-weight: 500; 
    max-width: 320px; 
    animation: toastIn .3s var(--ease) both; 
    pointer-events: auto; 
}

.toast-icon { 
    width: 28px; 
    height: 28px; 
    border-radius: var(--r-sm); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: .8rem; 
    flex-shrink: 0; 
}

.toast.success .toast-icon { 
    background: var(--c-green-lt); 
    color: var(--c-green); 
}

.toast.error .toast-icon { 
    background: var(--c-red-lt); 
    color: var(--c-red); 
}

.toast-msg { 
    flex: 1; 
    color: var(--c-ink); 
}

.toast-dismiss { 
    background: none; 
    border: none; 
    color: var(--c-ink3); 
    cursor: pointer; 
    font-size: 1.1rem; 
    padding: .1rem .25rem; 
}

.mobile-nav { 
    display: none; 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    background: var(--c-surface); 
    border-top: 1px solid var(--c-border); 
    z-index: 1000; 
    padding: .5rem 1rem env(safe-area-inset-bottom,.5rem); 
    justify-content: space-around; 
    box-shadow: 0 -4px 20px rgba(26,25,22,.06); 
}

.mob-item { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: .2rem; 
    background: none; 
    border: none; 
    color: var(--c-ink3); 
    font-family: inherit; 
    font-size: .65rem;

</div>

<nav class="mobile-nav" id="mobile-nav"></nav>
<div id="modal-container"></div>
<script>
    // ═══════════════════════════════════════════════════════════════
    // FONCTIONS D'AUTHENTIFICATION ET DE SESSION
    // ═══════════════════════════════════════════════════════════════
    
    let inactivityTimer;
    
    function redirectToLogin() { 
        //window.location.href = "code.html"; 
    }
    
    // Gestion du token API
function getApiToken() {
    // Chercher d'abord avec les différentes clés possibles
    return sessionStorage.getItem("apiToken") || 
           sessionStorage.getItem("token") || 
           localStorage.getItem("apiToken") || 
           localStorage.getItem("token");
}
    
function saveApiToken(token) {
    // Sauvegarder avec la clé attendue par code.html
    sessionStorage.setItem("apiToken", token);
    localStorage.setItem("apiToken", token);
}
    
function clearApiToken() {
    sessionStorage.removeItem("apiToken");
    localStorage.removeItem("apiToken");
    sessionStorage.removeItem("utilisateur");
    localStorage.removeItem("utilisateur");
}
    
    // Fonction utilitaire pour tous les appels API GET
    async function apiFetch(action, params = {}) {
        const token = getApiToken();
        if (!token) {
            console.error("❌ Token manquant");
            redirectToLogin();
            throw new Error("Token manquant");
        }
        
        let url = `${API_BASE_URL}?action=${action}&token=${encodeURIComponent(token)}`;
        
        // Ajout des paramètres supplémentaires
        for (const [key, value] of Object.entries(params)) {
            if (value !== undefined && value !== null && value !== '') {
                url += `&${key}=${encodeURIComponent(value)}`;
            }
        }
        
        // Ajout du timestamp anti-cache
        url += `&_=${Date.now()}`;
        
        const response = await fetch(url);
        return await response.json();
    }
    
    // Démarrer le timer d'inactivité (30 minutes)
    function startInactivityTimer() {
        const LIMIT = 30 * 60 * 1000; // 30 minutes
        
        function reset() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                sessionStorage.removeItem("utilisateur"); 
                localStorage.removeItem("utilisateur");
                clearApiToken();
                redirectToLogin();
            }, LIMIT);
        }
        
        ["load", "mousemove", "keydown", "click", "scroll"].forEach(e => window.addEventListener(e, reset, true));
        reset();
    }
    
    // Vérification de session au chargement
function checkSession() {
    const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");
    const token = getApiToken();  // Maintenant cherche 'apiToken'
    
    console.log("=== CHECK SESSION Caisse.html ===");
    console.log("Username:", username);
    console.log("Token présent:", token ? "OUI" : "NON");
    console.log("hasCaisseAccess:", sessionStorage.getItem("hasCaisseAccess"));
    
    if (!username || !token) {
        console.log("❌ Session invalide - Redirection");
        //window.location.href = "code.html";
        return false;
    }
    return true;
}
    
    // Afficher les infos utilisateur dans l'interface
    function displayUserInfo() {
        const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur") || "Utilisateur";
        const userAvatar = document.getElementById('user-avatar');
        const userNameSpan = document.getElementById('topbar-username');
        
        if (userNameSpan) userNameSpan.textContent = username;
        if (userAvatar) {
            userAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=3D4FE0&color=fff&size=64`;
        }
    }
    
    // Vérifier les droits d'accès (caisse)
    function hasCaisseAccess() {
        const hasAccess = sessionStorage.getItem("hasCaisseAccess") === "true";
        if (!hasAccess) {
            showToast("⛔ Accès refusé - Droits caisse requis", "error");
            return false;
        }
        return true;
    }
    
    // Fonction de connexion
    async function performLogin(username, password) {
        try {
            const response = await fetch(`${API_BASE_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&_=${Date.now()}`);
            const result = await response.json();
            
            if (result.success && result.data?.token) {
                saveApiToken(result.data.token);
                sessionStorage.setItem("utilisateur", username);
                sessionStorage.setItem("isAdmin", result.data.isAdmin || false);
                sessionStorage.setItem("hasCaisseAccess", result.data.hasCaisseAccess || false);
                sessionStorage.setItem("agence", result.data.agence || "");
                return true;
            } else {
                showToast(result.message || "Échec de connexion", "error");
                return false;
            }
        } catch (err) {
            showToast("Erreur de connexion: " + err.message, "error");
            return false;
        }
    }
    
    // ═══════════════════════════════════════════════════════════════
    // CONFIGURATION ET VARIABLES GLOBALES
    // ═══════════════════════════════════════════════════════════════

    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec';

    let caisses = [];
    let caisseData = {};
    let currentCaisse = null;

    // État des filtres par caisse : { mouv, cat, user, dateFrom, dateTo }
    let activeFilters = {};
    let openDropId = null;

    /* ══════════════ UTILITAIRES ══════════════ */

    function getCurrentYearMonth() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    }

    function isCurrentMonth(dateStr) {
        if (!dateStr) return false;
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return false;
            const cy = getCurrentYearMonth();
            const iy = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            return cy === iy;
        } catch { return false; }
    }

    function getCaisseBalance(caisseId) {
        return (caisseData[caisseId]?.allData || []).reduce((b, item) => {
            if (item.mouvement === 'Entrée') return b + item.montant;
            if (item.mouvement === 'Sortie') return b - item.montant;
            return b;
        }, 0);
    }

    function formatDate(dateString) {
        if (!dateString) return '—';
        try { return new Date(dateString).toLocaleDateString('fr-FR'); }
        catch { return dateString; }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function showToast(msg, type) {
        const zone = document.getElementById('toast-zone');
        const id = 'toast-' + Date.now();
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.id = id;
        el.innerHTML = `
            <div class="toast-icon"><i class="fas fa-${type==='success'?'check-circle':'exclamation-triangle'}"></i></div>
            <span class="toast-msg">${escapeHtml(msg)}</span>
            <button class="toast-dismiss" onclick="document.getElementById('${id}').remove()">✕</button>`;
        zone.appendChild(el);
        setTimeout(() => { if (document.getElementById(id)) el.remove(); }, 4000);
    }

    function setCurrentDate() {
        const el = document.getElementById('current-date');
        if (el) el.textContent = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    }

    function createRipple(event, element) {
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = element.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.cssText = `width:${size}px;height:${size}px;left:${event.clientX-rect.left-size/2}px;top:${event.clientY-rect.top-size/2}px`;
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    }

    /* ══════════════ API ══════════════ */

    async function loadCaisses() {
        try {
            const result = await apiFetch('getdataagence');
            
            console.log("=== DEBUG API ===");
            console.log("Success:", result.success);
            console.log("Message:", result.message);
            
            if (result.success && result.data?.caisses?.length > 0) {
                caisses = result.data.caisses.map(c => ({
                    id: c.value, 
                    name: c.label, 
                    label: c.label, 
                    value: c.value,
                    code: c.code,
                    endpoint: c.getAgenceSheetName,
                    icon: c.icon,
                    color: c.color,
                    key: c.key,
                    identifiant: c.identifiant,
                    nomAffichage: c.nomAffichage,
                    mouvementsBancaires: c.mouvementsBancaires
                }));
                console.log("✅ Caisses chargées:", caisses.length);
                return true;
            } else {
                console.error("❌ Aucune caisse - Raison:", result.message);
                showToast(result.message || 'Aucune caisse trouvée', 'error');
                return false;
            }
        } catch (err) {
            console.error('Erreur chargement agences:', err);
            showToast('Erreur de connexion à l\'API: ' + err.message, 'error');
            return false;
        }
    }

    async function loadCaisseData(caisseId) {
        const caisse = caisses.find(c => c.id === caisseId);
        if (!caisse?.endpoint) return false;
        try {
            const result = await apiFetch(caisse.endpoint);
            
            if (result?.data?.rows && Array.isArray(result.data.rows)) {
                caisseData[caisseId] = {
                    allData: result.data.rows.map(row => ({
                        date: row[0] || '', designation: row[1] || '',
                        montant: parseFloat(row[2]) || 0, mouvement: row[3] || '',
                        user: row[4] || '', agence: caisse.name,
                        categorie: row[6] || '', note: row[7] || ''
                    })),
                    filteredData: []
                };
                caisseData[caisseId].filteredData = [...caisseData[caisseId].allData];
                return true;
            }
            caisseData[caisseId] = { allData: [], filteredData: [] };
            return false;
        } catch (err) {
            console.error(`Erreur chargement ${caisse.name}:`, err);
            caisseData[caisseId] = { allData: [], filteredData: [] };
            return false;
        }
    }

    async function loadAllCaisseData() {
        for (let c of caisses) {
            await loadCaisseData(c.id);
        }
    }

    /* ══════════════ CONSTRUCTION UI ══════════════ */

    function buildUI() { buildSideNav(); buildMobileNav(); buildSections(); }

        const c = document.getElementById('nav-buttons');
        if (!c) return;
        c.innerHTML = caisses.map((c,i) =>
            `<button id="nav-btn-${c.id}" class="nav-item ${i===0?'active':''}" onclick="showSection('${c.id}')">
                <i class="fas ${c.icon}"></i><span>${escapeHtml(c.name)}</span>
            </button>`).join('');
    }

    function buildMobileNav() {

            `<button id="mobile-nav-${c.id}" class="mob-item ${i===0?'active':''}" onclick="showSection('${c.id}')">

        if (!container) return;
        container.innerHTML = caisses.map((c,i) => `

                        </div>
                        <div class="kpi-value" id="entrees-${c.id}">—<span class="kpi-unit">FCFA</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">
                            <span class="kpi-icon" style="background:var(--c-red-lt);color:var(--c-red)"><i class="fas fa-arrow-up-long"></i></span>Sorties (mois)
                        </div>
                        <div class="kpi-value" id="sorties-${c.id}">—<span class="kpi-unit">FCFA</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">
                            <span class="kpi-icon" style="background:var(--c-amber-lt);color:var(--c-amber)"><i class="fas fa-list-check"></i></span>Opérations (mois)
                        </div>
                        <div class="kpi-value" id="operations-${c.id}">—</div>
                    </div>
                </div>

                <!-- TOOLBAR AVEC CHIPS DE FILTRES -->
                <div class="toolbar" id="toolbar-${c.id}">
                    <div class="search-wrap">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" id="search-${c.id}" class="search-input"
                               placeholder="Rechercher une désignation…"
                               oninput="applyFilter('${c.id}')">
                    </div>

                    <div class="filters-row" id="filters-row-${c.id}">
                        <!-- Mouvement -->
                        <div class="filter-chip" id="chip-mouv-${c.id}" onclick="toggleDrop('mouv','${c.id}',event)">
                            <i class="fas fa-right-left" style="font-size:.72rem;opacity:.7"></i>
                            <span class="chip-label">Mouvement</span>
                            <span class="chip-val" id="chipval-mouv-${c.id}"></span>
                            <span class="chip-caret"><i class="fas fa-chevron-down" style="font-size:.62rem"></i></span>
                            <div class="chip-drop" id="drop-mouv-${c.id}" onclick="event.stopPropagation()">
                                <div class="drop-item sel" data-v="" onclick="setFilter('mouv','${c.id}','',event)">Tous<i class="fas fa-check di-check"></i></div>
                                <div class="drop-sep"></div>
                                <div class="drop-item" data-v="Entrée" onclick="setFilter('mouv','${c.id}','Entrée',event)">Entrée<i class="fas fa-check di-check"></i></div>
                                <div class="drop-item" data-v="Sortie" onclick="setFilter('mouv','${c.id}','Sortie',event)">Sortie<i class="fas fa-check di-check"></i></div>

                        <!-- Catégorie -->
                        <div class="filter-chip" id="chip-cat-${c.id}" onclick="toggleDrop('cat','${c.id}',event)">

                            <span class="chip-val" id="chipval-cat-${c.id}"></span>
                            <span class="chip-caret"><i class="fas fa-chevron-down" style="font-size:.62rem"></i></span>
                            <div class="chip-drop" id="drop-cat-${c.id}" onclick="event.stopPropagation()" style="min-width:190px">

        // Init filtres vides pour chaque caisse
        caisses.forEach(c => {
            activeFilters[c.id] = { mouv:'', cat:'', user:'', dateFrom:'', dateTo:'' };
        });
    }

    /* ══════════════ LOGIQUE FILTRES ══════════════ */

    function toggleDrop(key, caisseId, event) {
        event.stopPropagation();
        const dropId = `drop-${key}-${caisseId}`;
        const drop = document.getElementById(dropId);
        const isOpen = drop.classList.contains('open');

        // Ferme tout dropdown ouvert
        if (openDropId) {
            const prev = document.getElementById(openDropId);
            if (prev) prev.classList.remove('open');
        }

        if (!isOpen) {
            drop.classList.add('open');
            openDropId = dropId;
        } else {
            openDropId = null;
        }
    }

    document.addEventListener('click', () => {
        if (openDropId) {
            const drop = document.getElementById(openDropId);
            if (drop) drop.classList.remove('open');
            openDropId = null;
        }
    });

    function setFilter(key, caisseId, val, event) {
        event.stopPropagation();
        activeFilters[caisseId][key] = val;

        // Mise à jour items dropdown
        const drop = document.getElementById(`drop-${key}-${caisseId}`);
        drop.querySelectorAll('.drop-item').forEach(item => {
            item.classList.toggle('sel', item.dataset.v === val);
        });

        // Mise à jour chip
        const chip = document.getElementById(`chip-${key}-${caisseId}`);
        const valEl = document.getElementById(`chipval-${key}-${caisseId}`);
        if (val) {
            chip.classList.add('active');
            valEl.textContent = ' : ' + val;
        } else {
            chip.classList.remove('active');
            valEl.textContent = '';
        }

        // Ferme le dropdown
        drop.classList.remove('open');
        openDropId = null;

        applyFilter(caisseId);
    }

    function clearDate(caisseId) {
        document.getElementById(`datefrom-${caisseId}`).value = '';
        document.getElementById(`dateto-${caisseId}`).value = '';
        applyFilter(caisseId);
    }

    function clearAllFilters(caisseId) {
        document.getElementById(`search-${caisseId}`).value = '';
        document.getElementById(`datefrom-${caisseId}`).value = '';
        document.getElementById(`dateto-${caisseId}`).value = '';
        activeFilters[caisseId] = { mouv:'', cat:'', user:'', dateFrom:'', dateTo:'' };

        ['mouv','cat','user'].forEach(key => {
            const chip = document.getElementById(`chip-${key}-${caisseId}`);
            const valEl = document.getElementById(`chipval-${key}-${caisseId}`);
            if (chip) chip.classList.remove('active');
            if (valEl) valEl.textContent = '';
            const drop = document.getElementById(`drop-${key}-${caisseId}`);
            if (drop) drop.querySelectorAll('.drop-item').forEach(item => item.classList.toggle('sel', item.dataset.v === ''));
        });

        updateDateChip(caisseId);
        applyFilter(caisseId);
    }

    function updateDateChip(caisseId) {
        const from = document.getElementById(`datefrom-${caisseId}`)?.value || '';
        const to   = document.getElementById(`dateto-${caisseId}`)?.value || '';
        const chip = document.getElementById(`chip-date-${caisseId}`);
        const valEl = document.getElementById(`chipval-date-${caisseId}`);
        if (from || to) {
            chip.classList.add('active');
            const parts = [];
            if (from) parts.push(formatDate(from));
            if (to)   parts.push(formatDate(to));
            valEl.textContent = ' : ' + parts.join(' → ');
        } else {
            chip.classList.remove('active');
            valEl.textContent = '';
        }
    }

    function updateClearAllBtn(caisseId) {
        const f = activeFilters[caisseId];
        const term = document.getElementById(`search-${caisseId}`)?.value || '';
        const from = document.getElementById(`datefrom-${caisseId}`)?.value || '';
        const to   = document.getElementById(`dateto-${caisseId}`)?.value || '';
        const hasAny = f.mouv || f.cat || f.user || from || to || term;
        const btn = document.getElementById(`clearall-${caisseId}`);
        if (btn) btn.classList.toggle('visible', !!hasAny);
    }

    /* Peuple dynamiquement les options Catégorie et Utilisateur depuis les données chargées */
    function populateDynamicOptions(caisseId) {
        const data = caisseData[caisseId]?.allData || [];

        const cats = [...new Set(data.map(r => r.categorie).filter(Boolean))].sort();
        const users = [...new Set(data.map(r => r.user).filter(Boolean))].sort();

        const catContainer = document.getElementById(`cat-options-${caisseId}`);
        if (catContainer) {
            catContainer.innerHTML = cats.map(cat => `
                <div class="drop-item" data-v="${escapeHtml(cat)}" onclick="setFilter('cat','${caisseId}','${escapeHtml(cat)}',event)">
                    ${escapeHtml(cat)}<i class="fas fa-check di-check"></i>
                </div>`).join('') || '<div class="drop-item" style="color:var(--c-ink3);font-size:.78rem">Aucune catégorie</div>';
        }

        const userContainer = document.getElementById(`user-options-${caisseId}`);
        if (userContainer) {
            userContainer.innerHTML = users.map(u => `
                <div class="drop-item" data-v="${escapeHtml(u)}" onclick="setFilter('user','${caisseId}','${escapeHtml(u)}',event)">
                    ${escapeHtml(u)}<i class="fas fa-check di-check"></i>
                </div>`).join('') || '<div class="drop-item" style="color:var(--c-ink3);font-size:.78rem">Aucun utilisateur</div>';
        }
    }

    /* ══════════════ FILTRE PRINCIPAL ══════════════ */

    function applyFilter(caisseId) {
        if (!caisseData[caisseId]) return;

        const term     = (document.getElementById(`search-${caisseId}`)?.value || '').toLowerCase().trim();
        const fromVal  = document.getElementById(`datefrom-${caisseId}`)?.value || '';
        const toVal    = document.getElementById(`dateto-${caisseId}`)?.value || '';
        const f        = activeFilters[caisseId];

        // Mise à jour des valeurs date dans l'état (pour cohérence)
        f.dateFrom = fromVal;
        f.dateTo   = toVal;

        caisseData[caisseId].filteredData = caisseData[caisseId].allData.filter(item => {
            // Recherche UNIQUEMENT sur la désignation
            if (term && !item.designation.toLowerCase().includes(term)) return false;
            // Filtres dropdown
            if (f.mouv && item.mouvement !== f.mouv) return false;
            if (f.cat  && item.categorie !== f.cat)  return false;
            if (f.user && item.user !== f.user)       return false;
            // Filtre date
            if (fromVal && item.date < fromVal) return false;
            if (toVal   && item.date > toVal)   return false;
            return true;
        });

        updateDateChip(caisseId);
        updateClearAllBtn(caisseId);
        displayData(caisseId);
    }

    /* ══════════════ AFFICHAGE DONNÉES ══════════════ */

    function updateSummary(caisseId) {
        const data = caisseData[caisseId]?.allData || [];
        const solde = getCaisseBalance(caisseId);
        let entreesMois = 0, sortiesMois = 0, operationsMois = 0;
        data.forEach(item => {
            if (isCurrentMonth(item.date)) {
                operationsMois++;
                if (item.mouvement === 'Entrée') entreesMois += item.montant;
                else if (item.mouvement === 'Sortie') sortiesMois += item.montant;
            }
        });
        const fmt = v => v.toLocaleString('fr-FR');
        const s = document.getElementById(`solde-${caisseId}`);
        const e = document.getElementById(`entrees-${caisseId}`);
        const so = document.getElementById(`sorties-${caisseId}`);
        const op = document.getElementById(`operations-${caisseId}`);
        if (s)  s.innerHTML  = `${fmt(solde)}<span class="kpi-unit">FCFA</span>`;
        if (e)  e.innerHTML  = `${fmt(entreesMois)}<span class="kpi-unit">FCFA</span>`;
        if (so) so.innerHTML = `${fmt(sortiesMois)}<span class="kpi-unit">FCFA</span>`;
        if (op) op.textContent = operationsMois;
    }

    function displayData(caisseId) {
        const data = caisseData[caisseId]?.filteredData || [];
        const tbody = document.getElementById(`data-${caisseId}`);
        const count = document.getElementById(`count-${caisseId}`);
        if (count) count.textContent = `${data.length} opération(s)`;
        if (!tbody) return;
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i><p>Aucune opération trouvée</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(item => `
            <tr>
                <td class="td-date">${formatDate(item.date)}</td>
                <td>${escapeHtml(item.designation)}</td>
                <td class="td-amount">${item.montant.toLocaleString('fr-FR')} FCFA</td>
                <td><span class="badge ${item.mouvement==='Entrée'?'badge-entree':'badge-sortie'}">${item.mouvement}</span></td>
                <td>${item.categorie ? `<span class="cat-pill">${escapeHtml(item.categorie)}</span>` : '—'}</td>
                <td>${item.user ? escapeHtml(item.user) : '—'}</td>
            </tr>`).join('');
    }

    /* ══════════════ NAVIGATION ══════════════ */

    function showSection(caisseId) {
        caisses.forEach(c => {
            document.getElementById(`section-${c.id}`)?.classList.remove('active');
            document.getElementById(`nav-btn-${c.id}`)?.classList.remove('active');
            document.getElementById(`mobile-nav-${c.id}`)?.classList.remove('active');
        });
        document.getElementById(`section-${caisseId}`)?.classList.add('active');
        document.getElementById(`nav-btn-${caisseId}`)?.classList.add('active');
        document.getElementById(`mobile-nav-${caisseId}`)?.classList.add('active');
        currentCaisse = caisseId;
        updateSummary(caisseId);
        displayData(caisseId);
    }

    /* ══════════════ REFRESH ══════════════ */

    async function refreshCaisseData(caisseId) {
        const btn = document.querySelector(`#section-${caisseId} .btn-ghost`);
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...'; }
        await loadCaisseData(caisseId);
        populateDynamicOptions(caisseId);
        clearAllFilters(caisseId);
        updateSummary(caisseId);
        displayData(caisseId);
        showToast('Données actualisées', 'success');
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-rotate-right"></i> Actualiser'; }
    }

    /* ══════════════ MODALE DÉPENSE ══════════════ */

    window.openDepenseWithEffect = async function(event) {
        const button = event.currentTarget;
        button.classList.add('btn-clicked');
        setTimeout(() => button.classList.remove('btn-clicked'), 400);
        createRipple(event, button);
        const orig = button.innerHTML;
        button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...';
        button.disabled = true;
        try { await openDepense(); }
        finally { button.innerHTML = orig; button.disabled = false; }
    };

                                Le solde de cette caisse est ≤ 0 FCFA. Vous ne pouvez pas effectuer de dépense.

                    <button class="btn btn-accent" onclick="submitDepense()" ${balance <= 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>

};

window.submitDepense = async function() {
    const montant = parseFloat(document.getElementById('depenseMontant')?.value || 0);
    const designation = document.getElementById('depenseDesignation')?.value || '';
    const categorie = document.getElementById('depenseCategorie')?.value || 'Divers';
    
    if (!designation.trim()) { showToast('Veuillez indiquer une désignation', 'error'); return; }
    if (isNaN(montant) || montant <= 0) { showToast('Veuillez entrer un montant valide', 'error'); return; }
    
    const balance = getCaisseBalance(currentCaisse);
    if (montant > balance) { showToast(`Montant supérieur au solde (${balance.toLocaleString('fr-FR')} FCFA)`, 'error'); return; }
    
    const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur") || 'Utilisateur';
    const token = getApiToken();
    if (!token) {
        showToast('Session expirée, veuillez vous reconnecter', 'error');
        redirectToLogin();
        return;
    }
    
    // Stocker les données de la dépense en session
    const depenseData = {
        action: 'addDepense',
        token: token,
        date: document.getElementById('depenseDate').value,
        agence: document.getElementById('depenseAgence').value,
        designation: designation,
        categorie: categorie,
        utilisateur: username,
        montant: montant
    };
    
    // ═══════════════════════════════════════════════════
    // 🔐 SI CATÉGORIE = "apprograndc" → VALIDATION PAR CODE
    // ═══════════════════════════════════════════════════
    if (categorie === "apprograndc") {
        // Sauvegarder les données pour validation ultérieure
        sessionStorage.setItem('pendingDepense', JSON.stringify(depenseData));
        
        // Fermer le modal de dépense
        //closeModal();
        
        // Ouvrir la boîte de dialogue de validation par code
        openDepenseCodeVerification(depenseData);
        return;
    }
    
    // ═══════════════════════════════════════════════════
    // ✅ DÉPENSE NORMALE (sans validation)
    // ═══════════════════════════════════════════════════
    await executeDepense(depenseData);
};

    window.closeModal = function() {

        setTimeout(() => {
            const mc = document.getElementById('modal-container');
            if (mc) mc.innerHTML = '';
        }, 200);

/* ═══════════════════════════════════════════════════════════════
   ENVOI DE LA DEMANDE DE CODE À L'ADMIN
   ═══════════════════════════════════════════════════════════════ */

async function sendDepenseCodeRequest(depenseData) {
    try {
        const token = getApiToken();
        if (!token) return;
        
        // Appel API pour générer et envoyer le code
        await fetch(`${API_BASE_URL}?action=depense_code_request`, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: token,
                agence: depenseData.agence,
                designation: depenseData.designation,
                montant: depenseData.montant,
                utilisateur: depenseData.utilisateur,
                date: depenseData.date
            })
        });
        
        showDepenseCodeMessage('✅ Code envoyé à l\'administrateur. Vérifiez vos emails.', 'success');
        
    } catch (error) {
        showDepenseCodeMessage('❌ Erreur lors de l\'envoi du code. Veuillez réessayer.', 'error');
        console.error('Erreur envoi code dépense:', error);
    }
}

/* ═══════════════════════════════════════════════════════════════
   VALIDATION DU CODE ET EXÉCUTION DE LA DÉPENSE
   ═══════════════════════════════════════════════════════════════ */

async function validateDepenseCode() {
    const code = document.getElementById('depenseCodeInput')?.value.trim();
    if (!code || code.length !== 6) {
        showDepenseCodeMessage('Veuillez saisir un code à 6 chiffres', 'error');
        return;
    }
    
    const btn = document.getElementById('btnValidateDepenseCode');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';
    
    try {
        // 1. Vérifier le code via l'API
        const token = getApiToken();
        const response = await fetch(`${API_BASE_URL}?action=codeaccess&token=${encodeURIComponent(token)}&code=${code}`);
        const result = await response.json();
        
        if (!result.success) {
            showDepenseCodeMessage('❌ Code invalide. Veuillez réessayer.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Valider et exécuter';
            return;
        }
        
        // 2. Code valide → récupérer les données de la dépense
        const depenseData = JSON.parse(sessionStorage.getItem('pendingDepense') || '{}');
        if (!depenseData || !depenseData.agence) {
            showDepenseCodeMessage('❌ Données de dépense manquantes. Veuillez recommencer.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Valider et exécuter';
            return;
        }
        
        showDepenseCodeMessage('✅ Code validé ! Exécution de la dépense...', 'success');
        
        // 3. Exécuter la dépense
        await executeDepense(depenseData);
        
        // 4. Nettoyer et fermer
        sessionStorage.removeItem('pendingDepense');
        setTimeout(() => {
            closeModal();
            showToast('✅ Dépense Appro Grand Caisse exécutée avec succès !', 'success');
            refreshCaisseData(currentCaisse);
        }, 1000);
        
    } catch (error) {
        showDepenseCodeMessage('❌ Erreur: ' + error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Valider et exécuter';
    }
}


/* ═══════════════════════════════════════════════════════════════
   EXÉCUTION DE LA DÉPENSE (COMMUNE)
   ═══════════════════════════════════════════════════════════════ */

async function executeDepense(depenseData) {
    const submitBtn = document.querySelector('#depenseModal .btn-accent');
    if (submitBtn) { 
        submitBtn.disabled = true; 
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...'; 
    }
    
    try {
        await fetch(`${API_BASE_URL}?action=addDepense`, {
            method: 'POST', 
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(depenseData)
        });
        
        showToast('Dépense enregistrée avec succès !', 'success');
        setTimeout(() => { 
            closeModal(); 
            refreshCaisseData(currentCaisse); 
        }, 1500);
        
    } catch (err) {
        showToast(`Erreur de connexion : ${err.message}`, 'error');
        if (submitBtn) { 
            submitBtn.disabled = false; 
            submitBtn.innerHTML = 'Enregistrer'; 
        }
    }
}

/* ═══════════════════════════════════════════════════════════════
   AFFICHAGE DES MESSAGES DANS LA MODALE DE CODE
   ═══════════════════════════════════════════════════════════════ */

function showDepenseCodeMessage(msg, type) {
    const div = document.getElementById('depenseCodeMessage');
    if (!div) return;
    div.textContent = msg;
    div.className = `alert-message alert-${type}`;
    div.style.display = 'flex';
    div.style.padding = '.6rem .8rem';
    div.style.borderRadius = '6px';
    div.style.marginTop = '.5rem';
    
    if (type === 'success') {
        div.style.background = '#e6f5ee';
        div.style.color = '#1a8a5a';
        div.style.border = '1px solid #b8e0cc';
    } else if (type === 'error') {
        div.style.background = '#fceaea';
        div.style.color = '#c43b3b';
        div.style.border = '1px solid #f5d0d0';
    } else {
        div.style.background = '#fdf3e3';
        div.style.color = '#b07020';
        div.style.border = '1px solid #f5e0c0';
    }
    
    setTimeout(() => div.style.display = 'none', 5000);
}
    /* ══════════════ FAB ══════════════ */

    window.onscroll = function() {
        const fab = document.getElementById('fab');
        if (fab) fab.style.display = window.scrollY > 300 ? 'flex' : 'none';
    };

    /* ══════════════ RETOUR ══════════════ */
    
    function goBack() { 
        window.location.href = 'Accueil.html'; 
    }

    /* ══════════════ INIT ══════════════ */

    document.addEventListener('DOMContentLoaded', async () => {
        // Vérifier la session avant tout chargement
        if (!checkSession()) return;
        
        // Vérifier les droits d'accès à la caisse
        if (!hasCaisseAccess()) return;
        
        // Démarrer le timer d'inactivité
        startInactivityTimer();
        
        // Afficher les infos utilisateur
        displayUserInfo();
        
        setCurrentDate();
        const loaded = await loadCaisses();
        if (loaded && caisses.length > 0) {
            buildUI();
            await loadAllCaisseData();
            currentCaisse = caisses[0].id;
            // Peuple les dropdowns dynamiques pour chaque caisse
            caisses.forEach(c => populateDynamicOptions(c.id));
            updateSummary(currentCaisse);
            displayData(currentCaisse);
        } else {
            document.getElementById('content-area').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Aucune caisse trouvée. Vérifiez votre connexion API.</p>
                </div>`;
        }
    });
</script>
</body>
</html>
