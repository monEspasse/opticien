<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VisioPro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --c-bg: #F7F6F3;
            --c-surface: #FFFFFF;
            --c-surface2: #F0EEE9;
            --c-ink: #1A1916;
            --c-ink2: #6B6860;
            --c-ink3: #A8A69F;
            --c-border: #E3E1DB;
            --c-border2: #C8C5BC;
            --c-accent: #3D4FE0;
            --c-accent-lt: #EEF0FD;
            --c-accent-dk: #2534B8;
            --c-green: #1A8A5A;
            --c-green-lt: #E6F5EE;
            --c-red: #C43B3B;
            --c-red-lt: #FCEAEA;
            --c-amber: #B07020;
            --c-amber-lt: #FDF3E3;
            --shadow-sm: 0 1px 3px rgba(26,25,22,.06), 0 1px 2px rgba(26,25,22,.04);
            --shadow-md: 0 4px 12px rgba(26,25,22,.08), 0 2px 4px rgba(26,25,22,.04);
            --shadow-lg: 0 12px 32px rgba(26,25,22,.10), 0 4px 8px rgba(26,25,22,.06);
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
            --r-xl: 20px;
            --ease: cubic-bezier(.4,0,.2,1);
        }

        body {
            background: var(--c-bg);
            font-family: 'DM Sans', system-ui, sans-serif;
            color: var(--c-ink);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(16px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes btnPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(61, 79, 224, 0.7);
            }
            70% {
                transform: scale(0.98);
                box-shadow: 0 0 0 10px rgba(61, 79, 224, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(61, 79, 224, 0);
            }
        }

        @keyframes btnShine {
            0% {
                background-position: -100% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.25rem 1.25rem 0;
            animation: fadeUp .4s var(--ease) both;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            padding: .75rem 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            background: var(--c-accent);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .85rem;
        }

        .brand-name {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -.02em;
            color: var(--c-ink);
        }

        .brand-name span {
            color: var(--c-accent);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .topbar-date {
            font-size: .8rem;
            color: var(--c-ink3);
            font-variant-numeric: tabular-nums;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid var(--c-border);
            object-fit: cover;
        }

        .main {
            display: flex;
            gap: 1.25rem;
        }

        .sidebar {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .sidebar-label {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--c-ink3);
            padding: .25rem .75rem;
            margin-bottom: .25rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .65rem .9rem;
            border-radius: var(--r-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--c-ink2);
            font-family: inherit;
            font-size: .88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s var(--ease);
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--c-surface2);
            color: var(--c-ink);
        }

        .nav-item.active {
            background: var(--c-accent-lt);
            color: var(--c-accent);
            border-color: rgba(61,79,224,.12);
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .section {
            display: none;
            animation: fadeUp .35s var(--ease) both;
        }

        .section.active {
            display: block;
        }

        .section-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -.025em;
            color: var(--c-ink);
            margin-bottom: .2rem;
        }

        .section-sub {
            font-size: .82rem;
            color: var(--c-ink3);
        }

        .section-actions {
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1rem;
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .83rem;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .15s var(--ease);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .btn-ghost {
            background: var(--c-surface);
            color: var(--c-ink2);
            border-color: var(--c-border);
        }

        .btn-ghost:hover {
            background: var(--c-surface2);
            color: var(--c-ink);
            border-color: var(--c-border2);
            transform: translateY(-1px);
        }

        .btn-accent {
            background: var(--c-accent);
            color: #fff;
            border-color: var(--c-accent);
            position: relative;
            overflow: hidden;
        }

        .btn-accent:hover {
            background: var(--c-accent-dk);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61,79,224,.35);
        }

        .btn-accent:active {
            transform: scale(0.96);
        }

        .btn-accent .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        .btn-accent.btn-clicked {
            animation: btnPulse 0.4s ease-out;
        }

        .btn-accent::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-accent:hover::before {
            left: 100%;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .75rem;
            margin-bottom: 1.25rem;
        }

        .kpi-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            padding: 1rem 1.1rem;
            box-shadow: var(--shadow-sm);
            transition: all .2s var(--ease);
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .kpi-label {
            font-size: .75rem;
            font-weight: 500;
            color: var(--c-ink3);
            letter-spacing: .02em;
            text-transform: uppercase;
            margin-bottom: .6rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .kpi-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
        }

        .kpi-value {
            font-family: 'DM Mono', monospace;
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: -.02em;
            color: var(--c-ink);
            line-height: 1;
            margin-bottom: .25rem;
        }

        .kpi-unit {
            font-size: .72rem;
            color: var(--c-ink3);
            margin-left: .2rem;
            font-family: 'DM Sans', sans-serif;
        }

        .toolbar {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            padding: .75rem 1rem;
            margin-bottom: .75rem;
            display: flex;
            gap: .75rem;
            align-items: center;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }

        .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: .8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-ink3);
            font-size: .8rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: .55rem .8rem .55rem 2.2rem;
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .85rem;
            color: var(--c-ink);
            transition: all .15s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(61,79,224,.1);
        }

        .result-count {
            font-size: .8rem;
            color: var(--c-ink3);
            white-space: nowrap;
        }

        .table-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-scroll {
            max-height: 420px;
            overflow-y: auto;
            overflow-x: auto;
        }

        .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 3px; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 580px;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th {
            background: var(--c-surface2);
            padding: .65rem .85rem;
            text-align: left;
            font-size: .75rem;
            font-weight: 600;
            color: var(--c-ink2);
            letter-spacing: .04em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--c-border);
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--c-border);
            transition: background .12s;
        }

        .data-table tbody tr:hover {
            background: var(--c-accent-lt);
        }

        .data-table td {
            padding: .7rem .85rem;
            font-size: .84rem;
            color: var(--c-ink);
            vertical-align: middle;
        }

        .td-date {
            font-family: 'DM Mono', monospace;
            font-size: .78rem;
            color: var(--c-ink2);
        }

        .td-amount {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .22rem .6rem;
            border-radius: 999px;
            font-size: .73rem;
            font-weight: 600;
        }

        .badge-entree {
            background: var(--c-green-lt);
            color: var(--c-green);
        }

        .badge-sortie {
            background: var(--c-red-lt);
            color: var(--c-red);
        }

        .cat-pill {
            display: inline-block;
            padding: .18rem .55rem;
            border-radius: var(--r-sm);
            font-size: .73rem;
            background: var(--c-surface2);
            color: var(--c-ink2);
        }

        .empty-state {
            padding: 3rem 1rem;
            text-align: center;
            color: var(--c-ink3);
        }

        .empty-state i {
            font-size: 1.8rem;
            margin-bottom: .75rem;
            display: block;
            opacity: .4;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26,25,22,.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--c-surface);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
            animation: modalSlideIn .3s var(--ease);
        }

        .modal-head {
            padding: 1.25rem 1.5rem 1rem;
            border-bottom: 1px solid var(--c-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-head-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border-radius: var(--r-sm);
            border: 1px solid var(--c-border);
            background: transparent;
            color: var(--c-ink2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .modal-close:hover {
            background: var(--c-surface2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.25rem 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-foot {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--c-border);
            display: flex;
            justify-content: flex-end;
            gap: .5rem;
        }

        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--c-ink2);
            margin-bottom: .35rem;
        }

        .form-control {
            width: 100%;
            padding: .6rem .85rem;
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .88rem;
            color: var(--c-ink);
            outline: none;
            transition: all .15s;
        }

        .form-control:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(61,79,224,.1);
            background: var(--c-surface);
            transform: scale(1.01);
        }

        .form-control[readonly] {
            background: var(--c-surface2);
            cursor: not-allowed;
        }

        .toast-zone {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: .5rem;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .75rem 1rem;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-md);
            font-size: .85rem;
            font-weight: 500;
            max-width: 320px;
            animation: toastIn .3s var(--ease) both;
            pointer-events: auto;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: var(--c-green-lt); color: var(--c-green); }
        .toast.error .toast-icon { background: var(--c-red-lt); color: var(--c-red); }

        .toast-msg { flex: 1; color: var(--c-ink); }

        .toast-dismiss {
            background: none;
            border: none;
            color: var(--c-ink3);
            cursor: pointer;
            font-size: 1.1rem;
            padding: .1rem .25rem;
        }

        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--c-surface);
            border-top: 1px solid var(--c-border);
            z-index: 1000;
            padding: .5rem 1rem env(safe-area-inset-bottom, .5rem);
            justify-content: space-around;
            box-shadow: 0 -4px 20px rgba(26,25,22,.06);
        }

        .mob-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .2rem;
            background: none;
            border: none;
            color: var(--c-ink3);
            font-family: inherit;
            font-size: .65rem;
            font-weight: 500;
            cursor: pointer;
            padding: .4rem .6rem;
            border-radius: var(--r-md);
            transition: all .15s;
        }

        .mob-item i { font-size: .95rem; }

        .mob-item.active {
            color: var(--c-accent);
            background: var(--c-accent-lt);
        }

        .fab {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.25rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--c-accent);
            color: #fff;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: var(--shadow-md);
            z-index: 100;
            transition: all .2s;
        }

        .fab:hover {
            transform: translateY(-2px) scale(1.1);
            background: var(--c-accent-dk);
        }

        @media (max-width: 900px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 700px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .fab { display: flex; }
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--c-border);
            border-top-color: var(--c-accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <div class="toast-zone" id="toast-zone"></div>
    <button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="shell">
        <header class="topbar">
            <div class="topbar-brand">
                <div class="brand-mark"><i class="fas fa-cash-register"></i></div>
                <span class="brand-name">Visio<span>Pro</span></span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="current-date"></span>
                <span class="topbar-user">Admin</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=3D4FE0&color=fff&size=64" alt="Profil" class="avatar">
            </div>
        </header>

        <div class="main">
            <aside class="sidebar" id="sidebar">
                <p class="sidebar-label">Caisses</p>
                <div id="nav-buttons"></div>
            </aside>

            <div class="content" id="content-area"></div>
        </div>
    </div>

    <nav class="mobile-nav" id="mobile-nav"></nav>
    <div id="modal-container"></div>

    <script>
        const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec';
        
        let caisses = [];
        let caisseData = {};
        let currentCaisse = null;

        function getCurrentYearMonth() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }

        function isCurrentMonth(dateStr) {
            if (!dateStr) return false;
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return false;
                const currentYearMonth = getCurrentYearMonth();
                const itemYearMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return currentYearMonth === itemYearMonth;
            } catch(e) {
                return false;
            }
        }

        function getCaisseBalance(caisseId) {
            const data = caisseData[caisseId]?.allData || [];
            return data.reduce((balance, item) => {
                if (item.mouvement === 'Entrée') return balance + item.montant;
                if (item.mouvement === 'Sortie') return balance - item.montant;
                return balance;
            }, 0);
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            try {
                const d = new Date(dateString);
                return d.toLocaleDateString('fr-FR');
            } catch {
                return dateString;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg, type) {
            const zone = document.getElementById('toast-zone');
            const id = 'toast-' + Date.now();
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.id = id;
            el.innerHTML = `
                <div class="toast-icon">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                </div>
                <span class="toast-msg">${escapeHtml(msg)}</span>
                <button class="toast-dismiss" onclick="document.getElementById('${id}').remove()">✕</button>
            `;
            zone.appendChild(el);
            setTimeout(() => {
                if (document.getElementById(id)) el.remove();
            }, 4000);
        }

        function setCurrentDate() {
            const el = document.getElementById('current-date');
            if (el) {
                el.textContent = new Date().toLocaleDateString('fr-FR', { 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                });
            }
        }

        function createRipple(event, element) {
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            element.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        window.openDepenseWithEffect = async function(event) {
            const button = event.currentTarget;
            
            button.classList.add('btn-clicked');
            setTimeout(() => button.classList.remove('btn-clicked'), 400);
            createRipple(event, button);
            
            const originalIcon = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...';
            button.disabled = true;
            
            try {
                await openDepense();
            } finally {
                button.innerHTML = originalIcon;
                button.disabled = false;
            }
        };

        async function loadCaisses() {
            try {
                const response = await fetch(`${API_BASE_URL}?action=getdataagence&_=${Date.now()}`);
                const result = await response.json();
                
                if (result.success && result.data && result.data.caisses && result.data.caisses.length > 0) {
                    caisses = result.data.caisses.map(caisse => ({
                        id: caisse.value,
                        name: caisse.label,
                        code: caisse.code || caisse.value,
                        endpoint: caisse.getAgenceSheetName,
                        icon: caisse.icon || 'fa-store',
                        color: caisse.color || '#3D4FE0',
                        sheetName: caisse.getAgenceSheetName
                    }));
                    return true;
                } else {
                    showToast('Aucune caisse trouvée', 'error');
                    return false;
                }
            } catch (error) {
                console.error('Erreur chargement agences:', error);
                showToast('Erreur de connexion à l\'API', 'error');
                return false;
            }
        }

        async function loadCaisseData(caisseId) {
            const caisse = caisses.find(c => c.id === caisseId);
            if (!caisse || !caisse.endpoint) return false;
            
            try {
                const res = await fetch(`${API_BASE_URL}?action=${caisse.endpoint}&_=${Date.now()}`);
                const json = await res.json();
                
                if (json && json.data && json.data.rows && Array.isArray(json.data.rows)) {
                    caisseData[caisseId] = {
                        allData: json.data.rows.map(row => ({
                            date: row[0] || '',
                            designation: row[1] || '',
                            montant: parseFloat(row[2]) || 0,
                            mouvement: row[3] || '',
                            user: row[4] || '',
                            agence: caisse.name,
                            categorie: row[6] || '',
                            note: row[7] || ''
                        })),
                        filteredData: []
                    };
                    caisseData[caisseId].filteredData = [...caisseData[caisseId].allData];
                    return true;
                } else {
                    caisseData[caisseId] = { allData: [], filteredData: [] };
                    return false;
                }
            } catch (err) {
                console.error(`Erreur chargement ${caisse.name}:`, err);
                caisseData[caisseId] = { allData: [], filteredData: [] };
                return false;
            }
        }

        async function loadAllCaisseData() {
            for (let caisse of caisses) {
                await loadCaisseData(caisse.id);
            }
        }

        function buildUI() {
            buildSideNav();
            buildMobileNav();
            buildSections();
        }

        function buildSideNav() {
            const container = document.getElementById('nav-buttons');
            if (!container) return;
            
            container.innerHTML = caisses.map((c, i) => `
                <button id="nav-btn-${c.id}" class="nav-item ${i === 0 ? 'active' : ''}" onclick="showSection('${c.id}')">
                    <i class="fas ${c.icon}"></i>
                    <span>${escapeHtml(c.name)}</span>
                </button>
            `).join('');
        }

        function buildMobileNav() {
            const container = document.getElementById('mobile-nav');
            if (!container) return;
            
            container.innerHTML = caisses.map((c, i) => `
                <button id="mobile-nav-${c.id}" class="mob-item ${i === 0 ? 'active' : ''}" onclick="showSection('${c.id}')">
                    <i class="fas ${c.icon}"></i>
                    <span>${escapeHtml(c.name)}</span>
                </button>
            `).join('');
        }

        function buildSections() {
            const container = document.getElementById('content-area');
            if (!container) return;
            
            container.innerHTML = caisses.map((c, i) => `
                <section id="section-${c.id}" class="section ${i === 0 ? 'active' : ''}">
                    <div class="section-head">
                        <div class="section-meta">
                            <h2 class="section-title">Caisse ${escapeHtml(c.name)}</h2>
                            <p class="section-sub">${escapeHtml(c.code)}</p>
                        </div>
                        <div class="section-actions">
                            <button class="btn btn-ghost" onclick="refreshCaisseData('${c.id}')">
                                <i class="fas fa-rotate-right"></i> Actualiser
                            </button>
                            <button class="btn btn-accent" onclick="openDepenseWithEffect(event)">
                                <i class="fas fa-plus"></i> Dépense
                            </button>
                        </div>
                    </div>

                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-label">
                                <span class="kpi-icon" style="background:rgba(61,79,224,.1);color:#3D4FE0"><i class="fas fa-scale-balanced"></i></span>
                                Solde
                            </div>
                            <div class="kpi-value" id="solde-${c.id}">—<span class="kpi-unit">FCFA</span></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">
                                <span class="kpi-icon" style="background:var(--c-green-lt);color:var(--c-green)"><i class="fas fa-arrow-down-long"></i></span>
                                Entrées (mois)
                            </div>
                            <div class="kpi-value" id="entrees-${c.id}">—<span class="kpi-unit">FCFA</span></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">
                                <span class="kpi-icon" style="background:var(--c-red-lt);color:var(--c-red)"><i class="fas fa-arrow-up-long"></i></span>
                                Sorties (mois)
                            </div>
                            <div class="kpi-value" id="sorties-${c.id}">—<span class="kpi-unit">FCFA</span></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">
                                <span class="kpi-icon" style="background:var(--c-amber-lt);color:var(--c-amber)"><i class="fas fa-list-check"></i></span>
                                Opérations (mois)
                            </div>
                            <div class="kpi-value" id="operations-${c.id}">—</div>
                        </div>
                    </div>

                    <div class="toolbar">
                        <div class="search-wrap">
                            <i class="fas fa-magnifying-glass"></i>
                            <input type="text" id="search-${c.id}" class="search-input" placeholder="Rechercher..." oninput="applyFilter('${c.id}')">
                        </div>
                        <span class="result-count" id="count-${c.id}">0 opération(s)</span>
                    </div>

                    <div class="table-card">
                        <div class="table-scroll">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Désignation</th>
                                        <th>Montant</th>
                                        <th>Mouvement</th>
                                        <th>Catégorie</th>
                                        <th>Note</th>
                                    </tr>
                                </thead>
                                <tbody id="data-${c.id}">
                                    <tr><td colspan="6"><div class="spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            `).join('');
        }

        function updateSummary(caisseId) {
            const data = caisseData[caisseId]?.allData || [];
            
            let solde = getCaisseBalance(caisseId);
            
            let entreesMois = 0, sortiesMois = 0, operationsMois = 0;
            data.forEach(item => {
                if (isCurrentMonth(item.date)) {
                    operationsMois++;
                    if (item.mouvement === 'Entrée') entreesMois += item.montant;
                    else if (item.mouvement === 'Sortie') sortiesMois += item.montant;
                }
            });
            
            const fmt = v => v.toLocaleString('fr-FR');
            
            const soldeEl = document.getElementById(`solde-${caisseId}`);
            const entreesEl = document.getElementById(`entrees-${caisseId}`);
            const sortiesEl = document.getElementById(`sorties-${caisseId}`);
            const operationsEl = document.getElementById(`operations-${caisseId}`);
            
            if (soldeEl) soldeEl.innerHTML = `${fmt(solde)}<span class="kpi-unit">FCFA</span>`;
            if (entreesEl) entreesEl.innerHTML = `${fmt(entreesMois)}<span class="kpi-unit">FCFA</span>`;
            if (sortiesEl) sortiesEl.innerHTML = `${fmt(sortiesMois)}<span class="kpi-unit">FCFA</span>`;
            if (operationsEl) operationsEl.textContent = operationsMois;
        }

        function displayData(caisseId) {
            const data = caisseData[caisseId]?.filteredData || [];
            const tbody = document.getElementById(`data-${caisseId}`);
            const count = document.getElementById(`count-${caisseId}`);
            
            if (count) count.textContent = `${data.length} opération(s)`;

            if (!data.length) {
                if (tbody) {
                    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i><p>Aucune donnée disponible</p></div></td></tr>`;
                }
                return;
            }

            if (tbody) {
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="td-date">${formatDate(item.date)}</td>
                        <td>${escapeHtml(item.designation)}</td>
                        <td class="td-amount">${item.montant.toLocaleString('fr-FR')} FCFA</td>
                        <td><span class="badge ${item.mouvement === 'Entrée' ? 'badge-entree' : 'badge-sortie'}">${item.mouvement}</span></td>
                        <td>${item.categorie ? `<span class="cat-pill">${escapeHtml(item.categorie)}</span>` : '—'}</td>
                        <td>${item.note ? escapeHtml(item.note) : '—'}</td>
                    </tr>
                `).join('');
            }
        }

        function applyFilter(caisseId) {
            const searchInput = document.getElementById(`search-${caisseId}`);
            const term = (searchInput?.value || '').toLowerCase();
            
            if (caisseData[caisseId]) {
                caisseData[caisseId].filteredData = caisseData[caisseId].allData.filter(
                    item => item.designation.toLowerCase().includes(term) ||
                            (item.categorie || '').toLowerCase().includes(term) ||
                            (item.note || '').toLowerCase().includes(term)
                );
                displayData(caisseId);
            }
        }

        async function refreshCaisseData(caisseId) {
            const btn = document.querySelector(`#section-${caisseId} .btn-ghost`);
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...';
            }
            
            await loadCaisseData(caisseId);
            updateSummary(caisseId);
            displayData(caisseId);
            showToast('Données actualisées', 'success');
            
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-rotate-right"></i> Actualiser';
            }
        }

        function showSection(caisseId) {
            caisses.forEach(c => {
                const section = document.getElementById(`section-${c.id}`);
                const navBtn = document.getElementById(`nav-btn-${c.id}`);
                const mobBtn = document.getElementById(`mobile-nav-${c.id}`);
                if (section) section.classList.remove('active');
                if (navBtn) navBtn.classList.remove('active');
                if (mobBtn) mobBtn.classList.remove('active');
            });
            
            const activeSection = document.getElementById(`section-${caisseId}`);
            const activeNav = document.getElementById(`nav-btn-${caisseId}`);
            const activeMob = document.getElementById(`mobile-nav-${caisseId}`);
            
            if (activeSection) activeSection.classList.add('active');
            if (activeNav) activeNav.classList.add('active');
            if (activeMob) activeMob.classList.add('active');
            
            currentCaisse = caisseId;
            updateSummary(caisseId);
            displayData(caisseId);
        }

        window.openDepense = async function() {
            if (!currentCaisse) {
                showToast('Veuillez sélectionner une caisse', 'error');
                return;
            }
            
            const currentCaisseObj = caisses.find(c => c.id === currentCaisse);
            if (!currentCaisseObj) return;
            
            const balance = getCaisseBalance(currentCaisse);
            
            let categoriesOptions = '<option value="Divers">Divers</option>';
            try {
                const response = await fetch(`${API_BASE_URL}?action=getconfigdata&_=${Date.now()}`);
                const data = await response.json();
                const categories = data.data?.categories || [];
                if (categories.length > 0) {
                    categoriesOptions = categories.map(c => 
                        `<option value="${escapeHtml(c.value)}">${escapeHtml(c.label)}</option>`
                    ).join('');
                }
            } catch (error) {
                console.warn('Erreur chargement catégories:', error);
            }
            
            const mc = document.getElementById('modal-container');
            mc.innerHTML = `
                <div class="modal-overlay active" id="depenseModal">
                    <div class="modal">
                        <div class="modal-head">
                            <h3 class="modal-head-title">Nouvelle dépense</h3>
                            <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Date</label>
                                <input type="date" id="depenseDate" class="form-control" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Agence</label>
                                <input type="text" id="depenseAgence" class="form-control" value="${escapeHtml(currentCaisseObj.name)}" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Désignation</label>
                                <input type="text" id="depenseDesignation" class="form-control" placeholder="Description de la dépense">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Catégorie</label>
                                <select id="depenseCategorie" class="form-control">
                                    ${categoriesOptions}
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Montant (FCFA)</label>
                                <input type="number" id="depenseMontant" class="form-control" placeholder="0" step="1" min="1">
                                <small style="color:var(--c-ink3);font-size:.7rem;margin-top:.2rem;display:block">
                                    Solde disponible: ${balance.toLocaleString('fr-FR')} FCFA
                                </small>
                            </div>
                        </div>
                        <div class="modal-foot">
                            <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
                            <button class="btn btn-accent" onclick="submitDepense()">Enregistrer</button>
                        </div>
                    </div>
                </div>`;
        };

        window.submitDepense = async function() {
            const montantInput = document.getElementById('depenseMontant');
            const montant = parseFloat(montantInput?.value || 0);
            const designation = document.getElementById('depenseDesignation')?.value || '';
            const categorie = document.getElementById('depenseCategorie')?.value || 'Divers';
            
            if (!designation.trim()) {
                showToast('Veuillez indiquer une désignation', 'error');
                return;
            }
            
            if (isNaN(montant) || montant <= 0) {
                showToast('Veuillez entrer un montant valide', 'error');
                return;
            }
            
            const balance = getCaisseBalance(currentCaisse);
            if (montant > balance) {
                showToast(`Montant supérieur au solde disponible (${balance.toLocaleString('fr-FR')} FCFA)`, 'error');
                return;
            }
            
            const username = sessionStorage.getItem("utilisateur") || 
                    localStorage.getItem("utilisateur") || 
                    'Utilisateur';
            
            const depenseData = {
                action: 'addDepense',
                date: document.getElementById('depenseDate').value,
                agence: document.getElementById('depenseAgence').value,
                designation: designation,
                categorie: categorie,
                utilisateur: username,
                montant: montant
            };
            
            const submitButton = document.querySelector('#depenseModal .btn-accent');
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enregistrement...';
            }
            
try {
        const apiUrl = "https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec";
        
        // Utilisation de mode: 'no-cors' pour éviter les problèmes CORS
        await fetch(`${apiUrl}?action=addDepense`, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(depenseData)
        });
        
        // Avec no-cors, on ne peut pas lire la réponse
        // On considère que ça a fonctionné si aucune erreur n'est levée
    // c'est volontaire
        showToast('✅ Dépense enregistrée avec succès!', 'success');
        
        setTimeout(() => {
            closeModal();
            refreshCaisseData(currentCaisse);
        }, 1500);
        
    } catch (error) {
        console.error("Erreur de connexion:", error);
        showToast(`❌ Erreur de connexion: ${error.message}`, 'error');
        
        if (submitButton) {
            submitButton.disabled = false;
            submitButton.innerHTML = 'Enregistrer';
        }
    }
};

        window.closeModal = function() {
            const modal = document.querySelector('.modal-overlay.active');
            if (modal) modal.classList.remove('active');
            setTimeout(() => document.getElementById('modal-container').innerHTML = '', 300);
        };

        window.onscroll = function() {
            const fab = document.getElementById('fab');
            if (fab) {
                fab.style.display = window.scrollY > 300 ? 'flex' : 'none';
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            setCurrentDate();
            const loaded = await loadCaisses();
            
            if (loaded && caisses.length > 0) {
                buildUI();
                await loadAllCaisseData();
                
                if (caisses.length > 0) {
                    currentCaisse = caisses[0].id;
                    updateSummary(currentCaisse);
                    displayData(currentCaisse);
                }
            } else {
                document.getElementById('content-area').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Aucune caisse trouvée. Vérifiez votre connexion API.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
