<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VisioPro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           STYLES MODERNES INSPIRÉS DE VisioPro
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --c-bg: #F7F6F3;
            --c-surface: #FFFFFF;
            --c-surface2: #F0EEE9;
            --c-ink: #1A1916;
            --c-ink2: #6B6860;
            --c-ink3: #A8A69F;
            --c-border: #E3E1DB;
            --c-border2: #C8C5BC;
            --c-accent: #3D4FE0;
            --c-accent-lt: #EEF0FD;
            --c-accent-dk: #2534B8;
            --c-green: #1A8A5A;
            --c-green-lt: #E6F5EE;
            --c-red: #C43B3B;
            --c-red-lt: #FCEAEA;
            --c-amber: #B07020;
            --c-amber-lt: #FDF3E3;
            --shadow-sm: 0 1px 3px rgba(26,25,22,.06), 0 1px 2px rgba(26,25,22,.04);
            --shadow-md: 0 4px 12px rgba(26,25,22,.08), 0 2px 4px rgba(26,25,22,.04);
            --shadow-lg: 0 12px 32px rgba(26,25,22,.10), 0 4px 8px rgba(26,25,22,.06);
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
            --r-xl: 20px;
            --ease: cubic-bezier(.4,0,.2,1);
        }

        body {
            background: var(--c-bg);
            font-family: 'DM Sans', system-ui, sans-serif;
            color: var(--c-ink);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(16px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Shell */
        .shell {
            max-width: 1800px;
            margin: 0 auto;
            padding: 1.25rem 1.25rem 0;
            animation: fadeUp .4s var(--ease) both;
        }

        /* Topbar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            padding: .75rem 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
            gap: .5rem;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            background: var(--c-accent);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .85rem;
            overflow: hidden;
        }
.brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
        .brand-name {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -.02em;
            color: var(--c-ink);
        }

        .brand-name span {
            color: var(--c-accent);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .75rem;
            flex-wrap: wrap;
        }

        .topbar-date {
            font-size: .8rem;
            color: var(--c-ink3);
            font-variant-numeric: tabular-nums;
        }

        .topbar-user {
            font-size: .85rem;
            font-weight: 500;
            color: var(--c-ink2);
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid var(--c-border);
            object-fit: cover;
        }

        /* Main layout */
        .main {
            display: flex;
            gap: 1.25rem;
        }

        .sidebar {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .sidebar-label {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--c-ink3);
            padding: .25rem .75rem;
            margin-bottom: .25rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .65rem .9rem;
            border-radius: var(--r-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--c-ink2);
            font-family: inherit;
            font-size: .88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s var(--ease);
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--c-surface2);
            color: var(--c-ink);
        }

        .nav-item.active {
            background: var(--c-accent-lt);
            color: var(--c-accent);
            border-color: rgba(61,79,224,.12);
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeUp .35s var(--ease) both;
        }

        .section.active {
            display: block;
        }

        .section-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -.025em;
            color: var(--c-ink);
            margin-bottom: .2rem;
        }

        .section-sub {
            font-size: .82rem;
            color: var(--c-ink3);
        }

        .section-actions {
            display: flex;
            gap: .5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1rem;
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .83rem;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .15s var(--ease);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .btn-ghost {
            background: var(--c-surface);
            color: var(--c-ink2);
            border-color: var(--c-border);
        }

        .btn-ghost:hover {
            background: var(--c-surface2);
            color: var(--c-ink);
            border-color: var(--c-border2);
            transform: translateY(-1px);
        }

        .btn-accent {
            background: var(--c-accent);
            color: #fff;
            border-color: var(--c-accent);
        }

        .btn-accent:hover {
            background: var(--c-accent-dk);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61,79,224,.35);
        }

        .btn-accent:active {
            transform: scale(0.96);
        }

        .btn-success {
            background: var(--c-green);
            color: #fff;
            border-color: var(--c-green);
        }

        .btn-success:hover {
            background: #14724a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,138,90,.35);
        }

        .btn-danger {
            background: var(--c-red);
            color: #fff;
            border-color: var(--c-red);
        }

        .btn-danger:hover {
            background: #a32e2e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196,59,59,.35);
        }

        .btn-warning {
            background: var(--c-amber);
            color: #fff;
            border-color: var(--c-amber);
        }

        .btn-warning:hover {
            background: #8f5a1a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(176,112,32,.35);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .75rem;
            margin-bottom: 1.25rem;
        }

        .kpi-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            padding: 1rem 1.1rem;
            box-shadow: var(--shadow-sm);
            transition: all .2s var(--ease);
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .kpi-label {
            font-size: .75rem;
            font-weight: 500;
            color: var(--c-ink3);
            letter-spacing: .02em;
            text-transform: uppercase;
            margin-bottom: .6rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .kpi-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
        }

        .kpi-value {
            font-family: 'DM Mono', monospace;
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: -.02em;
            color: var(--c-ink);
            line-height: 1;
            margin-bottom: .25rem;
        }

        .kpi-unit {
            font-size: .72rem;
            color: var(--c-ink3);
            margin-left: .2rem;
            font-family: 'DM Sans', sans-serif;
        }

        /* Toolbar */
        .toolbar {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            padding: .65rem .85rem;
            margin-bottom: .75rem;
            display: flex;
            gap: .6rem;
            align-items: center;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }

        .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: .75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-ink3);
            font-size: .78rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: .5rem .8rem .5rem 2.1rem;
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .85rem;
            color: var(--c-ink);
            transition: all .15s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(61,79,224,.1);
        }

        .search-input::placeholder {
            color: var(--c-ink3);
        }

        .filters-row {
            display: flex;
            gap: .4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Filter chips */
        .filter-chip {
            display: flex;
            align-items: center;
            gap: .3rem;
            padding: 0 .1rem 0 .6rem;
            height: 30px;
            background: var(--c-surface2);
            border: 1px solid var(--c-border);
            border-radius: 999px;
            font-family: inherit;
            font-size: .78rem;
            color: var(--c-ink2);
            cursor: pointer;
            transition: border-color .12s, background .12s, color .12s;
            white-space: nowrap;
            position: relative;
            user-select: none;
        }

        .filter-chip:hover {
            border-color: var(--c-border2);
            background: var(--c-surface);
            color: var(--c-ink);
        }

        .filter-chip.active {
            background: var(--c-accent-lt);
            border-color: rgba(61,79,224,.25);
            color: var(--c-accent);
        }

        .chip-label {
            font-weight: 500;
        }

        .chip-val {
            font-weight: 600;
            font-size: .76rem;
            max-width: 72px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: none;
        }

        .filter-chip.active .chip-val {
            display: inline;
        }

        .chip-caret {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            margin-right: 2px;
            flex-shrink: 0;
            font-size: .65rem;
            color: var(--c-ink3);
        }

        .filter-chip.active .chip-caret {
            color: var(--c-accent);
        }

        .result-count {
            font-size: .79rem;
            color: var(--c-ink3);
            white-space: nowrap;
            margin-left: auto;
        }

        /* Table */
        .table-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-scroll {
            height: calc(100vh - 320px);
            overflow-y: auto;
            overflow-x: auto;
        }

        .table-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--c-border2);
            border-radius: 3px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th {
            background: var(--c-surface2);
            padding: .65rem .85rem;
            text-align: left;
            font-size: .75rem;
            font-weight: 600;
            color: var(--c-ink2);
            letter-spacing: .04em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--c-border);
        }

        .data-table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        .data-table th.sortable::after {
            content: ' ↕';
            font-size: .6em;
            opacity: .4;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--c-border);
            transition: background .12s;
        }

        .data-table tbody tr:hover {
            background: var(--c-accent-lt);
        }

        .data-table td {
            padding: .7rem .85rem;
            font-size: .84rem;
            color: var(--c-ink);
            vertical-align: middle;
        }

        .td-date {
            font-family: 'DM Mono', monospace;
            font-size: .78rem;
            color: var(--c-ink2);
        }

        .td-amount {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
        }

        .td-amount.positive {
            color: var(--c-green);
        }

        .td-amount.negative {
            color: var(--c-red);
        }

        .text-end {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .22rem .6rem;
            border-radius: 999px;
            font-size: .73rem;
            font-weight: 600;
        }

        .badge-success {
            background: var(--c-green-lt);
            color: var(--c-green);
        }

        .badge-danger {
            background: var(--c-red-lt);
            color: var(--c-red);
        }

        .badge-warning {
            background: var(--c-amber-lt);
            color: var(--c-amber);
        }

        .badge-primary {
            background: var(--c-accent-lt);
            color: var(--c-accent);
        }

        .cat-pill {
            display: inline-block;
            padding: .18rem .55rem;
            border-radius: var(--r-sm);
            font-size: .73rem;
            background: var(--c-surface2);
            color: var(--c-ink2);
        }

        /* Empty state */
        .empty-state {
            padding: 3rem 1rem;
            text-align: center;
            color: var(--c-ink3);
        }

        .empty-state i {
            font-size: 1.8rem;
            margin-bottom: .75rem;
            display: block;
            opacity: .4;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26,25,22,.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--c-surface);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalSlideIn .3s var(--ease);
        }

        .modal.xlarge {
            max-width: 95%;
            width: 95%;
            max-height: 95vh;
        }

        @media (max-width: 768px) {
            .modal.xlarge {
                max-width: 98%;
                width: 98%;
                max-height: 98vh;
            }
        }

        .modal-head {
            padding: 1.25rem 1.5rem 1rem;
            border-bottom: 1px solid var(--c-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .modal-head-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border-radius: var(--r-sm);
            border: 1px solid var(--c-border);
            background: transparent;
            color: var(--c-ink2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }

        .modal-close:hover {
            background: var(--c-surface2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.25rem 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-body.xlarge-body {
            max-height: 70vh;
        }

        .modal-foot {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--c-border);
            display: flex;
            justify-content: flex-end;
            gap: .5rem;
            flex-wrap: wrap;
        }

        /* Form */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--c-ink2);
            margin-bottom: .35rem;
        }

        .form-control {
            width: 100%;
            padding: .6rem .85rem;
            background: var(--c-bg);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: .88rem;
            color: var(--c-ink);
            outline: none;
            transition: all .15s;
        }

        .form-control:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(61,79,224,.1);
            background: var(--c-surface);
        }

        .form-control[readonly] {
            background: var(--c-surface2);
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }

        .form-hint {
            font-size: .72rem;
            color: var(--c-ink3);
            margin-top: .2rem;
        }

        .nouvelle-quantite {
            width: 85px;
            padding: .35rem .5rem;
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            font-family: inherit;
            font-size: .85rem;
            text-align: center;
            outline: none;
            transition: all .15s;
        }

        .nouvelle-quantite:focus {
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(61,79,224,.1);
        }

        /* Product row */
        .product-row {
            display: flex;
            gap: .5rem;
            align-items: end;
            margin-bottom: .6rem;
            padding: .6rem .8rem;
            background: var(--c-bg);
            border-radius: var(--r-md);
            border: 1px solid var(--c-border);
            transition: all .2s var(--ease);
            flex-wrap: wrap;
        }

        .product-row:hover {
            border-color: var(--c-accent);
            box-shadow: var(--shadow-sm);
        }

        .product-row .flex-3 { flex: 3; min-width: 120px; }
        .product-row .flex-1 { flex: 1; min-width: 80px; }
        .product-row .flex-05 { flex: 0.5; min-width: 40px; }

        @media (max-width: 600px) {
            .product-row .flex-3 { flex: 1 1 100%; }
            .product-row .flex-1 { flex: 1 1 45%; }
            .product-row .flex-05 { flex: 1 1 10%; }
        }

        /* Toast */
        .toast-zone {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: .5rem;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .75rem 1rem;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-md);
            font-size: .85rem;
            font-weight: 500;
            max-width: 320px;
            animation: toastIn .3s var(--ease) both;
            pointer-events: auto;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            flex-shrink: 0;
        }

        .toast.success .toast-icon {
            background: var(--c-green-lt);
            color: var(--c-green);
        }

        .toast.error .toast-icon {
            background: var(--c-red-lt);
            color: var(--c-red);
        }

        .toast.warning .toast-icon {
            background: var(--c-amber-lt);
            color: var(--c-amber);
        }

        .toast.info .toast-icon {
            background: var(--c-accent-lt);
            color: var(--c-accent);
        }

        .toast-msg {
            flex: 1;
            color: var(--c-ink);
        }

        .toast-dismiss {
            background: none;
            border: none;
            color: var(--c-ink3);
            cursor: pointer;
            font-size: 1.1rem;
            padding: .1rem .25rem;
        }

        /* Alert message */
        .alert-message {
            padding: .6rem .8rem;
            border-radius: var(--r-md);
            margin: .6rem 0;
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .8rem;
        }

        .alert-success { background: var(--c-green-lt); color: var(--c-green); border-left: 3px solid var(--c-green); }
        .alert-error { background: var(--c-red-lt); color: var(--c-red); border-left: 3px solid var(--c-red); }
        .alert-warning { background: var(--c-amber-lt); color: var(--c-amber); border-left: 3px solid var(--c-amber); }
        .alert-info { background: var(--c-accent-lt); color: var(--c-accent); border-left: 3px solid var(--c-accent); }

        /* Spinner */
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--c-border);
            border-top-color: var(--c-accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 2rem auto;
        }

        .spinner-border {
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid var(--c-accent-lt);
            border-right-color: var(--c-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-state {
            padding: 3rem 1rem;
            text-align: center;
            color: var(--c-ink3);
        }

        .loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            gap: .5rem;
        }

        .no-data {
            text-align: center;
            padding: 1.5rem;
            color: var(--c-ink3);
            font-style: italic;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--c-surface2) 25%, var(--c-surface) 50%, var(--c-surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--r-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Progress overlay */
        .progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26,25,22,.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .progress-overlay.active {
            display: flex;
        }

        .progress-modal {
            background: var(--c-surface);
            border-radius: var(--r-xl);
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalSlideIn .3s var(--ease);
        }

        .progress-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .progress-text h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: .3rem;
        }

        .progress-text p {
            font-size: .85rem;
            color: var(--c-ink3);
            margin-bottom: .5rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--c-border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: .8rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--c-accent);
            width: 0%;
            transition: width .3s ease;
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--c-surface);
            border-top: 1px solid var(--c-border);
            z-index: 1000;
            padding: .5rem 1rem env(safe-area-inset-bottom,.5rem);
            justify-content: space-around;
            box-shadow: 0 -4px 20px rgba(26,25,22,.06);
        }

        .mob-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .2rem;
            background: none;
            border: none;
            color: var(--c-ink3);
            font-family: inherit;
            font-size: .65rem;
            font-weight: 500;
            cursor: pointer;
            padding: .4rem .6rem;
            border-radius: var(--r-md);
            transition: all .15s;
        }

        .mob-item i {
            font-size: .95rem;
        }

        .mob-item.active {
            color: var(--c-accent);
            background: var(--c-accent-lt);
        }

        /* FAB */
        .fab {
            display: none;
            position: fixed;
            bottom: 5.5rem;
            right: 1.25rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--c-accent);
            color: #fff;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: var(--shadow-md);
            z-index: 100;
            transition: all .2s;
        }

        .fab:hover {
            transform: translateY(-2px) scale(1.1);
            background: var(--c-accent-dk);
        }

        .fab.visible {
            display: flex;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            bottom: 5.5rem;
            left: 1.25rem;
            z-index: 100;
        }

        .back-btn .btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .back-btn .btn span {
            display: none;
        }

        .back-btn .btn i {
            margin: 0;
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 700px) {
            .sidebar {
                display: none;
            }

            .mobile-nav {
                display: flex;
            }

            .fab {
                display: flex;
            }

            .fab.visible {
                display: flex;
            }

            .back-btn {
                bottom: 5.5rem;
            }

            .shell {
                padding: .75rem .75rem 0;
            }

            .topbar {
                padding: .5rem .75rem;
            }

            .topbar-date {
                display: none;
            }

            .section-head {
                flex-direction: column;
                align-items: stretch;
            }

            .section-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-wrap {
                min-width: unset;
            }

            .filters-row {
                flex-wrap: wrap;
            }

            .result-count {
                margin-left: 0;
            }

            .data-table {
                min-width: 500px;
            }

            .modal {
                max-width: 100%;
                margin: .5rem;
                max-height: 95vh;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .kpi-card {
                padding: .75rem;
            }

            .topbar-user {
                display: none;
            }

            .brand-name {
                font-size: .9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Toast Notifications -->
    <div class="toast-zone" id="toast-zone"></div>

    <!-- Floating Action Button -->
    <button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Back Button -->
    <div class="back-btn">
        <button class="btn btn-ghost" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            <span>Retour</span>
        </button>
    </div>

    <!-- Shell -->
    <div class="shell">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-brand">
                <div class="brand-mark">
                    <img src="logoAppli.png" alt="VisionPro" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fas fa-eye\'></i>'">
                </div>
                <span class="brand-name">Visio<span>Pro</span></span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="current-date"></span>
                <span class="topbar-user" id="topbar-username">Admin</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=3D4FE0&color=fff&size=64" alt="Profil" class="avatar" id="user-avatar">
            </div>
        </header>

        <!-- Main -->
        <div class="main">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <p class="sidebar-label">Gestion de Stock</p>
                <div id="nav-buttons"></div>
            </aside>

            <!-- Content -->
            <div class="content" id="content-area">
                <!-- Les sections sont générées dynamiquement par JavaScript -->
            </div>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav" id="mobile-nav"></nav>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const CONFIG = {
            API_BASE: 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec',
            SESSION_KEYS: {
                USER: 'utilisateur',
                TOKEN: 'apiToken'
            }
        };

        // ============================================================
        // GESTION DU TOKEN
        // ============================================================
        const TokenManager = {
            getToken() {
                return sessionStorage.getItem(CONFIG.SESSION_KEYS.TOKEN) || localStorage.getItem(CONFIG.SESSION_KEYS.TOKEN);
            },
            getUser() {
                return sessionStorage.getItem(CONFIG.SESSION_KEYS.USER) || localStorage.getItem(CONFIG.SESSION_KEYS.USER) || 'Admin';
            },
            isAuthenticated() {
                const token = this.getToken();
                return token && token !== 'undefined' && token !== 'null';
            },
            redirectToLogin() {
                sessionStorage.removeItem(CONFIG.SESSION_KEYS.TOKEN);
                sessionStorage.removeItem(CONFIG.SESSION_KEYS.USER);
                window.location.href = 'code.html';
            },
            checkAndRedirect() {
                if (!this.isAuthenticated()) {
                    this.redirectToLogin();
                    return false;
                }
                return true;
            }
        };

        // ============================================================
        // ÉTAT GLOBAL
        // ============================================================
        const STATE = {
            agencies: [],
            stockData: {},
            currentAgency: null,
            pendingTransferData: null,
            toastId: 0,
            inventaireEnCours: null,
            progressInterval: null
        };

        // ============================================================
        // FONCTIONS UTILITAIRES
        // ============================================================
        const Utils = {
            formatDate: (dateStr) => {
                if (!dateStr) return '';
                try {
                    const date = new Date(dateStr);
                    return isNaN(date.getTime()) ? dateStr : date.toLocaleDateString('fr-FR');
                } catch { return dateStr; }
            },
            formatCurrency: (amount) => {
                const val = typeof amount === 'number' ? amount : parseFloat(amount) || 0;
                return val.toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' FCFA';
            },
            escapeHtml: (text) => {
                if (!text) return '';
                return String(text)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            },
            showToast: (message, type = 'info', duration = 5000) => {
                const container = document.getElementById('toast-zone');
                const id = `toast-${STATE.toastId++}`;
                const toast = document.createElement('div');
                const icons = { success: 'check-circle', error: 'exclamation-circle', warning: 'exclamation-triangle', info: 'info-circle' };
                toast.className = `toast ${type}`;
                toast.id = id;
                toast.innerHTML = `
                    <span class="toast-icon"><i class="fas fa-${icons[type] || 'info-circle'}"></i></span>
                    <span class="toast-msg">${message}</span>
                    <button class="toast-dismiss" onclick="closeToast('${id}')"><i class="fas fa-times"></i></button>
                `;
                container.appendChild(toast);
                setTimeout(() => closeToast(id), duration);
                return id;
            },
            showProgress: (message = 'Traitement en cours...', subMessage = '') => {
                const overlay = document.createElement('div');
                overlay.className = 'progress-overlay active';
                overlay.id = 'global-progress-overlay';
                overlay.innerHTML = `
                    <div class="progress-modal">
                        <div class="progress-icon"><i class="fas fa-spinner fa-spin"></i></div>
                        <div class="progress-text">
                            <h4>${message}</h4>
                            ${subMessage ? `<p>${subMessage}</p>` : ''}
                            <div class="progress-bar"><div class="progress-fill"></div></div>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                const fill = overlay.querySelector('.progress-fill');
                let width = 0;
                const interval = setInterval(() => {
                    if (width < 80) { width += 5; fill.style.width = width + '%'; }
                }, 200);
                overlay.dataset.interval = interval;
            },
            hideProgress: (success = true, message = '') => {
                const overlay = document.getElementById('global-progress-overlay');
                if (!overlay) return;
                clearInterval(overlay.dataset.interval);
                const fill = overlay.querySelector('.progress-fill');
                if (fill) fill.style.width = '100%';
                const content = overlay.querySelector('.progress-text');
                const icon = success ? 'check-circle' : 'exclamation-circle';
                const color = success ? '#1A8A5A' : '#C43B3B';
                const title = success ? 'Succès !' : 'Erreur';
                const defaultMsg = success ? 'Opération terminée avec succès' : 'Une erreur est survenue';
                content.innerHTML = `
                    <div class="progress-icon" style="color:${color}"><i class="fas fa-${icon}"></i></div>
                    <h4>${title}</h4>
                    <p>${message || defaultMsg}</p>
                `;
                setTimeout(() => overlay.remove(), 2000);
            },
            closeModal: () => {
                document.getElementById('modal-container').innerHTML = '';
                document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
            }
        };

        // ============================================================
        // API
        // ============================================================
        const API = {
            async get(action, params = {}) {
                if (!TokenManager.checkAndRedirect()) return;
                const token = TokenManager.getToken();
                const url = new URL(CONFIG.API_BASE);
                url.searchParams.append('action', action);
                url.searchParams.append('token', token);
                Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                    const data = await response.json();

                    if (data.success === false) {
                        if (data.message === 'Session expirée' || data.message === 'Session invalide' || data.message === 'Token invalide') {
                            TokenManager.redirectToLogin();
                            throw new Error(data.message);
                        }
                    }
                    return data;
                } catch (error) {
                    console.error('Erreur API GET:', error);
                    throw error;
                }
            },
            async post(action, data = {}) {
                if (!TokenManager.checkAndRedirect()) return;
                const token = TokenManager.getToken();
                const url = `${CONFIG.API_BASE}?action=${action}`;
                const bodyData = {
                    ...data,
                    token: token,
                    utilisateur: TokenManager.getUser(),
                    timestamp: new Date().toISOString()
                };

                // Mode no-cors - on ne peut pas lire la réponse
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                return { success: true, message: 'Requête envoyée' };
            }
        };

        // ============================================================
        // GESTION DES TOASTS
        // ============================================================
        function closeToast(id) {
            const toast = document.getElementById(id);
            if (toast) toast.remove();
        }

        // ============================================================
        // GESTION DE LA DATE
        // ============================================================
        function updateCurrentDate() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('fr-FR', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
        }

        // ============================================================
        // NAVIGATION
        // ============================================================
        function goBack() {
            window.location.href = 'Accueil.html';
        }

        function handleScroll() {
            const fab = document.getElementById('fab');
            if (fab) {
                fab.classList.toggle('visible', window.scrollY > 300);
            }
        }

        // ============================================================
        // CHARGEMENT DES AGENCES
        // ============================================================
        async function loadAgencies() {
            if (!TokenManager.checkAndRedirect()) return;

            try {
                const json = await API.get('getCategories');
                if (!json.success || !json.data?.categories?.length) throw new Error('Réponse invalide');

                STATE.agencies = json.data.categories;

                STATE.agencies.forEach(({ value }) => {
                    STATE.stockData[value] = { allData: [], filteredData: [] };
                });

                buildUI();
                if (STATE.agencies.length > 0) {
                    STATE.currentAgency = STATE.agencies[0].value;
                    showSection(STATE.currentAgency);
                    loadAgenceStock(STATE.currentAgency);
                }
            } catch (err) {
                console.error('Erreur chargement agences:', err);
                document.getElementById('content-area').innerHTML = `
                    <div class="empty-state" style="padding:3rem 1rem;">
                        <i class="fas fa-exclamation-triangle" style="color:var(--c-red);"></i>
                        <p>Impossible de charger les agences. ${err.message}</p>
                        <button class="btn btn-accent" onclick="loadAgencies()" style="margin-top:.5rem;">Réessayer</button>
                    </div>`;
            }
        }

        // ============================================================
        // CONSTRUCTION DE L'INTERFACE
        // ============================================================
        function buildUI() {
            buildSideNav();
            buildMobileNav();
            buildSections();
        }

        function buildSideNav() {
            const navButtons = document.getElementById('nav-buttons');
            navButtons.innerHTML = STATE.agencies.map(({ value, label }, i) => `
                <button class="nav-item ${i === 0 ? 'active' : ''}" onclick="showSection('${value}')" data-agence="${value}">
                    <i class="fas fa-warehouse"></i>
                    <span>${label.length > 20 ? label.substring(0,18)+'...' : label}</span>
                </button>
            `).join('');
        }

        function buildMobileNav() {
            const mobileNav = document.getElementById('mobile-nav');
            mobileNav.innerHTML = STATE.agencies.map(({ value, label }, i) => `
                <button class="mob-item ${i === 0 ? 'active' : ''}" onclick="showSection('${value}')" data-agence="${value}">
                    <i class="fas fa-warehouse"></i>
                    <span>${label.length > 12 ? label.substring(0,10)+'..' : label}</span>
                </button>
            `).join('');
        }

        function buildSections() {
            document.getElementById('content-area').innerHTML = STATE.agencies.map(({ value, label }, i) => `
                <div id="section-${value}" class="section ${i === 0 ? 'active' : ''}">
                    <div class="section-head">
                        <div>
                            <div class="section-title">${Utils.escapeHtml(label)}</div>
                            <div class="section-sub">Gestion du stock de l'agence</div>
                        </div>
                        <div class="section-actions">
                            <button class="btn btn-accent" onclick="demarrerInventaire('${value}')">
                                <i class="fas fa-clipboard-list"></i> Inventaire
                            </button>
                            <button class="btn btn-warning" onclick="openTransferWizard('${value}')">
                                <i class="fas fa-exchange-alt"></i> Transférer
                            </button>
                            <button class="btn btn-ghost" onclick="refreshStockData('${value}')">
                                <i class="fas fa-sync-alt"></i> Actualiser
                            </button>
                        </div>
                    </div>

<!-- KPI Cards - Stock Physique par Catégorie -->
<div class="kpi-grid" id="kpi-grid-${value}">
    <!-- Les cartes seront générées dynamiquement par JavaScript -->
</div>

                    <!-- Toolbar -->
                    <div class="toolbar">
                        <div class="search-wrap">
                            <i class="fas fa-search"></i>
                            <input type="text" class="search-input" id="search-${value}" placeholder="Rechercher référence..." onkeyup="applyStockFilter('${value}')">
                        </div>
                        <div class="filters-row">
                            <div class="filter-chip" id="chip-${value}-category" onclick="toggleCategoryFilter('${value}')">
                                <span class="chip-label">Catégorie</span>
                                <span class="chip-val" id="chip-${value}-category-val">Tous</span>
                                <span class="chip-caret"><i class="fas fa-chevron-down"></i></span>
                                <div class="chip-drop" id="chip-${value}-category-drop" style="display:none;position:absolute;top:calc(100%+6px);left:0;min-width:170px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:.3rem;z-index:200;box-shadow:0 6px 20px rgba(26,25,22,.1);"></div>
                            </div>
                            <span class="result-count" id="result-count-${value}">0 résultat(s)</span>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="table-card">
                        <div class="table-scroll">
                            <div id="skeleton-${value}" class="skeleton" style="display:none;">
                                <div class="skeleton-row" style="display:flex;padding:.7rem .85rem;gap:1rem;border-bottom:1px solid var(--c-border);">
                                    <div class="skeleton-cell" style="flex:1;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:1;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.7;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                </div>
                                <div class="skeleton-row" style="display:flex;padding:.7rem .85rem;gap:1rem;border-bottom:1px solid var(--c-border);">
                                    <div class="skeleton-cell" style="flex:1;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:1;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.7;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                    <div class="skeleton-cell" style="flex:0.5;height:18px;"></div>
                                </div>
                            </div>
                            <table class="data-table" id="stock-table-${value}">
                                <thead id="stock-header-${value}"></thead>
                                <tbody id="stock-data-${value}">
                                    <tr><td colspan="12"><div class="loading-state"><div class="spinner"></div>Chargement...</div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `).join('');

            // Initialiser les filtres de catégorie pour chaque section
            STATE.agencies.forEach(({ value }) => {
                initCategoryFilter(value);
            });
        }

        // ============================================================
        // GESTION DES FILTRES CATÉGORIE
        // ============================================================
        function toggleCategoryFilter(agenceId) {
            const drop = document.getElementById(`chip-${agenceId}-category-drop`);
            if (drop) {
                drop.style.display = drop.style.display === 'block' ? 'none' : 'block';

        async function loadAgenceStock(agenceId) {
            if (!TokenManager.checkAndRedirect()) return;

            const agency = STATE.agencies.find(a => a.value === agenceId);
            if (!agency) return;

            const tbody = document.getElementById(`stock-data-${agenceId}`);
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="12"><div class="loading-state"><div class="spinner"></div>Chargement...</div></td></tr>`;
            }

            try {
                const idx = STATE.agencies.findIndex(a => a.value === agenceId) + 1;
                const json = await API.get(`stockagence${idx}`);

                if (!json?.data?.rows || !json?.data?.headers) throw new Error('Structure de données invalide');

                STATE.stockData[agenceId].allData = json.data.rows.map(row => {
                    const item = {};
                    json.data.headers.forEach((h, i) => {
                        const key = h.trim();
                        let val = row[i] ?? '';
                        if (['Stock', 'Prix', 'Conso', 'Stock de depart', 'Stock Physique', 'Stock depart'].some(k => key.includes(k))) {
                            val = parseFloat(val) || 0;
                        }
                        item[key] = val;
                    });
                    item['Agence'] = agency.label;
                    return item;
                });

                STATE.stockData[agenceId].filteredData = [];
                STATE.stockData[agenceId].selectedCategory = '';
                generateTableHeaders(agenceId);
                initCategoryFilter(agenceId);
                updateSummaryCards(agenceId);
                displayStockData(agenceId);
                updateLastUpdate(agenceId);
                Utils.showToast(`${STATE.stockData[agenceId].allData.length} produits chargés`, 'success', 2000);
            } catch (err) {
                console.error(`Erreur ${agenceId}:`, err);
                if (tbody) {
                    tbody.innerHTML = `<tr><td colspan="12"><div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--c-red);"></i><p>Erreur: ${err.message}</p></div></td></tr>`;
                }
            }
        }

        function generateTableHeaders(agenceId) {
            const data = STATE.stockData[agenceId]?.allData || [];
            const thead = document.getElementById(`stock-header-${agenceId}`);
            if (!data[0] || !thead) return;
            const headers = Object.keys(data[0]).filter(h => h !== 'User' && h !== 'Agence');
            thead.innerHTML = '<tr>' + headers.map(h => {
                const cls = (h.includes('Prix') || h.includes('Stock') || h.includes('Conso')) ? 'text-end' : '';
                return `<th class="sortable ${cls}" onclick="sortTable('${agenceId}','${h}')">${Utils.escapeHtml(h)}</th>`;
            }).join('') + '</tr>';
        }

        function sortTable(agenceId, column) {
            const data = [...(STATE.stockData[agenceId].filteredData.length ? STATE.stockData[agenceId].filteredData : STATE.stockData[agenceId].allData)];
            data.sort((a, b) => {
                let va = a[column], vb = b[column];
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return -1;
                if (va > vb) return 1;
                return 0;
            });
            STATE.stockData[agenceId].filteredData = data;
            displayStockData(agenceId);
        }

function updateCategoryStockCards(agenceId) {
    const data = STATE.stockData[agenceId]?.allData || [];
    const grid = document.getElementById(`kpi-grid-${agenceId}`);
    if (!grid) return;

    // Grouper par catégorie : stock physique total et stock de départ total
    const categoryData = {};
    data.forEach(item => {
        const cat = item['Catégorie'] || 'Non catégorisé';
        const stockPhysique = parseFloat(item['Stock Physique']) || parseFloat(item['Stock']) || 0;
        const stockDepart = parseFloat(item['Stock de depart']) || parseFloat(item['Stock depart']) || 0;
        
        if (!categoryData[cat]) {
            categoryData[cat] = { stockPhysique: 0, stockDepart: 0 };
        }
        categoryData[cat].stockPhysique += stockPhysique;
        categoryData[cat].stockDepart += stockDepart;
    });

    // Trier par stock physique décroissant
    const sortedCategories = Object.entries(categoryData)
        .sort((a, b) => b[1].stockPhysique - a[1].stockPhysique);

    if (sortedCategories.length === 0) {
        grid.innerHTML = `
            <div class="kpi-card" style="grid-column:1 / -1;text-align:center;padding:1.5rem;">
                <div class="kpi-label" style="justify-content:center;">
                    <span class="kpi-icon" style="background:var(--c-ink3);color:#fff;"><i class="fas fa-info-circle"></i></span>
                    Aucune catégorie
                </div>
                <div class="kpi-value" style="font-size:.9rem;color:var(--c-ink3);">Aucun stock disponible</div>
            </div>
        `;
        return;
    }

    // Couleurs pour les cartes (cycle)
    const colors = [
        { bg: 'var(--c-accent-lt)', color: 'var(--c-accent)' },
        { bg: 'var(--c-green-lt)', color: 'var(--c-green)' },
        { bg: 'var(--c-amber-lt)', color: 'var(--c-amber)' },
        { bg: 'var(--c-red-lt)', color: 'var(--c-red)' },
        { bg: '#E8F0FE', color: '#1A73E8' },
        { bg: '#FCE4EC', color: '#C62828' },
        { bg: '#E8F5E9', color: '#2E7D32' },
        { bg: '#FFF3E0', color: '#E65100' },
        { bg: '#F3E5F5', color: '#6A1B9A' },
        { bg: '#E0F7FA', color: '#00695C' },
    ];

    grid.innerHTML = sortedCategories.map(([category, data], index) => {
        const color = colors[index % colors.length];
        const { stockPhysique, stockDepart } = data;
        
        // Calcul du pourcentage par rapport au stock de départ
        const percentage = stockDepart > 0 ? ((stockPhysique / stockDepart) * 100) : 0;
        const percentageDisplay = percentage.toFixed(1);
        
        // Déterminer le statut (vert si >= 80%, orange si entre 50-80%, rouge si < 50%)
        let statusColor = color.color;
        let statusIcon = 'fa-check-circle';
        let statusText = 'Bon';
        if (percentage < 50) {
            statusColor = 'var(--c-red)';
            statusIcon = 'fa-exclamation-triangle';
            statusText = 'Critique';
        } else if (percentage < 80) {
            statusColor = 'var(--c-amber)';
            statusIcon = 'fa-clock';
            statusText = 'Moyen';
        }
        
        return `
            <div class="kpi-card" style="position:relative;overflow:hidden;">
                <div style="position:absolute;top:0;right:0;bottom:0;width:4px;background:${statusColor};border-radius:0 4px 4px 0;"></div>
                <div class="kpi-label">
                    <span class="kpi-icon" style="background:${color.bg};color:${color.color};"><i class="fas fa-tag"></i></span>
                    ${Utils.escapeHtml(category)}
                    <span style="margin-left:auto;font-size:.65rem;color:${statusColor};font-weight:600;">${percentageDisplay}%</span>
                </div>
                <div class="kpi-value" style="color:${color.color};">${stockPhysique}</div>
                <div class="kpi-unit">
                    <span style="color:var(--c-ink2);">Stock physique</span>
                    <span style="color:var(--c-ink3);margin-left:.5rem;">(départ: ${stockDepart})</span>
                </div>
                <!-- Barre de progression : pourcentage par rapport au stock de départ -->
                <div style="margin-top:.5rem;height:4px;background:var(--c-border);border-radius:2px;overflow:hidden;">
                    <div style="height:100%;width:${Math.min(percentage, 100)}%;background:${statusColor};border-radius:2px;transition:width .6s ease;"></div>
                </div>
                <!-- Indicateur de statut -->
                <div style="margin-top:.4rem;display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:${statusColor};">
                    <i class="fas ${statusIcon}"></i>
                    <span>${statusText}</span>
                    <span style="margin-left:auto;color:var(--c-ink3);font-size:.6rem;">${percentageDisplay}% du stock initial</span>
                </div>
            </div>
        `;
    }).join('');
}
function updateSummaryCards(agenceId) {
    const data = STATE.stockData[agenceId]?.allData || [];
    const totalStock = data.reduce((s, d) => s + (parseFloat(d['Stock Physique']) || parseFloat(d['Stock']) || 0), 0);
    const totalCats = new Set(data.map(d => d['Catégorie']).filter(Boolean)).size;

    // Mettre à jour les KPIs existants
    const productsEl = document.getElementById(`total-products-${agenceId}`);
    if (productsEl) productsEl.textContent = data.length;

    const stockEl = document.getElementById(`total-stock-${agenceId}`);
    if (stockEl) stockEl.textContent = totalStock;

    const catsEl = document.getElementById(`total-categories-${agenceId}`);
    if (catsEl) catsEl.textContent = totalCats;

    // Mettre à jour les cartes par catégorie (NOUVEAU)
    updateCategoryStockCards(agenceId);
}

                        return `<td class="${cls}">${Utils.escapeHtml(v)}</td>`;

            // Mettre à jour le compteur de résultats

                countEl.textContent = `${data.length} résultat${data.length > 1 ? 's' : ''}`;

        function applyStockFilter(agenceId) {
            const term = (document.getElementById(`search-${agenceId}`)?.value || '').toLowerCase().trim();
            const cat = STATE.stockData[agenceId]?.selectedCategory || '';

            let filtered = [...(STATE.stockData[agenceId]?.allData || [])];
            if (term) {
                filtered = filtered.filter(d => {
                    const ref = (d['Référence'] || '').toString().toLowerCase();
                    const desc = (d['Désignation'] || '').toString().toLowerCase();
                    return ref.includes(term) || desc.includes(term);
                });
            }
            if (cat) {
                filtered = filtered.filter(d => d['Catégorie'] === cat);
            }
            STATE.stockData[agenceId].filteredData = filtered;
            displayStockData(agenceId);
        }

        function refreshStockData(agenceId) {
            if (!TokenManager.checkAndRedirect()) return;
            STATE.stockData[agenceId] = { allData: [], filteredData: [], selectedCategory: '' };
            loadAgenceStock(agenceId);
        }

async function regenererCode() {
    if (!TokenManager.checkAndRedirect()) return;

    const btn = document.getElementById('btnVerifierCode');
    const agenceId = document.getElementById('agenceInventaire')?.value;
    const agency = STATE.agencies.find(a => a.value === agenceId);
    const agenceNom = agency?.label || '';

    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
    try {
        await API.get('accesinventaire', { agence: agenceNom });
        showCodeMessage('✅ Nouveau code envoyé par email', 'success');
    } catch {
        showCodeMessage('❌ Erreur', 'error');
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Vérifier';
        }
    }
}

async function verifierCodeAcces() {
    if (!TokenManager.checkAndRedirect()) return;

    const code = document.getElementById('codeInput')?.value.trim();
    const agenceId = document.getElementById('agenceInventaire')?.value;
    const categorie = document.getElementById('categorieInventaire')?.value || '';
    if (!code || code.length !== 6) {
        showCodeMessage('❌ Code à 6 chiffres requis', 'error');
        return;
    }
    const btn = document.getElementById('btnVerifierCode');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        await API.post('codeaccess', { code: code });
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Vérifier';
            showCodeMessage('✅ Code vérifié !', 'success');
            setTimeout(() => {
                Utils.closeModal();
                openInventaireSearchModal(agenceId, categorie);
            }, 1000);
        }, 800);
    } catch {
        showCodeMessage('❌ Erreur de vérification', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Vérifier';
    }
}

function showCodeMessage(msg, type) {
    const d = document.getElementById('codeMessage');
    if (d) {
        d.textContent = msg;
        d.className = `alert-message alert-${type}`;
        d.style.display = 'flex';
        setTimeout(() => d.style.display = 'none', 3000);
    }
}

function rechercheReferenceInventaire() {
    const term = (document.getElementById('invSearchRef')?.value || '').toLowerCase().trim();
    const resultsBox = document.getElementById('invSearchResults');
    if (!resultsBox) return;

    if (!term) {
        resultsBox.style.display = 'none';
        resultsBox.innerHTML = '';
        return;
    }

    const produits = STATE.inventaireEnCours?.produits || [];
    const dejaAjoutes = new Set((STATE.inventaireEnCours?.items || []).map(i => i.reference));

    const matches = produits.filter(p => {
        const ref = (p['Référence'] || '').toString().toLowerCase();
        const desc = (p['Désignation'] || '').toString().toLowerCase();
        return ref.includes(term) || desc.includes(term);
    }).slice(0, 20);

    if (!matches.length) {
        resultsBox.innerHTML = `<div style="padding:.6rem .8rem;color:var(--c-ink3);font-size:.82rem;">Aucun résultat</div>`;
        resultsBox.style.display = 'block';
        return;
    }

    resultsBox.innerHTML = matches.map(p => {
        const ref = p['Référence'] || '';
        const stock = p['Stock Physique'] ?? p['Stock'] ?? 0;
        const already = dejaAjoutes.has(ref);
        return `<div style="padding:.55rem .8rem;cursor:${already ? 'not-allowed' : 'pointer'};font-size:.82rem;border-bottom:1px solid var(--c-border);opacity:${already ? '.5' : '1'};display:flex;justify-content:space-between;gap:.5rem;"
                     ${already ? '' : `onmouseover="this.style.background='var(--c-accent-lt)'" onmouseout="this.style.background=''" onclick="selectionnerReferenceInventaire('${Utils.escapeHtml(ref)}')"`}>
                    <span><strong>${Utils.escapeHtml(ref)}</strong>${p['Désignation'] ? ' — ' + Utils.escapeHtml(p['Désignation']) : ''}</span>
                    <span style="color:var(--c-ink3);">${already ? 'déjà ajouté' : 'stock: ' + stock}</span>
                </div>`;
    }).join('');
    resultsBox.style.display = 'block';
}

function selectionnerReferenceInventaire(reference) {
    const produits = STATE.inventaireEnCours?.produits || [];
    const produit = produits.find(p => (p['Référence'] || '') === reference);
    if (!produit) return;

    const stockActuel = produit['Stock Physique'] ?? produit['Stock'] ?? 0;

    STATE.inventaireEnCours.selection = {
        reference,
        categorie: produit['Catégorie'] || '',
        prix: produit['Prix de vente'] || 0,
        stockDepart: produit['Stock de depart'] ?? produit['Stock depart'] ?? 0,
        stockActuel
    };

    document.getElementById('invSelRef').value = reference;
    document.getElementById('invSelStockActuel').value = stockActuel;
    document.getElementById('invSelNouvelleQte').value = '';
    document.getElementById('invSelectedForm').style.display = 'flex';

    document.getElementById('invSearchResults').style.display = 'none';
    document.getElementById('invSearchRef').value = '';

    setTimeout(() => document.getElementById('invSelNouvelleQte')?.focus(), 100);
}

function ajouterReferenceInventaire() {
    const sel = STATE.inventaireEnCours?.selection;
    if (!sel) {
        showInventaireMessage("Sélectionnez d'abord une référence", 'warning');
        return;
    }
    const nouvelleQteInput = document.getElementById('invSelNouvelleQte');
    const nouvelleQte = parseInt(nouvelleQteInput?.value);
    if (isNaN(nouvelleQte) || nouvelleQte < 0) {
        showInventaireMessage('Veuillez saisir une quantité valide', 'error');
        return;
    }

    STATE.inventaireEnCours.items = STATE.inventaireEnCours.items.filter(i => i.reference !== sel.reference);
    STATE.inventaireEnCours.items.push({
        reference: sel.reference,
        categorie: sel.categorie,
        prix: sel.prix,
        stockDepart: sel.stockDepart,
        ancienneQuantite: sel.stockActuel,
        nouvelleQuantite: nouvelleQte
    });

    STATE.inventaireEnCours.selection = null;
    document.getElementById('invSelectedForm').style.display = 'none';

    renderListeInventaireItems();
    Utils.showToast(`${sel.reference} ajouté`, 'success', 1500);
    setTimeout(() => document.getElementById('invSearchRef')?.focus(), 100);
}

function supprimerReferenceInventaire(reference) {
    if (!STATE.inventaireEnCours) return;
    STATE.inventaireEnCours.items = STATE.inventaireEnCours.items.filter(i => i.reference !== reference);
    renderListeInventaireItems();
}

function renderListeInventaireItems() {
    const items = STATE.inventaireEnCours?.items || [];
    const tbody = document.getElementById('invListeItems');
    const compteur = document.getElementById('invCompteur');
    if (compteur) compteur.textContent = `${items.length} référence(s) à mettre à jour`;
    if (!tbody) return;

    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="no-data">Aucune référence ajoutée pour le moment</div></td></tr>`;
        return;
    }

    tbody.innerHTML = items.map(it => `
        <tr>
            <td>${Utils.escapeHtml(it.reference)}</td>
            <td>${Utils.escapeHtml(it.categorie)}</td>
            <td class="text-end">${it.ancienneQuantite}</td>
            <td class="text-end"><strong>${it.nouvelleQuantite}</strong></td>
            <td class="text-center">
                <button class="btn btn-danger" style="padding:.25rem .5rem;font-size:.7rem;" onclick="supprimerReferenceInventaire('${Utils.escapeHtml(it.reference)}')">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

async function validerMiseAJourInventaire() {
    if (!TokenManager.checkAndRedirect()) return;

    const agenceId = STATE.inventaireEnCours?.agenceId;
    const items = STATE.inventaireEnCours?.items || [];
    const agency = STATE.agencies.find(a => a.value === agenceId);

    if (!items.length) {
        showInventaireMessage('Aucune référence à mettre à jour', 'warning');
        return;
    }
    if (!confirm(`${items.length} référence(s) à mettre à jour ?`)) return;

    const modifications = items.map(it => ({
        reference: it.reference,
        categorie: it.categorie,
        agence: agency?.label || agenceId,
        prix: it.prix,
        nouvelleQuantite: it.nouvelleQuantite,
        ancienneQuantite: it.ancienneQuantite
    }));

    const btn = document.getElementById('btnValiderInventaire');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    Utils.showProgress('Mise à jour...');

    try {
        await API.post('inventaire', {
            action: 'inventaire',
            agence: agency?.label || agenceId,
            modifications,
            timestamp: new Date().toISOString()
        });

        Utils.hideProgress(true, 'Inventaire mis à jour');
        showInventaireMessage(`✅ ${modifications.length} référence(s) mise(s) à jour`, 'success');
        setTimeout(() => {
            Utils.closeModal();
            STATE.inventaireEnCours = null;
            refreshStockData(agenceId);
        }, 1500);
    } catch {
        Utils.hideProgress(false, 'Erreur');
        showInventaireMessage('❌ Erreur de connexion', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Valider la mise à jour';
    }
}

function showInventaireMessage(msg, type) {
    const d = document.getElementById('inventaire-message');
    if (d) {
        d.textContent = msg;
        d.className = `alert-message alert-${type}`;
        d.style.display = 'flex';
        setTimeout(() => d.style.display = 'none', 3000);
    }
}
