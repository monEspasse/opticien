function addProductRow() {
    const container = document.getElementById('product-rows-container');
    const rows = container.querySelectorAll('.product-row');
    const newRowNum = rows.length + 1;

    const firstRow = rows[0];
    const newRow = firstRow.cloneNode(true);

    newRow.dataset.row = newRowNum;
    newRow.querySelectorAll('[data-row]').forEach(el => el.dataset.row = newRowNum);

    const select = newRow.querySelector('.product-select');
    const qty = newRow.querySelector('.product-qty');

    select.innerHTML = document.querySelector('.product-select').innerHTML; // options complètes, non filtrées
    select.value = '';
    select.onchange = function() { updateProductRowInfo(this); };

    qty.value = 1;
    qty.removeAttribute('max');
    qty.oninput = function() { clampProductQty(this); };

    container.appendChild(newRow);
    refreshProductOptionsAvailability();
    updateTransferSummary();
    setTimeout(() => select.focus(), 100);
}

function removeProductRow(btn) {
    const container = document.getElementById('product-rows-container');
    const rows = container.querySelectorAll('.product-row');
    if (rows.length <= 1) {
        showTransferMessage('Au moins un produit est requis', 'warning');
        return;
    }
    const row = btn.closest('.product-row');
    row.remove();
    document.querySelectorAll('.product-row').forEach((r, i) => {
        r.dataset.row = i + 1;
        r.querySelectorAll('[data-row]').forEach(el => el.dataset.row = i + 1);
    });
    refreshProductOptionsAvailability();
    updateTransferSummary();
}

// Empêche de choisir deux fois la même référence : elle est désactivée
// dans tous les autres selects dès qu'elle est prise dans une ligne.
function refreshProductOptionsAvailability() {
    const selects = document.querySelectorAll('.product-select');
    const selectedRefs = Array.from(selects).map(s => s.value).filter(v => v);

    selects.forEach(select => {
        const currentValue = select.value;
        Array.from(select.options).forEach(opt => {
            if (!opt.value) return;
            const takenByAnotherRow = selectedRefs.includes(opt.value) && opt.value !== currentValue;
            opt.disabled = takenByAnotherRow;
            opt.style.color = takenByAnotherRow ? 'var(--c-ink3)' : '';
        });
    });
}

// Empêche de dépasser le stock disponible, que ce soit en changeant
// de produit ou en tapant directement une quantité trop grande.
function clampProductQty(input) {
    const row = input.closest('.product-row');
    const select = row.querySelector('.product-select');
    const maxStock = parseInt(select.options[select.selectedIndex]?.dataset?.stock) || 0;

    if (maxStock > 0) {
        if (!input.value || parseInt(input.value) < 1) {
            input.value = 1;
        } else if (parseInt(input.value) > maxStock) {
            input.value = maxStock;
            showTransferMessage(`Quantité limitée au stock disponible (max: ${maxStock})`, 'warning');
        }
    }
    updateTransferSummary();
}

function updateProductRowInfo(select) {
    const qtyInput = select.closest('.product-row').querySelector('.product-qty');
    const maxStock = parseInt(select.options[select.selectedIndex]?.dataset?.stock) || 0;

    if (qtyInput) {
        if (maxStock > 0) {
            qtyInput.max = maxStock;
            if (!qtyInput.value || parseInt(qtyInput.value) < 1) qtyInput.value = 1;
            if (parseInt(qtyInput.value) > maxStock) qtyInput.value = maxStock;
        } else {
            qtyInput.removeAttribute('max');
        }
    }

    refreshProductOptionsAvailability();
    updateTransferSummary();
}

function updateTransferSummary() {
    const rows = document.querySelectorAll('.product-row');
    let count = 0;
    let totalQty = 0;

    rows.forEach(row => {
        const select = row.querySelector('.product-select');
        const qty = parseInt(row.querySelector('.product-qty')?.value) || 0;
        if (select && select.value) {
            count++;
            totalQty += qty;
        }
    });

    const countEl = document.getElementById('product-count');
    const badgeEl = document.getElementById('total-items-badge');
    if (countEl) countEl.textContent = count;
    if (badgeEl) badgeEl.textContent = `${totalQty} unité${totalQty > 1 ? 's' : ''}`;
}

function showTransferMessage(msg, type) {
    const div = document.getElementById('transfer-message');
    if (div) {
        div.textContent = msg;
        div.className = `alert-message alert-${type}`;
        div.style.display = 'flex';
        setTimeout(() => div.style.display = 'none', 3000);
    }
}

async function submitTransferRequest(sourceAgenceId) {
    if (!TokenManager.checkAndRedirect()) return;

    const products = [];
    const rows = document.querySelectorAll('.product-row');
    const refsSeen = new Set();
    let hasError = false;

    rows.forEach(row => {
        const select = row.querySelector('.product-select');
        const qty = parseInt(row.querySelector('.product-qty')?.value) || 0;

        if (select && select.value) {
            // Garde-fou côté validation finale, en plus du disabled sur les options
            if (refsSeen.has(select.value)) {
                showTransferMessage(`La référence "${select.value}" est sélectionnée plusieurs fois`, 'error');
                hasError = true;
                return;
            }
            refsSeen.add(select.value);

            const stock = parseInt(select.options[select.selectedIndex]?.dataset?.stock) || 0;
            if (qty <= 0) {
                showTransferMessage(`Quantité invalide pour ${select.value}`, 'error');
                hasError = true;
                return;
            }
            // Garde-fou côté validation finale, en plus du clamp en temps réel
            if (qty > stock) {
                showTransferMessage(`Stock insuffisant pour ${select.value} (max: ${stock})`, 'error');
                hasError = true;
                return;
            }
            products.push({
                reference: select.value,
                quantite: qty,
                categorie: select.options[select.selectedIndex]?.dataset?.categorie || '',
                prix: parseFloat(select.options[select.selectedIndex]?.dataset?.prix) || 0,
                stock_actuel: stock
            });
        }
    });

    if (hasError) return;

    if (products.length === 0) {
        showTransferMessage('Veuillez sélectionner au moins un produit', 'warning');
        return;
    }

    const targetAgencyId = document.getElementById('transfer-target-agency')?.value;
    if (!targetAgencyId) {
        showTransferMessage('Veuillez sélectionner une agence de destination', 'warning');
        return;
    }

    const sourceAgency = STATE.agencies.find(a => a.value === sourceAgenceId);
    const targetAgency = STATE.agencies.find(a => a.value === targetAgencyId);

    const btn = document.getElementById('btnSubmitTransfer');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';

    Utils.showProgress('Préparation du transfert...');

    try {
        await API.post('transfert_request', {
            source_agence: sourceAgency?.label || sourceAgenceId,
            target_agence: targetAgency?.label || targetAgencyId,
            source_agence_id: sourceAgenceId,
            target_agence_id: targetAgencyId,
            produits: products,
            utilisateur: TokenManager.getUser(),
            total_produits: products.length,
            quantite_totale: products.reduce((sum, p) => sum + p.quantite, 0)
        });

        Utils.hideProgress(true, 'Demande envoyée');

        STATE.pendingTransferData = {
            sourceAgenceId: sourceAgenceId,
            targetAgencyId: targetAgencyId,
            produits: products,
            sourceAgency: sourceAgency,
            targetAgency: targetAgency
        };

        showTransferMessage('✅ Demande envoyée ! Un code de validation a été envoyé par email.', 'success');

        setTimeout(() => {
            const modal = document.getElementById('transferWizardModal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            }
            openTransferCodeVerification();
        }, 1500);

    } catch (error) {
        Utils.hideProgress(false, 'Erreur');
        showTransferMessage('❌ Erreur: ' + (error.message || 'Connexion échouée'), 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Demander le transfert';
    }
}

        function openTransferCodeVerification() {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay active" id="codeVerificationModalTransfer">
                    <div class="modal">
                        <div class="modal-head">
                            <span class="modal-head-title"><i class="fas fa-shield-alt" style="color:var(--c-accent);margin-right:.5rem;"></i>Vérification du transfert</span>
                            <button class="modal-close" onclick="Utils.closeModal()"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="modal-body">
                            <div class="alert-message alert-info" style="margin-bottom:1rem;">
                                <i class="fas fa-envelope"></i>
                                Un code à 6 chiffres a été envoyé à l'administrateur.
                                <br><small>Veuillez contacter l'administrateur pour obtenir le code.</small>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Code de validation :</label>
                                <input type="text" class="form-control" id="transferCodeInput"
                                       maxlength="6" placeholder="000000"
                                       inputmode="numeric"
                                       style="font-size:1.5rem;text-align:center;letter-spacing:5px;"
                                       oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6)">
                            </div>
                            <div id="transferCodeMessage" class="alert-message" style="display:none;"></div>
                        </div>
                        <div class="modal-foot">
                            <button class="btn btn-ghost" onclick="Utils.closeModal()">Annuler</button>
                            <button class="btn btn-success" onclick="validateTransferCode()" id="btnValidateTransferCode">
                                <i class="fas fa-check"></i> Valider et transférer
                            </button>
                        </div>
                    </div>
                </div>`;
            setTimeout(() => document.getElementById('transferCodeInput')?.focus(), 300);
        }

        function showTransferCodeMessage(msg, type) {
            const div = document.getElementById('transferCodeMessage');
            if (div) {
                div.textContent = msg;
                div.className = `alert-message alert-${type}`;
                div.style.display = 'flex';
                setTimeout(() => div.style.display = 'none', 3000);
            }
        }

        async function validateTransferCode() {
            const code = document.getElementById('transferCodeInput')?.value.trim();
            if (!code || code.length !== 6) {
                showTransferCodeMessage('Veuillez saisir un code à 6 chiffres', 'error');
                return;
            }

            const btn = document.getElementById('btnValidateTransferCode');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';

            try {
                await API.post('codeaccess', { code: code });

                showTransferCodeMessage('✅ Code validé ! Transfert en cours...', 'success');

                if (!STATE.pendingTransferData) {
                    throw new Error('Données de transfert manquantes. Veuillez recommencer.');
                }

                const { sourceAgenceId, targetAgencyId, produits, sourceAgency, targetAgency } = STATE.pendingTransferData;

                Utils.showProgress('Transfert en cours...');

                let successCount = 0;
                for (const produit of produits) {
                    try {
                        await API.post('transfert_stock', {
                            source_agence: sourceAgency?.label || sourceAgenceId,
                            target_agence: targetAgency?.label || targetAgencyId,
                            reference: produit.reference,
                            categorie: produit.categorie,
                            quantite: produit.quantite,
                            prix: produit.prix,
                            utilisateur: TokenManager.getUser()
                        });
                        successCount++;
                    } catch (err) {
                        console.error(`Erreur transfert ${produit.reference}:`, err);
                        Utils.showToast(`Erreur pour ${produit.reference}`, 'error', 2000);
                    }
                }

                Utils.hideProgress(true, `${successCount} produit(s) transféré(s)`);

                if (successCount === produits.length) {
                    showTransferCodeMessage(`✅ Transfert terminé ! ${successCount} produit(s) transféré(s).`, 'success');
                    Utils.showToast(`✅ ${successCount} produit(s) transféré(s) avec succès`, 'success', 3000);
                } else {
                    showTransferCodeMessage(`⚠️ ${successCount}/${produits.length} produit(s) transféré(s). Vérifiez les erreurs.`, 'warning');
                }

                setTimeout(() => {
                    Utils.closeModal();
                    STATE.pendingTransferData = null;
                    refreshStockData(sourceAgenceId);
                    if (targetAgencyId) refreshStockData(targetAgencyId);
                }, 1500);

            } catch (error) {
                Utils.hideProgress(false, 'Erreur');
                showTransferCodeMessage('❌ Code invalide ou erreur: ' + (error.message || 'Vérification échouée'), 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Valider et transférer';
            }
        }

        // ============================================================
        // INITIALISATION
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            if (!TokenManager.checkAndRedirect()) return;

            const username = TokenManager.getUser();
            document.getElementById('topbar-username').textContent = username;
            document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=3D4FE0&color=fff&size=64`;

            updateCurrentDate();
            window.addEventListener('scroll', handleScroll);
            loadAgencies();
        });

        // Exposer les fonctions globalement
        window.showSection = showSection;
        window.goBack = goBack;
        window.closeToast = closeToast;
        window.sortTable = sortTable;
        window.applyStockFilter = applyStockFilter;
        window.refreshStockData = refreshStockData;
        window.demarrerInventaire = demarrerInventaire;
        window.regenererCode = regenererCode;
        window.verifierCodeAcces = verifierCodeAcces;
        window.validerMiseAJourInventaire = validerMiseAJourInventaire;
        window.imprimerInventairePDF = imprimerInventairePDF;
        window.openTransferWizard = openTransferWizard;
        window.addProductRow = addProductRow;
        window.removeProductRow = removeProductRow;
        window.updateProductRowInfo = updateProductRowInfo;
        window.submitTransferRequest = submitTransferRequest;
        window.validateTransferCode = validateTransferCode;
        window.toggleCategoryFilter = toggleCategoryFilter;
        window.selectCategoryFilter = selectCategoryFilter;
        window.Utils = Utils;
        window.TokenManager = TokenManager;
        window.openCategorieInventaireDialog = openCategorieInventaireDialog;
window.confirmerCategorieInventaire = confirmerCategorieInventaire;
window.openQuestionMiseAJourDialog = openQuestionMiseAJourDialog;
window.openInventaireSearchModal = openInventaireSearchModal;
window.rechercheReferenceInventaire = rechercheReferenceInventaire;
window.selectionnerReferenceInventaire = selectionnerReferenceInventaire;
window.ajouterReferenceInventaire = ajouterReferenceInventaire;
window.supprimerReferenceInventaire = supprimerReferenceInventaire;
        window.clampProductQty = clampProductQty;
window.refreshProductOptionsAvailability = refreshProductOptionsAvailability;
    </script>
</body>
</html>
