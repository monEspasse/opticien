<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisioPro - Accès Sécurisé</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* GLOBAL */
        :root {
            --primary-color: #6C63FF;
            --primary-light: #8B85FF;
            --primary-dark: #5A52D5;
            --accent-color: #FF6584;
            --text-light: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.35);
            --glass-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: url("image.png") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(108, 99, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 101, 132, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .floating-elements {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .floating-element:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { width: 120px; height: 120px; top: 70%; left: 80%; animation-delay: -5s; }
        .floating-element:nth-child(3) { width: 60px; height: 60px; top: 20%; left: 85%; animation-delay: -10s; }
        .floating-element:nth-child(4) { width: 100px; height: 100px; top: 80%; left: 15%; animation-delay: -7s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(10px) rotate(240deg); }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container img {
            height: 50px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .logo-container h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: linear-gradient(90deg, var(--text-light), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .login-box:hover::before { opacity: 1; }
        .login-box:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }

        h2 {
            text-align: center;
            color: var(--text-light);
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 0 6px rgba(0,0,0,0.25);
            position: relative;
            padding-bottom: 15px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
        }

        label {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .input-group { margin-bottom: 25px; }

        .input-field {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 0 15px;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .input-field::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: var(--transition);
        }

        .input-field:focus-within::before { left: 100%; }

        .input-field input {
            flex: 1;
            padding: 14px 0;
            background: none;
            border: none;
            outline: none;
            color: var(--text-light);
            font-size: 1rem;
        }

        .input-field input::placeholder { color: var(--text-muted); }
        .input-field i { color: var(--text-light); font-size: 1rem; margin-right: 10px; transition: var(--transition); }
        .input-field:focus-within { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.3); }
        .input-field:focus-within i { color: var(--primary-light); }

        .toggle-password { cursor: pointer; transition: var(--transition); }
        .toggle-password:hover { color: var(--primary-light); transform: scale(1.1); }

        .login-button {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            color: var(--text-light);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            backdrop-filter: blur(6px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: var(--transition);
        }

        .login-button:hover::before { left: 100%; }
        .login-button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108, 99, 255, 0.6); }
        .login-button:active { transform: translateY(0); }
        .login-button.disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-muted); }
        .remember-me input { accent-color: var(--primary-color); }
        .forgot-password { color: var(--text-muted); text-decoration: none; transition: var(--transition); }
        .forgot-password:hover { color: var(--primary-light); }

        .separator {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .separator span { padding: 0 15px; }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-light);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-3px); }
        .social-btn.google:hover { color: #DB4437; }
        .social-btn.facebook:hover { color: #4267B2; }
        .social-btn.twitter:hover { color: #1DA1F2; }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .register-link a { color: var(--primary-light); text-decoration: none; font-weight: 600; transition: var(--transition); }
        .register-link a:hover { color: var(--accent-color); }

        #message {
            margin-top: 15px;
            padding: 12px;
            font-size: 0.9rem;
            border-radius: 10px;
            text-align: center;
            display: none;
            backdrop-filter: blur(10px);
        }

        .error-message { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }
        .success-message { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .warning-message { background: rgba(255, 165, 0, 0.2); color: #ffa500; border: 1px solid rgba(255, 165, 0, 0.3); }

        .welcome-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px 60px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            z-index: 1000;
            text-align: center;
            animation: fadeInScale 0.5s ease-out;
            display: none;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .welcome-message i { font-size: 70px; color: var(--primary-light); margin-bottom: 20px; }
        .welcome-message h3 { color: var(--text-light); font-size: 2rem; margin-bottom: 15px; font-weight: 600; }
        .welcome-message p { color: var(--text-muted); font-size: 1.1rem; }
        .welcome-message .user-name { color: var(--accent-color); font-weight: 700; font-size: 1.3rem; margin-top: 10px; }

        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: none;
        }

        .countdown-timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; padding: 15px 20px; }
            .login-box { padding: 30px 25px; }
            h2 { font-size: 1.5rem; }
            .login-options { flex-direction: column; gap: 15px; align-items: flex-start; }
            .welcome-message { padding: 30px 40px; width: 90%; }
            .welcome-message h3 { font-size: 1.5rem; }
            .welcome-message i { font-size: 50px; }
        }

        @media (max-width: 480px) {
            .logo-container h1 { font-size: 1.5rem; }
            .login-box { padding: 25px 20px; }
            h2 { font-size: 1.4rem; }
            .welcome-message { padding: 25px 30px; }
            .welcome-message h3 { font-size: 1.3rem; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse 1.5s infinite ease-in-out; }

        input:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>

<body>
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="welcome-overlay" id="welcomeOverlay"></div>
    <div class="welcome-message" id="welcomeMessage">
        <i class="fas fa-user-circle"></i>
        <h3>Bonjour</h3>
        <div class="user-name" id="userNameDisplay"></div>
        <p>Bienvenue sur VisioPro</p>
    </div>

    <header>
        <div class="logo-container">
            <img src="logoSF.png" alt="Logo" onerror="this.style.display='none'">
            <h1>VisioPro</h1>
        </div>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h2>Connexion</h2>

            <form id="login-form">
                <div class="input-group">
                    <label>Nom d'utilisateur</label>
                    <div class="input-field">
                        <i class="fa fa-user"></i>
                        <input type="text" id="username" placeholder="Entrez votre nom" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <div class="input-field">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Mot de passe" required autocomplete="current-password">
                        <i class="fa fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Connexion
                </button>

                <div id="message"></div>
                <div id="countdownDisplay" class="countdown-timer" style="display: none;"></div>
            </form>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec';
        
        // ==================== FONCTIONS DE SÉCURITÉ ====================
        
        function sanitizeInput(input) {
            if (!input) return '';
            return String(input)
                .replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                })
                .substring(0, 255);
        }
        
        function isValidUsername(username) {
            const validPattern = /^[a-zA-Z0-9_@.\-]{3,50}$/;
            return validPattern.test(username);
        }
        
        // ==================== GESTION DU TOKEN ====================
        
        function getApiToken() {
            return sessionStorage.getItem('apiToken');
        }
        
        function setApiToken(token) {
            if (token) sessionStorage.setItem('apiToken', token);
        }
        
        function clearApiToken() {
            sessionStorage.removeItem('apiToken');
            sessionStorage.removeItem('utilisateur');
            sessionStorage.removeItem('isAdmin');
            sessionStorage.removeItem('hasCaisseAccess');
            sessionStorage.removeItem('agence');
            sessionStorage.removeItem('analyse');
        }
        
        
        async function apiCall(action, data = {}) {
            const token = getApiToken();
            
            if (!token && action !== 'login') {
                console.error('❌ Pas de token, redirection vers login');
                window.location.href = 'index.html';
                throw new Error('Non authentifié');
            }
            
            // Construire l'URL avec tous les paramètres (méthode GET)
            const params = new URLSearchParams();
            params.append('action', action);
            
            // Ajouter le token si présent
            if (token) params.append('token', token);
            
            // Ajouter toutes les données
            for (const [key, value] of Object.entries(data)) {
                if (value !== undefined && value !== null) {
                    if (typeof value === 'object') {
                        params.append(key, JSON.stringify(value));
                    } else {
                        params.append(key, String(value));
                    }
                }
            }
            
            const url = `${SCRIPT_URL}?${params.toString()}`;
            
            // Pour les logs (masquer les données sensibles)
            const logUrl = url.replace(/password=[^&]*/, 'password=***');
            console.log(`📡 API Call (GET): ${action}`, logUrl);
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                
                if (!result.success && result.message && result.message.includes('Session')) {
                    console.warn('⚠️ Session expirée, redirection');
                    clearApiToken();
                    window.location.href = 'index.html';
                }
                
                return result;
                
            } catch (error) {
                console.error(`❌ Erreur API ${action}:`, error);
                return {
                    success: false,
                    message: 'Erreur de connexion au serveur',
                    errorDetails: error.message
                };
            }
        }
        

        const STORAGE_KEY = "visiopro_login_block";
        const MAX_ATTEMPTS = 3;
        const BLOCK_DURATION_MS = 60 * 1000;
        
        let blockData = null;
        let countdownInterval = null;
        
        function initBlockSystem() {
            const stored = localStorage.getItem(STORAGE_KEY);
            const now = Date.now();
            
            if (stored) {
                try {
                    blockData = JSON.parse(stored);
                    if (blockData.isBlocked) {
                        const remaining = blockData.blockedUntil - now;
                        if (remaining > 0) {
                            activateBlockade(remaining);
                            return;
                        } else {
                            resetBlockState();
                        }
                    } else {
                        const lastAttemptTime = blockData.lastAttemptTime || 0;
                        if (now - lastAttemptTime > 3600000) resetBlockState();
                    }
                } catch(e) { resetBlockState(); }
            } else {
                resetBlockState();
            }
        }
        
        function resetBlockState() {
            blockData = { attempts: 0, isBlocked: false, blockedUntil: null, lastAttemptTime: null };
            saveBlockState();
        }
        
        function saveBlockState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(blockData));
        }
        
        function registerFailedAttempt() {
            if (blockData.isBlocked) return false;
            blockData.attempts++;
            blockData.lastAttemptTime = Date.now();
            
            if (blockData.attempts >= MAX_ATTEMPTS) {
                blockData.isBlocked = true;
                blockData.blockedUntil = Date.now() + BLOCK_DURATION_MS;
                saveBlockState();
                activateBlockade(BLOCK_DURATION_MS);
                return true;
            }
            saveBlockState();
            return false;
        }
        
        function activateBlockade(remainingMs) {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('message');
            const countdownDiv = document.getElementById('countdownDisplay');
            
            usernameInput.disabled = true;
            passwordInput.disabled = true;
            loginBtn.disabled = true;
            loginBtn.classList.add('disabled');
            
            const secondsRemaining = Math.ceil(remainingMs / 1000);
            messageDiv.textContent = `⛔ Trop de tentatives échouées. Accès bloqué pour ${secondsRemaining} secondes.`;
            messageDiv.className = 'warning-message';
            messageDiv.style.display = 'block';
            countdownDiv.style.display = 'block';
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            let remaining = remainingMs;
            countdownInterval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    resetBlockState();
                    deactivateBlockade();
                } else {
                    const secs = Math.ceil(remaining / 1000);
                    countdownDiv.textContent = `⏱️ Accès bloqué. Réessayez dans ${secs} secondes...`;
                }
            }, 1000);
        }
        
        function deactivateBlockade() {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('message');
            const countdownDiv = document.getElementById('countdownDisplay');
            
            usernameInput.disabled = false;
            passwordInput.disabled = false;
            loginBtn.disabled = false;
            loginBtn.classList.remove('disabled');
            messageDiv.style.display = 'none';
            countdownDiv.style.display = 'none';
            
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        }
        
        function isAccessBlocked() {
            if (blockData && blockData.isBlocked) {
                if (Date.now() < blockData.blockedUntil) return true;
                resetBlockState();
                deactivateBlockade();
                return false;
            }
            return false;
        }
        
        // ==================== FONCTIONS PRINCIPALES ====================
        
        const form = document.getElementById('login-form');
        const message = document.getElementById('message');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInputField = document.getElementById('password');
        const welcomeMessageDiv = document.getElementById('welcomeMessage');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const userNameDisplay = document.getElementById('userNameDisplay');
        
        function showWelcomeMessage(username) {
            const safeUsername = sanitizeInput(username);
            userNameDisplay.textContent = safeUsername;
            welcomeOverlay.style.display = 'block';
            welcomeMessageDiv.style.display = 'block';
            
            setTimeout(() => {
                welcomeMessageDiv.style.animation = 'fadeInScale 0.3s reverse';
                setTimeout(() => {
                    welcomeMessageDiv.style.display = 'none';
                    welcomeOverlay.style.display = 'none';
                    welcomeMessageDiv.style.animation = '';
                }, 300);
            }, 3000);
        }
        
        if (togglePassword) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInputField.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInputField.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
        
        // Formulaire de connexion
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (isAccessBlocked()) {
                    message.textContent = "⛔ Accès temporairement bloqué. Veuillez patienter.";
                    message.className = 'warning-message';
                    message.style.display = 'block';
                    return;
                }
                
                const username = sanitizeInput(document.getElementById('username').value.trim());
                const password = document.getElementById('password').value.trim();
                
                if (!username || !password) {
                    message.textContent = "Veuillez remplir tous les champs.";
                    message.className = 'error-message';
                    message.style.display = 'block';
                    return;
                }
                
                if (!isValidUsername(username)) {
                    message.textContent = "Nom d'utilisateur invalide (3-50 caractères)";
                    message.className = 'error-message';
                    message.style.display = 'block';
                    return;
                }
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
                submitBtn.disabled = true;
                message.style.display = 'none';
                
                try {
                    // Utiliser GET pour éviter CORS
                    const result = await apiCall('login', {
                        username: username,
                        password: password
                    });
                    
                    if (result.success && result.data && result.data.token) {
                        setApiToken(result.data.token);
                        sessionStorage.setItem("utilisateur", username);
                        sessionStorage.setItem("isAdmin", result.data.isAdmin ? "true" : "false");
                        sessionStorage.setItem("hasCaisseAccess", result.data.hasCaisseAccess ? "true" : "false");
                        sessionStorage.setItem("agence", result.data.agence || "");
                        sessionStorage.setItem("analyse", result.data.analyse || "");
                        
                        resetBlockState();
                        deactivateBlockade();
                        showWelcomeMessage(username);
                        
                        message.textContent = 'Connexion réussie ! Redirection...';
                        message.className = 'success-message';
                        message.style.display = 'block';
                        
                        setTimeout(() => { window.location.href = 'Accueil.html'; }, 2000);
                        
                    } else {
                        const wasBlocked = registerFailedAttempt();
                        const remainingAttempts = MAX_ATTEMPTS - blockData.attempts;
                        
                        if (wasBlocked) {
                            message.textContent = "⛔ 3 tentatives échouées. Accès bloqué 1 minute.";
                            message.className = 'warning-message';
                        } else {
                            message.textContent = result.message || 'Identifiants incorrects.';
                            message.className = 'error-message';
                            
                            if (remainingAttempts > 0 && remainingAttempts < MAX_ATTEMPTS) {
                                setTimeout(() => {
                                    if (message.textContent.includes('incorrects')) {
                                        message.textContent = `⚠️ Il reste ${remainingAttempts} tentative(s) avant blocage.`;
                                        message.className = 'warning-message';
                                        setTimeout(() => {
                                            if (message.textContent.includes('reste')) message.style.display = 'none';
                                        }, 3000);
                                    }
                                }, 1500);
                            }
                        }
                        message.style.display = 'block';
                        form.classList.add('shake');
                        setTimeout(() => form.classList.remove('shake'), 500);
                    }
                    
                } catch (error) {
                    console.error('Erreur:', error);
                    message.textContent = "Erreur de connexion au serveur.";
                    message.className = 'error-message';
                    message.style.display = 'block';
                } finally {
                    submitBtn.innerHTML = originalBtnText;
                    if (!blockData.isBlocked) submitBtn.disabled = false;
                }
            });
        }
        
        // Initialisation
        console.log('=== APPLICATION SÉCURISÉE DÉMARRÉE ===');
        initBlockSystem();
        
        if (isAccessBlocked() && blockData && blockData.blockedUntil) {
            const remaining = blockData.blockedUntil - Date.now();
            if (remaining > 0) activateBlockade(remaining);
        }
        
        if (blockData && blockData.attempts > 0 && blockData.attempts < MAX_ATTEMPTS && !blockData.isBlocked) {
            const remaining = MAX_ATTEMPTS - blockData.attempts;
            message.textContent = `⚠️ Attention : ${remaining} tentative(s) restante(s) avant blocage.`;
            message.className = 'warning-message';
            message.style.display = 'block';
            setTimeout(() => {
                if (message.textContent.includes('restante')) message.style.display = 'none';
            }, 5000);
        }
        
        console.log('=== APPLICATION PRÊTE ===');
    </script>
</body>
</html>
