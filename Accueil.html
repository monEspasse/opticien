async function loadNotifications() {
    try {
        const response = await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.notification}`);
        const data = await response.json();
        
        if (data.success && data.data && data.data.rows) {
            // Transformer les données en objets notifications avec gestion des dates
            const rawNotifications = data.data.rows.map(row => ({
                dateFin: row[0] || null,           // Date de fin de validité
                message: row[1] || 'Nouvelle notification', // Message
                priorite: row[2] || 'Information',  // Priorité
                dateCreation: data.timestamp || new Date().toISOString()
            }));
            
            // Filtrer les notifications non expirées (date de fin > maintenant)
            const maintenant = new Date();
            AppState.notifications.all = rawNotifications.filter(notif => {
                if (!notif.dateFin) return true; // Pas de date de fin = toujours valide
                const dateFin = new Date(notif.dateFin);
                return dateFin > maintenant; // Garder si la date de fin est dans le futur
            });
            
            console.log(`✅ ${AppState.notifications.all.length} notifications actives chargées`);
            
            // Mettre à jour le compteur
            updateNotificationCount();
            
            // Démarrer le carrousel si des notifications existent
            if (AppState.notifications.all.length > 0) {
                startNotificationCarousel();
            }
        }
    } catch (error) {
        console.error('❌ Erreur chargement notifications:', error);
    }
}

// Mettre à jour le compteur de notifications
function updateNotificationCount() {
    const count = AppState.notifications.all.length;
    const countElement = $('notificationCount');
    if (countElement) {
        countElement.textContent = count;
        countElement.style.display = count > 0 ? 'flex' : 'none';
    }
}

// Démarrer le carrousel de notifications
function startNotificationCarousel() {
    // Arrêter l'ancien intervalle s'il existe
    if (AppState.notifications.interval) {
        clearInterval(AppState.notifications.interval);
        AppState.notifications.interval = null;
    }
    
    // Réinitialiser l'index
    AppState.notifications.currentIndex = 0;
    
    // Ne rien faire s'il n'y a pas de notifications
    if (AppState.notifications.all.length === 0) {
        console.log('ℹ️ Aucune notification à afficher');
        return;
    }
    
    console.log(`🎬 Démarrage du carrousel avec ${AppState.notifications.all.length} notifications`);
    
    // Afficher la première notification immédiatement
    showNotificationWithCount();
    
    // Démarrer le carrousel avec un compteur pour savoir quand s'arrêter
    let displayedCount = 1; 
    
    AppState.notifications.interval = setInterval(() => {
        // Si on a affiché toutes les notifications, on s'arrête
        if (displayedCount >= AppState.notifications.all.length) {
            console.log('✅ Toutes les notifications ont été affichées, arrêt du carrousel');
            stopNotificationCarousel();
            return;
        }
        
        // Afficher la suivante
        showNotificationWithCount();
        displayedCount++;
        
    }, 4000); 
}

// Afficher la notification suivante avec compteur
function showNotificationWithCount() {
    const notifications = AppState.notifications.all;
    if (notifications.length === 0) return;
    
    const notification = notifications[AppState.notifications.currentIndex];
    const current = AppState.notifications.currentIndex + 1;
    const total = notifications.length;
    
    showNotificationToast(notification, current, total);
    
    // Passer à la suivante
    AppState.notifications.currentIndex++;
}

// Afficher un toast de notification avec compteur
function showNotificationToast(notification, current, total) {
    const container = $('notificationToastContainer');
    if (!container) return;
    
    const toast = document.createElement('div');
    toast.className = 'notification-toast';
    
    // Déterminer la priorité et les couleurs
    let bgColor, icon;
    switch(notification.priorite?.toLowerCase()) {
        case 'urgent':
        case 'haute':
            bgColor = 'linear-gradient(135deg, #ef4444, #dc2626)';
            icon = 'fa-exclamation-circle';
            break;
        case 'moyenne':
            bgColor = 'linear-gradient(135deg, #f59e0b, #d97706)';
            icon = 'fa-bell';
            break;
        default:
            bgColor = 'linear-gradient(135deg, #3b82f6, #2563eb)';
            icon = 'fa-info-circle';
    }
    
    // Formater la date d'expiration si elle existe
    let dateExpiration = '';
    if (notification.dateFin) {
        const date = new Date(notification.dateFin);
        dateExpiration = `<div style="font-size: 0.7rem; opacity: 0.8; margin-top: 2px;">
            <i class="far fa-clock"></i> Expire le ${date.toLocaleDateString('fr-FR')}
        </div>`;
    }
    
    // Ajouter le compteur
    const counter = current && total ? 
        `<span style="background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem;">
            ${current}/${total}
        </span>` : '';
    
    toast.innerHTML = `
        <div class="notification-icon">
            <i class="fas ${icon}"></i>
        </div>
        <div class="notification-content">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div class="notification-title">Notification ${counter}</div>
            </div>
            <div class="notification-message">${notification.message}</div>
            ${dateExpiration}
        </div>
        <div class="notification-close" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </div>
    `;
    
    // Appliquer la couleur de fond
    toast.style.background = bgColor;
    
    container.appendChild(toast);
    
    setTimeout(() => {
        if (toast.parentNode) {
            toast.remove();
        }
    }, 3800);
    
    // Permettre de fermer en cliquant
    toast.addEventListener('click', function(e) {
        if (!e.target.closest('.notification-close')) {
            openNotificationModal();
        }
    });
}

    const modalHTML = `

// Générer la liste HTML des notifications
function generateNotificationListHTML() {
    if (AppState.notifications.all.length === 0) {
        return `
            <div class="notification-empty">
                <i class="fas fa-bell-slash" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                <p>Aucune notification pour le moment</p>
            </div>
        `;
    }

    return AppState.notifications.all.map((notif, index) => {
        const priorityClass = notif.priorite?.toLowerCase() === 'urgent' ? 'priority-high' : 
                            notif.priorite?.toLowerCase() === 'moyenne' ? 'priority-medium' : 'priority-low';
        
        const priorityIcon = notif.priorite?.toLowerCase() === 'urgent' ? 'fa-exclamation-circle' : 
                           notif.priorite?.toLowerCase() === 'moyenne' ? 'fa-bell' : 'fa-info-circle';
        
        const priorityColor = notif.priorite?.toLowerCase() === 'urgent' ? '#ef4444' : 
                            notif.priorite?.toLowerCase() === 'moyenne' ? '#f59e0b' : '#4ade80';
        
        // Formater la date d'expiration
        let dateExpiration = '';
        if (notif.dateFin) {
            const date = new Date(notif.dateFin);
            dateExpiration = `<span><i class="far fa-calendar-times"></i> Expire: ${date.toLocaleDateString('fr-FR')}</span>`;
        }
        
        return `
            <div class="notification-item ${priorityClass}">
                <div class="notification-item-icon" style="background: ${priorityColor};">
                    <i class="fas ${priorityIcon}"></i>
                </div>
                <div class="notification-item-content">
                    <div class="notification-item-title">
                        <strong>${notif.message}</strong>
                    </div>
                    <div class="notification-item-subtitle">
                        <span><i class="fas fa-tag"></i> Priorité: ${notif.priorite}</span>
                        ${dateExpiration}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

        // ============================================
        // CORRECTION 1: Chargement de TOUS les clients (1200+)
        // ============================================
        async function loadClientsFromScript() {
            showLoading();
            const searchInput = $('searchInput');
            if (searchInput) {
                searchInput.disabled = true;
                searchInput.placeholder = "Chargement...";
            }

            try {
                const response = await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.liste}`);
                if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);

                const data = await response.json();
                if (!data.success || !data.data) throw new Error("Réponse invalide");

                AppState.clients.headers = data.data.headers;
                AppState.clients.all = data.data.rows; // TOUTES les lignes (1200+)
                
                // FILTRER selon les droits de l'utilisateur
                AppState.clients.filtered = filterClientsByUserRights(AppState.clients.all);
                
                console.log(`✅ Total clients bruts: ${AppState.clients.all.length}`);
                console.log(`✅ Clients après filtrage: ${AppState.clients.filtered.length}`);

                renderTableHeaders();
                updateTableAndPagination();

                if (searchInput) {
                    searchInput.disabled = false;
                    searchInput.placeholder = "Rechercher par nom...";
                }

            } catch (error) {
                console.error("Erreur:", error);
                showError("Erreur lors du chargement");
            } finally {
                hideLoading();
            }
        }

        // ============================================
        // CORRECTION 2: Filtrage des clients selon les droits utilisateur
        // ============================================
        function filterClientsByUserRights(clients) {
            const userAgence = AppState.user.agence;
            const userAnalyse = AppState.user.analyse;
            
            console.log('👤 Filtrage utilisateur:', { agence: userAgence, analyse: userAnalyse });
            
            // Si l'utilisateur a accès à tout, retourner tous les clients
            if (userAgence === 'Tous' && userAnalyse === 'Tous') {
                return clients;
            }
            
            return clients.filter(client => {
                // Index 6 = Agence
                const clientAgence = client[6] || '';
                // Index 7 = Commercial (analyse)
                const clientAnalyse = client[7] || '';
                
                let agenceMatch = userAgence === 'Tous' || 
                                 clientAgence.toLowerCase() === userAgence.toLowerCase();
                
                let analyseMatch = userAnalyse === 'Tous' || 
                                  clientAnalyse.toLowerCase() === userAnalyse.toLowerCase();
                
                return agenceMatch && analyseMatch;
            });
        }

        function renderTableHeaders() {
            const thead = document.querySelector("#client-table thead");
            thead.innerHTML = "";
            const tr = document.createElement("tr");
            AppState.clients.headers.forEach((header, i) => {
                const th = document.createElement("th");
                th.textContent = header;
                th.setAttribute('data-column', i);
                th.addEventListener('click', () => sortTable(i));
                tr.appendChild(th);
            });
            thead.appendChild(tr);
        }

        function renderTableRows() {
            const tbody = document.querySelector("#client-table tbody");
            tbody.innerHTML = "";

            const start = (AppState.clients.currentPage - 1) * AppState.clients.itemsPerPage;
            const end = start + AppState.clients.itemsPerPage;
            const rows = AppState.clients.filtered.slice(start, end);

            if (rows.length === 0) {
                const tr = document.createElement("tr");
                const td = document.createElement("td");
                td.colSpan = AppState.clients.headers.length;
                td.textContent = "Aucun client trouvé";
                td.style.textAlign = "center";
                td.style.padding = "2rem";
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            rows.forEach((row) => {
                const tr = document.createElement("tr");
                tr.style.cursor = "pointer";
                tr.addEventListener('click', () => selectClient(row));

                row.forEach((cell, cellIndex) => {
                    const td = document.createElement("td");
                    
                    if (cellIndex === 0) {
                        const link = document.createElement("a");
                        link.href = "#";
                        link.className = "client-link has-tooltip";
                        link.textContent = cell || "";
                        link.onclick = (e) => { e.preventDefault(); selectClient(row); };
                        td.appendChild(link);
                    } else if (cellIndex === 3) {
                        td.textContent = formatDate(cell);
                    } else {
                        td.textContent = cell || "";
                    }
                    
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            initializeTooltips();
        }

        function updateTableAndPagination() {
            renderTableRows();
            
            const totalPages = Math.ceil(AppState.clients.filtered.length / AppState.clients.itemsPerPage) || 1;
            $('prevPage').disabled = AppState.clients.currentPage <= 1;
            $('nextPage').disabled = AppState.clients.currentPage >= totalPages;
            $('page-info').textContent = `Page ${AppState.clients.currentPage} sur ${totalPages} (Total: ${AppState.clients.filtered.length} clients)`;
        }

        function sortTable(columnIndex) {
            if (AppState.clients.sortColumn === columnIndex) {
                AppState.clients.sortDirection = AppState.clients.sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                AppState.clients.sortColumn = columnIndex;
                AppState.clients.sortDirection = 'asc';
            }

            AppState.clients.filtered.sort((a, b) => {
                const valA = String(a[columnIndex] || '');
                const valB = String(b[columnIndex] || '');
                return AppState.clients.sortDirection === 'asc' 
                    ? valA.localeCompare(valB) 
                    : valB.localeCompare(valA);
            });

            updateTableAndPagination();
        }

        function applySearchFilter() {
            const searchTerm = $('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                // Réinitialiser avec les clients filtrés par droits utilisateur
                AppState.clients.filtered = filterClientsByUserRights(AppState.clients.all);
            } else {
                // Filtrer par nom (index 1) en respectant les droits utilisateur
                const userFiltered = filterClientsByUserRights(AppState.clients.all);
                AppState.clients.filtered = userFiltered.filter(client => 
                    String(client[1] || '').toLowerCase().includes(searchTerm)
                );
            }
            
            AppState.clients.currentPage = 1;
            updateTableAndPagination();
        }

        function selectClient(clientData) {
            localStorage.setItem("selectedClient", JSON.stringify(clientData));
            window.location.href = "DetailClient.html";
        }

        function goToPrevPage() {
            if (AppState.clients.currentPage > 1) {
                AppState.clients.currentPage--;
                updateTableAndPagination();
            }
        }

        function goToNextPage() {
            const totalPages = Math.ceil(AppState.clients.filtered.length / AppState.clients.itemsPerPage);
            if (AppState.clients.currentPage < totalPages) {
                AppState.clients.currentPage++;
                updateTableAndPagination();
            }
        }

        function initializeTooltips() {
            const elements = document.querySelectorAll('.has-tooltip');
            elements.forEach(el => {
                let tooltip = null;
                let timeout = null;

                el.addEventListener('mouseenter', () => {
                    timeout = setTimeout(() => {
                        const clientIndex = [...el.closest('tr').parentNode.children].indexOf(el.closest('tr'));
                        const client = AppState.clients.filtered[clientIndex];
                        if (!client) return;

                        tooltip = document.createElement('div');
                        tooltip.className = 'custom-tooltip';
                        tooltip.innerHTML = createClientTooltip(client);
                        
                        const rect = el.getBoundingClientRect();
                        tooltip.style.left = rect.left + 'px';
                        tooltip.style.top = (rect.top - 10) + 'px';
                        tooltip.style.transform = 'translateY(-100%)';
                        
                        document.body.appendChild(tooltip);
                    }, 1000);
                });

                el.addEventListener('mouseleave', () => {
                    clearTimeout(timeout);
                    if (tooltip) {
                        document.body.removeChild(tooltip);
                        tooltip = null;
                    }
                });
            });
        }

// Fonction pour basculer entre select et input personnalisé
window.toggleCustomInput = function(fieldName) {
    const select = $(fieldName);
    const input = $(fieldName + '_input');
    const button = event.currentTarget;
    
    if (input.style.display === 'none') {
        select.style.display = 'none';
        input.style.display = 'block';
        input.value = '';
        button.innerHTML = '<i class="fas fa-list"></i> Choisir existant';
    } else {
        select.style.display = 'block';
        input.style.display = 'none';
        button.innerHTML = '<i class="fas fa-plus"></i> Ajouter nouveau';
        
        if (input.value.trim()) {
            addOptionIfNotExists(select, input.value.trim());
            select.value = input.value.trim();
        }
    }
};

function addOptionIfNotExists(select, value) {
    for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].text === value) {
            select.value = value;
            return;
        }
    }
    const option = document.createElement('option');
    option.value = value;
    option.text = value;
    select.add(option);
    select.value = value;
}

function initSaleModal() {
    AppState.modals.sale.currentStep = 1;
    updateSaleStepDisplay();
    calculerTotal();

    const today = new Date();
    const delivery = new Date(today);
    delivery.setDate(today.getDate() + 15);

    $('date_livraison').value = delivery.toISOString().split('T')[0];
    $('current_user').value = AppState.user.nom;

    loadCatalogueData();

    $('prevStepBtn').onclick = prevSaleStep;
    $('nextStepBtn').onclick = nextSaleStep;
    $('resetButton').onclick = resetSaleForm;
    $('submitBtn').onclick = submitSaleForm;

    ['montant_monture', 'montant_verres', 'frais_livraison', 'remise', 'part_assurance', 'acompte'].forEach(id => {
        $(id)?.addEventListener('input', calculerTotal);
    });
    $('remise_type')?.addEventListener('change', calculerTotal);

    $('assure_principal')?.addEventListener('change', toggleAssurePrincipal);
    $('contact_livraison_type')?.addEventListener('change', updateContactFields);
    $('agence')?.addEventListener('change', loadMonturesForAgence);

    // Synchronisation des champs prescription
    setupPrescriptionSync();

    setTimeout(() => loadMonturesForAgence(), 500);
}

function setupPrescriptionSync() {
    const fields = ['od_sphere', 'od_cylindre', 'od_axe', 'od_add', 'og_sphere', 'og_cylindre', 'og_axe', 'og_add'];
    fields.forEach(name => {
        const selects = document.querySelectorAll(`[name="${name}"]`);
        selects.forEach(select => {
            select.addEventListener('change', function() {
                selects.forEach(s => {
                    if (s !== this) s.value = this.value;
                });
            });
        });
    });

    ['od_dp', 'od_hauteur', 'og_dp', 'og_hauteur'].forEach(name => {
        const inputs = document.querySelectorAll(`[name="${name}"]`);
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                inputs.forEach(inp => {
                    if (inp !== this) inp.value = this.value;
                });
            });
        });
    });
}

function updateSaleStepDisplay() {
    const step = AppState.modals.sale.currentStep;
    for (let i = 1; i <= 4; i++) {
        const el = $(`step-${i}`);
        if (el) el.classList.toggle('active', i === step);
    }

    document.querySelectorAll('#newSaleModal .step').forEach((s, i) => {
        s.classList.toggle('active', i + 1 === step);
    });

    $('prevStepBtn').style.display = step > 1 ? 'block' : 'none';
    $('nextStepBtn').style.display = step < 4 ? 'block' : 'none';
    $('submitBtn').style.display = step === 4 ? 'block' : 'none';
}

function prevSaleStep() {
    if (AppState.modals.sale.currentStep > 1) {
        AppState.modals.sale.currentStep--;
        updateSaleStepDisplay();
    }
}

function nextSaleStep() {
    if (validateSaleStep(AppState.modals.sale.currentStep) && AppState.modals.sale.currentStep < 4) {
        AppState.modals.sale.currentStep++;
        updateSaleStepDisplay();
    }
}

function validateSaleStep(step) {
    if (step === 1) {
        const required = ['nom_complet', 'numero', 'agence', 'commercial'];
        for (const id of required) {
            if (!$(id)?.value && !$(id + '_input')?.value) {
                $(id).style.borderColor = '#dc3545';
                $(id).style.borderWidth = '2px';
                setTimeout(() => {
                    $(id).style.borderColor = '';
                    $(id).style.borderWidth = '';
                }, 2000);
                showError(`❌ Champ obligatoire: ${id.replace('_', ' ')}`);
                return false;
            }
        }
    }
    
    if (step === 2) {
        const required = ['type_verre', 'choix_monture'];
        for (const id of required) {
            if (!$(id)?.value && !$(id + '_input')?.value) {
                $(id).style.borderColor = '#dc3545';
                $(id).style.borderWidth = '2px';
                setTimeout(() => {
                    $(id).style.borderColor = '';
                    $(id).style.borderWidth = '';
                }, 2000);
                showError(`❌ Veuillez sélectionner ${id === 'type_verre' ? 'un type de verre' : 'une monture'}`);
                return false;
            }
        }
    }
    
    if (step === 4) {
        // ===== CHAMPS DE LIVRAISON OBLIGATOIRES =====
        const deliveryFields = [
            { id: 'date_livraison', label: 'Date de livraison' },
            { id: 'contact_livraison_type', label: 'Type de contact livraison' },
            { id: 'telephone_contact', label: 'Téléphone de contact' },
            { id: 'adresse_livraison', label: 'Adresse de livraison' }
        ];
        
        // Vérifier chaque champ de livraison
        for (const field of deliveryFields) {
            if (!$(field.id)?.value) {
                highlightField(field.id);
                showError(`❌ ${field.label} est obligatoire`);
                
                // Aller à l'étape 4 si on n'y est pas
                if (AppState.modals.sale.currentStep !== 4) {
                    AppState.modals.sale.currentStep = 4;
                    updateSaleStepDisplay();
                }
                return false;
            }
        }
        
        // ===== VALIDATION TIERS PAYANT (si part assurance > 0) =====
        const partAssurance = parseFloat($('part_assurance')?.value) || 0;
        
        if (partAssurance > 0) {
            const errors = [];
            
            // Vérifier chaque champ d'assurance
            const assurance = $('assurance')?.value || $('assurance_input')?.value;
            if (!assurance) {
                errors.push('❌ Assurance obligatoire');
                highlightField('assurance');
            }
            
            const compagnie = $('compagnie')?.value || $('compagnie_input')?.value;
            if (!compagnie) {
                errors.push('❌ Compagnie obligatoire');
                highlightField('compagnie');
            }
            
            const numeroPolice = $('numero_police')?.value;
            if (!numeroPolice) {
                errors.push('❌ N° Police obligatoire');
                highlightField('numero_police');
            }
            
            const assurePrincipal = $('assure_principal')?.value;
            if (!assurePrincipal) {
                errors.push('❌ Assuré principal obligatoire');
                highlightField('assure_principal');
            }
            
            const nomAssure = $('assure_principal_nom')?.value;
            if (assurePrincipal === 'non' && !nomAssure) {
                errors.push('❌ Nom assuré principal obligatoire');
                highlightField('assure_principal_nom');
            }
            
            if (errors.length > 0) {
                // Afficher le premier message d'erreur
                showError(errors[0]);
                
                // Aller à l'étape 4 si on n'y est pas
                if (AppState.modals.sale.currentStep !== 4) {
                    AppState.modals.sale.currentStep = 4;
                    updateSaleStepDisplay();
                }
                
                return false;
            }
        }
    }
    
    return true;
}

function highlightField(id) {
    const field = $(id) || $(id + '_input');
    if (field) {
        field.style.borderColor = '#dc3545';
        field.style.borderWidth = '2px';
        field.style.boxShadow = '0 0 0 3px rgba(220, 53, 69, 0.25)';
        field.style.transition = 'all 0.3s ease';
        
        // Faire défiler jusqu'au champ
        field.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        setTimeout(() => {
            field.style.borderColor = '';
            field.style.borderWidth = '';
            field.style.boxShadow = '';
        }, 3000);
    }
}
function calculerTotal() {
    const getVal = (id) => parseFloat($(id)?.value) || 0;
    
    const monture = getVal('montant_monture');
    const verres = getVal('montant_verres');
    const livraison = getVal('frais_livraison');
    const brut = monture + verres + livraison;

    const remise = getVal('remise');
    const remiseType = $('remise_type')?.value || 'FCFA';
    const remiseVal = remiseType === '%' ? brut * remise / 100 : remise;
    
    const partAssurance = getVal('part_assurance');
    const net = Math.max(0, brut - remiseVal - partAssurance);
    const acompte = getVal('acompte');
    const reste = Math.max(0, net - acompte);

    $('total_brut_display').textContent = formatCurrency(brut);
    $('net_a_payer_display').textContent = formatCurrency(net);
    $('reste_a_payer_display').textContent = formatCurrency(reste);
    
    $('tva').value = Math.round(monture * 18 / 118);

    // Rendre les champs assurance obligatoires si part_assurance > 0
    const assuranceFields = ['assurance', 'compagnie', 'numero_police', 'assure_principal'];
    if (partAssurance > 0) {
        assuranceFields.forEach(id => {
            const field = $(id);
            if (field) {
                field.required = true;
                field.style.borderColor = '';
            }
        });
    } else {
        assuranceFields.forEach(id => {
            const field = $(id);
            if (field) {
                field.required = false;
                field.style.borderColor = '';
            }
        });
    }
}

function toggleAssurePrincipal() {
    const val = $('assure_principal')?.value;
    const container = $('assure_principal_nom_container');
    const input = $('assure_principal_nom');
    
    if (val === 'oui' || val === 'non') {
        container.style.display = 'block';
        if (val === 'oui') {
            input.value = $('nom_complet')?.value || '';
            input.readOnly = true;
            input.style.backgroundColor = '#f0f0f0';
            input.required = true;
        } else {
            input.value = '';

            input.style.backgroundColor = '';
            input.required = true;
        }

        container.style.display = 'none';
        input.required = false;
    }
}

async function loadCatalogueData() {
    try {
        const response = await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.catalogue}`);
        const data = await response.json();
        if (!data.success) return;

        const fields = {
            entreprise: data.data.entreprises,
            agence: data.data.agences,
            commercial: data.data.commerciaux,
            type_verre: data.data.typesVerre,
            gamme_verre: data.data.gammesVerre,
            assurance: data.data.assurances,
            compagnie: data.data.compagnies,
            clinique: data.data.cliniques,        
            ophtalmo: data.data.ophtalmos    
        };

        Object.entries(fields).forEach(([id, values]) => {
            const select = $(id);
            if (select && values) {
                select.innerHTML = '<option value="">-- Choisir --</option>';
                values.forEach(v => select.add(new Option(v, v)));
            }
        });

        ['od_sphere', 'od_cylindre', 'og_sphere', 'og_cylindre'].forEach(name => {
            const selects = document.querySelectorAll(`[name="${name}"]`);
            selects.forEach(s => {
                (data.data.sphere || []).forEach(v => s.add(new Option(v, v)));
            });
        });

        ['od_axe', 'og_axe'].forEach(name => {
            const selects = document.querySelectorAll(`[name="${name}"]`);
            selects.forEach(s => {
                (data.data.axe || []).forEach(v => s.add(new Option(v, v)));
            });
        });

        ['od_add', 'og_add'].forEach(name => {
            const selects = document.querySelectorAll(`[name="${name}"]`);
            selects.forEach(s => {
                (data.data.add || []).forEach(v => s.add(new Option(v, v)));
            });
        });

    } catch (error) {
        console.error("Erreur chargement catalogue:", error);
    }
}

async function loadMonturesForAgence() {
    const agence = $('agence')?.value;
    const select = $('choix_monture');
    if (!agence || !select) return;

    select.disabled = true;
    select.innerHTML = '<option value="">-- Chargement --</option>';

    try {
        const response = await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.stockmonture}`);
        const data = await response.json();
        
        if (data.success && data.data.rows) {
            select.innerHTML = '<option value="">-- Sélectionner --</option>';
            data.data.rows
                .filter(row => row[1]?.toLowerCase() === agence.toLowerCase())
                .forEach(row => select.add(new Option(row[0] || '', row[0] || '')));
        }
        select.disabled = false;
    } catch (error) {
        console.error("Erreur montures:", error);
        select.innerHTML = '<option value="">-- Erreur --</option>';
    }
}

function collectSaleData() {
    const data = {};
    document.querySelectorAll('#client-form input, #client-form select, #client-form textarea').forEach(el => {
        if (el.name && !el.disabled) {
            if (el.type === 'select-one' && el.style.display === 'none') {
                const input = $(el.id + '_input');
                if (input && input.value) {
                    data[el.name] = input.value;
                } else {
                    data[el.name] = el.value;
                }
            } else {
                data[el.name] = el.value;
            }
        }
    });
    
    ['entreprise', 'commercial', 'assurance', 'compagnie', 'clinique', 'ophtalmo'].forEach(field => {
        const input = $(field + '_input');
        if (input && input.style.display === 'block' && input.value) {
            data[field] = input.value;
        }
    });
    
    const totalBrutText = $('total_brut_display')?.textContent || '0';
    const netAPayerText = $('net_a_payer_display')?.textContent || '0';
    const resteAPayerText = $('reste_a_payer_display')?.textContent || '0';
    
    data.total_brut = parseFloat(totalBrutText.replace(/[^0-9.-]/g, '')) || 0;
    data.net_a_payer = parseFloat(netAPayerText.replace(/[^0-9.-]/g, '')) || 0;
    data.reste_a_payer = parseFloat(resteAPayerText.replace(/[^0-9.-]/g, '')) || 0;
    
    return data;
}

function submitSaleForm() {
    console.log('=== DÉBUT submitSaleForm ===');
    
    if (!validateSaleStep(4)) {
        console.log('❌ Validation échouée');
        return;
    }
    console.log('✅ Validation réussie');
    
    showSuccess('Traitement en cours...');
    
    const submitBtn = $('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
    
    const data = collectSaleData();
    data.utilisateur = AppState.user.nom;
    console.log('Données à envoyer:', data);

    fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.addCommande}`, {
        method: 'POST',
        mode: 'no-cors',

        body: JSON.stringify(data)
    })
    .then(() => {

    .catch(error => {

}

    for (let v = min; v <= max; v = Math.round((v + step) * 100) / 100) {

// Nouvelle fonction pour charger les données du catalogue pour la proforma
async function loadProformaCatalogueData() {
    try {
        const response = await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.catalogue}`);
        const data = await response.json();
        
        if (!data.success) return;

        // Charger les types de verre
        const typeVerreSelect = $('proforma_type_verre');
        if (typeVerreSelect && data.data.typesVerre) {
            typeVerreSelect.innerHTML = '<option value="">-- Choisir --</option>';
            data.data.typesVerre.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                typeVerreSelect.appendChild(option);
            });
        }

        // Charger les gammes de verre
        const gammeVerreSelect = $('proforma_gamme_verre');
        if (gammeVerreSelect && data.data.gammesVerre) {
            data.data.gammesVerre.forEach(gamme => {
                const option = document.createElement('option');
                option.value = gamme;
                option.textContent = gamme;
                gammeVerreSelect.appendChild(option);
            });
        }

        // Charger les options de prescription (sphere, cylindre, axe, add)
        const sphereOptions = data.data.sphere || [];
        const cylindreOptions = data.data.cylindre || [];
        const axeOptions = data.data.axe || [];
        const addOptions = data.data.add || [];

        // Mettre à jour tous les selects de sphere
        document.querySelectorAll('[name="od_sphere"], [name="og_sphere"]').forEach(select => {
            select.innerHTML = '<option value="">--</option>';
            sphereOptions.forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });

        // Mettre à jour tous les selects de cylindre
        document.querySelectorAll('[name="od_cylindre"], [name="og_cylindre"]').forEach(select => {
            select.innerHTML = '<option value="">--</option>';
            cylindreOptions.forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });

        // Mettre à jour tous les selects d'axe
        document.querySelectorAll('[name="od_axe"], [name="og_axe"]').forEach(select => {
            select.innerHTML = '<option value="">--</option>';
            axeOptions.forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });

        // Mettre à jour tous les selects d'ADD
        document.querySelectorAll('[name="od_add"], [name="og_add"]').forEach(select => {
            select.innerHTML = '<option value="">--</option>';
            addOptions.forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });

    } catch (error) {
        console.error("Erreur chargement catalogue proforma:", error);
        
        // En cas d'erreur, mettre des valeurs par défaut
        const typeVerreSelect = $('proforma_type_verre');
        if (typeVerreSelect) {
            typeVerreSelect.innerHTML = '<option value="">-- Erreur de chargement --</option>';
        }
        
        const gammeVerreSelect = $('proforma_gamme_verre');
        if (gammeVerreSelect) {
            gammeVerreSelect.innerHTML = '<option value="">-- Erreur de chargement --</option>';
        }
    }
}

function updateProformaStepDisplay() {
    const step = AppState.modals.proforma.currentStep;
    for (let i = 1; i <= 3; i++) {
        const el = $(`proforma-step-${i}`);
        if (el) el.classList.toggle('active', i === step);
    }

    document.querySelectorAll('#newProformaModal .step').forEach((s, i) => {
        s.classList.toggle('active', i + 1 === step);
    });

    $('proformaPrevStepBtn').style.display = step > 1 ? 'block' : 'none';
    $('proformaNextStepBtn').style.display = step < 3 ? 'block' : 'none';
    $('proformaSubmitBtn').style.display = step === 3 ? 'block' : 'none';
}

function prevProformaStep() {
    if (AppState.modals.proforma.currentStep > 1) {
        AppState.modals.proforma.currentStep--;
        updateProformaStepDisplay();
    }
}

function nextProformaStep() {
    if (validateProformaStep(AppState.modals.proforma.currentStep) && AppState.modals.proforma.currentStep < 3) {
        AppState.modals.proforma.currentStep++;
        updateProformaStepDisplay();
    }
}

function validateProformaStep(step) {
    if (step === 1) {
        const required = ['proforma_nom_complet'];
        for (const id of required) {
            if (!$(id)?.value) {
                $(id).style.borderColor = '#dc3545';
                setTimeout(() => $(id).style.borderColor = '', 2000);
                showError('Remplissez tous les champs obligatoires');
                return false;
            }
        }
    }
    if (step === 2) {
        const required = ['proforma_type_verre'];
        for (const id of required) {
            if (!$(id)?.value) {
                $(id).style.borderColor = '#dc3545';
                setTimeout(() => $(id).style.borderColor = '', 2000);
                showError('Remplissez tous les champs obligatoires');
                return false;
            }
        }
    }
    return true;
}

function calculerProformaTotal() {
    const getVal = (id) => parseFloat($(id)?.value) || 0;
    
    const monture = getVal('proforma_montant_monture');
    const verres = getVal('proforma_montant_verres');
    const brut = monture + verres;

    const remise = getVal('proforma_remise');
    const remiseType = $('proforma_remise_type')?.value || 'FCFA';
    const remiseVal = remiseType === '%' ? brut * remise / 100 : remise;
    
    const net = Math.max(0, brut - remiseVal);

    $('proforma_total_brut_display').textContent = formatCurrency(brut);
    $('proforma_net_a_payer_display').textContent = formatCurrency(net);
}

function toggleCostDetails() {
    const content = $('costDetailsContent');
    const icon = $('costDetailsIcon');
    const header = document.querySelector('.cost-details-header span');
    
    if (content.style.display === 'block') {
        content.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
        header.textContent = 'Afficher détails des coûts';
    } else {
        content.style.display = 'block';
        icon.style.transform = 'rotate(180deg)';
        header.textContent = 'Masquer détails des coûts';
    }
}

function resetProformaForm() {
    if (!confirm('Réinitialiser le formulaire ?')) return;
    $('proforma-form').reset();
    $('proforma_date_soin').value = new Date().toISOString().split('T')[0];
    $('proforma_indicatif').value = '+229';
    calculerProformaTotal();
    AppState.modals.proforma.currentStep = 1;
    updateProformaStepDisplay();
}

function collectProformaData() {
    const data = {};
    document.querySelectorAll('#proforma-form input, #proforma-form select').forEach(el => {
        if (el.name && !el.disabled) data[el.name] = el.value;
    });
    data.contact = $('proforma_indicatif').value + ' ' + $('proforma_telephone').value;
    return data;
}

async function generateProformaPDF() {
    if (!validateProformaStep(3)) return;

    const btn = $('proformaSubmitBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Génération...';
    btn.disabled = true;

    const data = collectProformaData();

    try {
        await fetch(`${CONFIG.API_BASE}${CONFIG.ENDPOINTS.addproforma}`, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ formData: data })
        });

        setTimeout(async () => {
            try {
                await checkAndOpenProformaPDF();
            } catch (error) {
                console.error("Erreur:", error);
                showError("Erreur lors de la récupération du PDF");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }, 3000);

    } catch (error) {
        console.error("Erreur envoi:", error);
        showError("Erreur lors de l'envoi des données");
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

async function checkAndOpenProformaPDF() {
    try {
        const url = `${CONFIG.API_BASE}${CONFIG.ENDPOINTS.getlastpdf}`;
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`Erreur HTTP! statut: ${response.status}`);
        }
        
        const result = await response.json();
        console.log("Réponse du serveur:", result);
        
        const isSuccess = result.succès || result.success;
        const messageText = result.message || "";
        
        let pdfUrl = null;
        
        if (isSuccess && result.data && result.data.pdfUrl) {
            pdfUrl = result.data.pdfUrl;
        } 
        else if (messageText === "Le PDF est en cours de génération. Veuillez patienter quelques secondes." ||
                 messageText.includes("en cours de génération")) {
            console.warn("⚠️ Aucun PDF disponible:", messageText);
            showError("Le PDF est en cours de génération. Veuillez patienter quelques secondes puis réessayer.");
            return;
        } 
        else if (isSuccess === false) {
            console.warn("⚠️ Échec de génération du PDF:", messageText);
            showError("Erreur lors de la génération du PDF: " + messageText);
            return;
        } 
        else {
            console.warn("⚠️ Structure de réponse inattendue:", result);
            showError("Erreur inattendue lors de la génération du PDF.");
            return;
        }
        
        if (pdfUrl) {
            closeModal();
            window.open(pdfUrl, '_blank');
            showSuccess("PDF généré avec succès !");
        }
        
    } catch (error) {
        console.error("❌ Erreur ouverture PDF:", error);
        showError("Erreur lors de l'ouverture du PDF: " + error.message);
    }
}

            let bar = $('loadingBarContainer');

                bar = document.createElement('div');

        function showConfirmation(title, message) {
            return new Promise(resolve => {
                const overlay = document.createElement('div');
                overlay.className = 'confirmation-overlay';
                overlay.innerHTML = `
                    <div class="confirmation-box">
                        <h3>${title}</h3>
                        <p>${message}</p>
                        <div class="confirmation-buttons">
                            <button class="btn-confirm" id="confirmYes">Oui</button>
                            <button class="btn-cancel" id="confirmNo">Non</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                $('confirmYes').onclick = () => {
                    document.body.removeChild(overlay);
                    resolve(true);
                };
                $('confirmNo').onclick = () => {
                    document.body.removeChild(overlay);
                    resolve(false);
                };
            });
        }


        // TOGGLE SIDEBAR 
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // MOBILE MENU
        $('mobileMenuBtn')?.addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            const sidebar = document.querySelector('.sidebar');
            const btn = $('mobileMenuBtn');
            if (window.innerWidth <= 768 && sidebar?.classList.contains('active') && 
                !sidebar.contains(e.target) && !btn?.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });

        // INITIALISATION
        document.addEventListener('DOMContentLoaded', () => {
            initAuth();
            loadClientsFromScript();

            // Ajouter l'écouteur d'événement pour le clic sur le badge de notification
            $('notificationBadge')?.addEventListener('click', openNotificationModal);

            $('searchInput').addEventListener('input', applySearchFilter);
            $('prevPage').addEventListener('click', goToPrevPage);
            $('nextPage').addEventListener('click', goToNextPage);
            $('itemsPerPageSelect').addEventListener('change', (e) => {
                AppState.clients.itemsPerPage = parseInt(e.target.value);
                AppState.clients.currentPage = 1;
                updateTableAndPagination();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const modals = document.querySelectorAll('.modal-overlay.active');
                    modals.forEach(modal => modal.classList.remove('active'));
                }
            });
        });

        // Nettoyer les ressources à la fermeture
        window.addEventListener('beforeunload', () => {
            stopNotificationCarousel();
        });

// Afficher une erreur (visible au-dessus de tout)
window.showError = function(message) {
    // Supprimer les anciennes notifications
    const oldNotifications = document.querySelectorAll('.notification-error');
    oldNotifications.forEach(n => n.remove());
    
    // Créer la notification
    const notification = document.createElement('div');
    notification.className = 'notification-error';
    notification.innerHTML = `
        <i class="fas fa-exclamation-circle"></i>
        <span>${message}</span>
        <i class="fas fa-times" style="margin-left: auto; cursor: pointer;" onclick="this.parentElement.remove()"></i>
    `;
    
    // S'assurer que la notification est au-dessus de tout
    notification.style.zIndex = '999999999';
    notification.style.position = 'fixed';
    notification.style.top = '20px';
    notification.style.right = '20px';
    notification.style.padding = '15px 20px';
    notification.style.borderRadius = '8px';
    notification.style.backgroundColor = '#dc3545';
    notification.style.color = 'white';
    notification.style.fontWeight = '500';
    notification.style.display = 'flex';
    notification.style.alignItems = 'center';
    notification.style.gap = '10px';
    notification.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
    notification.style.transform = 'translateX(400px)';
    notification.style.transition = 'transform 0.3s ease';
    notification.style.maxWidth = '350px';
    
    document.body.appendChild(notification);
    
    // Animation d'entrée
    setTimeout(() => notification.style.transform = 'translateX(0)', 10);
    
    // Disparition automatique après 4 secondes
    setTimeout(() => {
        notification.style.transform = 'translateX(400px)';
        setTimeout(() => notification.remove(), 300);
    }, 4000);
};

// Version alternative : Afficher l'erreur DANS le modal (optionnel)
window.showErrorInModal = function(message) {
    // Chercher ou créer un conteneur d'erreur dans le modal
    const modal = document.querySelector('#newSaleModal .modal-body');
    if (!modal) return;
    
    let errorContainer = document.getElementById('modal-error-container');
    
    if (!errorContainer) {
        errorContainer = document.createElement('div');
        errorContainer.id = 'modal-error-container';
        errorContainer.style.cssText = `
            position: sticky;
            top: 0;
            z-index: 10000;
            margin: 0 0 20px 0;
            padding: 15px 20px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
            border-left: 4px solid #fff;
            animation: slideDown 0.3s ease;
        `;
        
        // Insérer en haut du modal
        modal.insertBefore(errorContainer, modal.firstChild);
    }
    
    errorContainer.innerHTML = `
        <i class="fas fa-exclamation-circle" style="font-size: 1.2rem;"></i>
        <span style="flex: 1;">${message}</span>
        <i class="fas fa-times" style="cursor: pointer; opacity: 0.8;" onclick="this.parentElement.remove()"></i>
    `;
    
    // Faire défiler jusqu'à l'erreur
    errorContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    // Disparition automatique après 5 secondes
    setTimeout(() => {
        if (errorContainer && errorContainer.parentNode) {
            errorContainer.style.opacity = '0';
            errorContainer.style.transform = 'translateY(-20px)';
            errorContainer.style.transition = 'all 0.3s ease';
            setTimeout(() => errorContainer.remove(), 300);
        }
    }, 5000);
};
