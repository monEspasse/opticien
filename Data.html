<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisioPro - Base Client</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --danger-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --warning-gradient: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --info-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            
            --primary-50: #f0f4ff;
            --primary-100: #d9e4ff;
            --primary-200: #b3c9ff;
            --primary-300: #8daef8;
            --primary-400: #6793f1;
            --primary-500: #4f46e5;
            --primary-600: #4338ca;
            --primary-700: #3730a3;
            --primary-800: #312e81;
            --primary-900: #1e1b4b;
            
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --border-radius-full: 9999px;
            
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            font-smooth: always;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #2d3748;
            position: relative;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem 2rem;
            box-shadow: var(--glass-shadow);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary-300);
        }

        .back-btn {
            margin-bottom: 1.5rem;
        }

        .btn {
            position: relative;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-600);
            border: 1px solid var(--primary-300);
        }

        .btn-secondary:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
        }

        .btn-danger {
            background: var(--danger-gradient);
            color: white;
        }

        .btn-warning {
            background: var(--warning-gradient);
            color: white;
        }

        .btn-info {
            background: var(--info-gradient);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal de confirmation personnalisée */
        .custom-confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.2s ease;
        }

        .custom-confirm-overlay.active {
            display: flex;
        }

        .custom-confirm-modal {
            background: white;
            border-radius: var(--border-radius-xl);
            max-width: 450px;
            width: 90%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .custom-confirm-header {
            padding: 1.5rem 1.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .custom-confirm-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .custom-confirm-icon.warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #d97706;
        }

        .custom-confirm-icon.danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #dc2626;
        }

        .custom-confirm-icon.info {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #3b82f6;
        }

        .custom-confirm-icon.success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #10b981;
        }

        .custom-confirm-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .custom-confirm-message {
            padding: 0 1.5rem 1.5rem;
            color: var(--gray-600);
            line-height: 1.5;
            white-space: pre-line;
        }

        .custom-confirm-footer {
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            border-top: 1px solid var(--gray-200);
            background: var(--gray-50);
        }

        .custom-confirm-btn {
            padding: 0.625rem 1.25rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .custom-confirm-btn-cancel {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .custom-confirm-btn-cancel:hover {
            background: var(--gray-100);
        }

        .custom-confirm-btn-confirm {
            background: var(--primary-gradient);
            color: white;
        }

        .custom-confirm-btn-confirm.danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .custom-confirm-btn-confirm.warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .custom-confirm-btn-confirm:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Grille des statuts */
        .status-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .status-stat-card {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 1.25rem;
            transition: all 0.3s var(--transition-smooth);
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .status-stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .status-stat-card.active {
            border-color: var(--primary-500);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
        }

        .status-stat-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .status-stat-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .status-stat-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            background: var(--primary-gradient);
        }

        .status-stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1.2;
        }

        /* Section d'en-tête */
        .section-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            margin: 0;
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-filters {
            display: flex;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--border-radius-md);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.3s var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            overflow: auto;
            max-height: 500px;
            position: relative;
        }

        .clients-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .clients-table th {
            text-align: left;
            padding: 1rem;
            background: rgba(79, 70, 229, 0.95);
            color: white;
            font-weight: 600;
            border-bottom: 2px solid var(--primary-300);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .clients-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .clients-table tbody tr:hover {
            background: rgba(79, 70, 229, 0.05);
        }

        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        .client-checkbox, .select-all-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-500);
        }

        .client-info-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .client-details {
            display: flex;
            flex-direction: column;
        }

        .client-name {
            font-weight: 600;
            color: var(--gray-900);
        }

        .client-id {
            font-size: 0.75rem;
            color: var(--gray-500);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--border-radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-badge.receptionne {
            background: var(--success-gradient);
            color: white;
        }

        .status-badge.en-cours {
            background: var(--warning-gradient);
            color: white;
        }

        .status-badge.livre {
            background: var(--info-gradient);
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--border-radius-sm);
            border: none;
            background: var(--glass-bg);
            color: var(--gray-600);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition-smooth);
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .btn-view:hover {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-call:hover {
            background: var(--success-gradient);
            color: white;
        }

        .btn-receive:hover {
            background: var(--info-gradient);
            color: white;
        }
        
        .btn-delete:hover {
            background: var(--danger-gradient);
            color: white;
        }

        .bulk-actions {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: var(--border-radius-md);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bulk-actions.show {
            display: flex;
        }

        .selected-count {
            font-weight: 700;
            color: #f59e0b;
        }

        .bulk-action-btn {
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--gray-300);
            background: white;
            color: var(--gray-700);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bulk-action-btn:hover {
            border-color: var(--primary-500);
            color: var(--primary-600);
        }

        .bulk-action-btn.delete:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-200);
        }

        .pagination-info {
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
        }

        .pagination-btn {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300);
            background: white;
            border-radius: var(--border-radius-sm);
            color: var(--gray-700);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-500);
            color: var(--primary-600);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .floating-actions {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .floating-action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
            transition: all 0.3s var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
        }

        /* Modal améliorée pour commande fournisseur */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--border-radius-xl);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 1400px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
        }

        .modal-title {
            margin: 0;
            font-size: 1.5rem;
        }

        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s var(--transition-smooth);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 0;
            flex: 1;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            background: var(--gray-50);
        }

        /* Interface de commande */
        .commande-visual-container {
            display: flex;
            height: 70vh;
        }

        .commande-list-container {
            flex: 0 0 400px;
            border-right: 1px solid var(--gray-200);
            overflow-y: auto;
            background: var(--gray-50);
        }

        .commande-list-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            background: white;
        }

        .commande-list-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .commande-list-subtitle {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .commande-list {
            padding: 1rem;
        }

        .commande-client-item {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius-md);
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            position: relative;
        }

        .commande-client-item:hover {
            border-color: var(--primary-300);
            transform: translateX(4px);
        }

        .commande-client-item.selected {
            border-color: var(--primary-500);
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.05), rgba(79, 70, 229, 0.1));
        }

        .commande-client-item.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-gradient);
            border-radius: var(--border-radius-md) 0 0 var(--border-radius-md);
        }

        .commande-client-name {
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .commande-client-id {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }

        .commande-client-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .commande-client-detail {
            background: var(--gray-100);
            padding: 0.25rem 0.5rem;
            border-radius: var(--border-radius-sm);
            color: var(--gray-700);
        }

        .commande-details-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .commande-details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary-500);
        }

        .commande-details-title {

<body>
    <div class="dashboard-container">

    <!-- Menu de chargement -->
    <div class="loading-overlay" id="loadingOverlay">

    <!-- Modal Container -->

    <!-- Print Section -->

    <script>
        // ==================== VARIABLES GLOBALES ====================
        let allClients = [];
        let filteredClients = [];
        let currentPage = 1;
        let clientsPerPage = 100;
        let selectedClients = new Set();
        let commandesData = [];
        let selectedFournisseur = null;
        let fournisseursList = [];
        let datesLivraison = new Map();
        let inactivityTimer;
        let activeStatusFilter = null;
        let statusConfig = [];
        let availableStatuses = [];

        // Définition des icônes par défaut pour les statuts
        const defaultStatusIcons = {
            'nouvelle vente': 'fas fa-shopping-cart',
            'en traitement': 'fas fa-cogs',
            'reçu boutique': 'fas fa-store',
            'livré': 'fas fa-truck',
            'cancel': 'fas fa-times-circle',
            'annulé': 'fas fa-ban',
            'perdu': 'fas fa-times-circle',
            'fr traitement': 'fas fa-cogs',
            'commande passée': 'fas fa-paper-plane',
            'réceptionné': 'fas fa-check-circle',
            'default': 'fas fa-circle'
        };

        // Définition des couleurs par défaut pour les statuts
        const defaultStatusColors = {
            'nouvelle vente': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'en traitement': 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)',
            'reçu boutique': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'livré': 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'cancel': 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'annulé': 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'perdu': 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'fr traitement': 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)',
            'commande passée': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'réceptionné': 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'default': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
        };

        // ==================== FONCTIONS DE CONFIRMATION PERSONNALISÉES ====================
        
        /**
         * Affiche une boîte de confirmation personnalisée
         * @param {Object} options - Options de confirmation
         * @param {string} options.title - Titre de la confirmation
         * @param {string} options.message - Message de la confirmation
         * @param {string} options.type - Type de confirmation: 'danger', 'warning', 'info', 'success'
         * @param {string} options.confirmText - Texte du bouton de confirmation
         * @param {string} options.cancelText - Texte du bouton d'annulation
         * @returns {Promise<boolean>} - Promise résolue avec true si confirmé, false sinon
         */
        function customConfirm({ title, message, type = 'warning', confirmText = 'Confirmer', cancelText = 'Annuler' }) {
            return new Promise((resolve) => {
                const container = document.getElementById('custom-confirm-container');
                if (!container) {
                    // Fallback sur confirm natif si le container n'existe pas
                    resolve(confirm(message));
                    return;
                }
                
                const icons = {
                    danger: { icon: 'fa-exclamation-triangle', color: '#dc2626' },
                    warning: { icon: 'fa-exclamation-circle', color: '#d97706' },
                    info: { icon: 'fa-info-circle', color: '#3b82f6' },
                    success: { icon: 'fa-check-circle', color: '#10b981' }
                };
                
                const iconData = icons[type] || icons.warning;
                
                const modalHTML = `
                    <div class="custom-confirm-overlay active" id="customConfirmOverlay">
                        <div class="custom-confirm-modal">
                            <div class="custom-confirm-header">
                                <div class="custom-confirm-icon ${type}">
                                    <i class="fas ${iconData.icon}"></i>
                                </div>
                                <div>
                                    <div class="custom-confirm-title">${title}</div>
                                </div>
                            </div>
                            <div class="custom-confirm-message">${message}</div>
                            <div class="custom-confirm-footer">
                                <button class="custom-confirm-btn custom-confirm-btn-cancel" id="customConfirmCancel">${cancelText}</button>
                                <button class="custom-confirm-btn custom-confirm-btn-confirm ${type}" id="customConfirmConfirm">${confirmText}</button>
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML = modalHTML;
                
                const overlay = document.getElementById('customConfirmOverlay');
                const confirmBtn = document.getElementById('customConfirmConfirm');
                const cancelBtn = document.getElementById('customConfirmCancel');
                
                const closeModal = (result) => {
                    if (overlay) {
                        overlay.style.animation = 'fadeOut 0.2s ease';
                        setTimeout(() => {
                            container.innerHTML = '';
                            resolve(result);
                        }, 200);
                    } else {
                        container.innerHTML = '';
                        resolve(result);
                    }
                };
                
                if (confirmBtn) confirmBtn.onclick = () => closeModal(true);
                if (cancelBtn) cancelBtn.onclick = () => closeModal(false);
                if (overlay) overlay.onclick = (e) => {
                    if (e.target === overlay) closeModal(false);
                };
                
                // Gestion de la touche Escape
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        closeModal(false);
                        document.removeEventListener('keydown', handleEsc);
                    }
                };
                document.addEventListener('keydown', handleEsc);
            });
        }

        /**
         * Version simplifiée pour les confirmations rapides
         */
        async function confirmAction(message, type = 'warning') {
            return customConfirm({
                title: type === 'danger' ? '⚠️ Action irréversible' : 'Confirmation',
                message: message,
                type: type,
                confirmText: type === 'danger' ? 'Supprimer' : 'Confirmer',
                cancelText: 'Annuler'
            });
        }

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");

            if (!username) {
                redirectToLogin();
                return;
            }

            // Affiche le nom d'utilisateur
            const usernameDisplay = document.getElementById("username-display");
            if (usernameDisplay) {
                usernameDisplay.textContent = username;
            }

            // Met à jour l'image de profil avec les initiales
            const profileImg = document.querySelector('.profile-img');

        // ==================== FONCTIONS D'AUTHENTIFICATION ====================
        function redirectToLogin() {
            window.location.href = "code.html";
        }

        function startInactivityTimer() {
            const INACTIVITY_LIMIT = 30 * 60 * 1000; // 30 minutes en ms
            
            function resetTimer() {
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    sessionStorage.removeItem("utilisateur");
                    localStorage.removeItem("utilisateur");
                    redirectToLogin();
                }, INACTIVITY_LIMIT);
            }

            // Événements qui réinitialisent le timer

        // ==================== GESTION DES DONNÉES CLIENTS ====================
        async function loadClientsData() {
            try {
                showLoadingState();
                
                const apiUrl = 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=dataclient';
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message || "Erreur inconnue du serveur");
                }
                
                allClients = processClientData(result.data);
                filteredClients = [...allClients];
                
                // Générer dynamiquement la configuration des statuts
                generateStatusConfig();
                
                // Mettre à jour les filtres d'agence
                updateAgencyFilter();
                
                // Mettre à jour le filtre des statuts
                updateStatusFilter();
                
                // Afficher les clients
                displayClients();
                
            } catch (error) {
                console.error("Erreur lors du chargement des clients:", error);
                showAlertMessage("Erreur lors du chargement des clients: " + error.message, "error");
                showErrorState();
            }
        }

        function processClientData(data) {
            if (!data || !data.rows || !data.headers) {
                return [];
            }
            
            const headers = data.headers;
            const rows = data.rows;
            
            const headerMap = {};
            headers.forEach((header, index) => {
                headerMap[header] = index;
            });
            
            return rows.map(row => {
                let registrationDate = null;
                const dateString = row[headerMap["Date Enregistrement"]];
                if (dateString) {
                    registrationDate = parseDate(dateString);
                }
                
                // Normaliser le statut
                let status = row[headerMap["Statut de la vente"]] || 'Nouvelle vente';
                status = normalizeStatus(status);
                
                return {
                    id: row[headerMap["ID client"]] || '',
                    fullName: row[headerMap["Nom Complet Client"]] || '',
                    phone: row[headerMap["Numéro Contact"]] || '',
                    agency: row[headerMap["Agence"]] || '',
                    salesperson: row[headerMap["Commercial"]] || '',
                    netAmount: row[headerMap["Net à Payer (FCFA)"]] || 0,
                    status: status,
                    registrationDate: registrationDate
                };
            });
        }

        function generateStatusConfig() {
            // Collecter tous les statuts uniques des clients
            const uniqueStatuses = [...new Set(allClients.map(client => client.status))];
            availableStatuses = uniqueStatuses.sort();
            
            // Ajouter les nouveaux statuts si nécessaire
            if (!availableStatuses.includes('Commande passée')) {
                availableStatuses.push('Commande passée');
            }
            if (!availableStatuses.includes('Réceptionné')) {
                availableStatuses.push('Réceptionné');
            }
            
            // Générer la configuration dynamique
            statusConfig = availableStatuses.map(status => {
                const normalizedKey = status.toLowerCase().trim();
                
                return {
                    id: normalizedKey.replace(/[^a-z0-9]/g, '-'),
                    name: status,
                    icon: defaultStatusIcons[normalizedKey] || defaultStatusIcons.default,
                    color: normalizedKey,
                    statusValue: status
                };
            });
            
            console.log('Configuration des statuts générée:', statusConfig);
        }

        function normalizeStatus(status) {
            if (!status || status.trim() === '') {
                return 'Nouvelle vente';
            }
            
            const statusMap = {
                'nouvelle vente': 'Nouvelle vente',
                'en traitement': 'En traitement',
                'reçu boutique': 'Reçu boutique',
                'livré': 'Livré',
                'cancel': 'Cancel',
                'annulé': 'Cancel',
                'perdu': 'Cancel',
                'fr traitement': 'En traitement',
                'commande passée': 'Commande passée',
                'réceptionné': 'Réceptionné'
            };
            
            const lowerStatus = status.toLowerCase().trim();
            return statusMap[lowerStatus] || status;
        }

        function parseDate(dateString) {
            if (!dateString) return null;
            
            const dateFormats = [
                () => new Date(dateString),
                () => {
                    const parts = dateString.split('/');
                    if (parts.length === 3) {
                        return new Date(parts[2], parts[1] - 1, parts[0]);
                    }
                    return null;
                },
                () => {
                    const timestamp = parseInt(dateString);
                    if (!isNaN(timestamp)) {
                        return new Date(timestamp);
                    }
                    return null;
                }
            ];
            
            for (const format of dateFormats) {
                try {
                    const date = format();
                    if (date && !isNaN(date.getTime())) {
                        return date;
                    }
                    return null;
                } catch (e) {
                    continue;
                }
            }
            
            return null;
        }

        // ==================== STATISTIQUES DES STATUTS ====================

            const statusFilter = document.getElementById('statusFilter');

        function filterByStatus(status) {
            if (activeStatusFilter === status) {
                // Si le statut est déjà actif, on le désactive
                activeStatusFilter = null;
                document.getElementById('statusFilter').value = '';
            } else {
                // Sinon, on active le nouveau filtre
                activeStatusFilter = status;
                document.getElementById('statusFilter').value = status;
            }
            
            // Appliquer les filtres
            applyFilters();
        }

        // Fonction utilitaire pour échapper les caractères HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ==================== FONCTION SUPPRIMER UN CLIENT AVEC CONFIRMATION STYLISÉE ====================
        async function deleteClient(clientId, clientName) {
            // Utilisation de la confirmation personnalisée
            const confirmed = await confirmAction(
                `⚠️ Êtes-vous sûr de vouloir supprimer définitivement le client "${clientName}" (ID: ${clientId}) ?\n\nCette action est irréversible !`,
                'danger'
            );
            
            if (!confirmed) return;
            
            try {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) loadingOverlay.classList.add('active');
                
                const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");
                const currentDate = new Date().toISOString().split('T')[0];
                
                // Envoyer la requête de suppression à l'API
                await fetch('https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=deleteclient', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        id: clientId,
                        utilisateur: username,
                        dateSuppression: currentDate
                    })
                });
                
                // Mise à jour locale : supprimer le client des tableaux
                allClients = allClients.filter(c => c.id !== clientId);
                filteredClients = filteredClients.filter(c => c.id !== clientId);
                
                // Supprimer de la sélection si présent
                if (selectedClients.has(clientId)) {
                    selectedClients.delete(clientId);
                }
                
                // Recharger la liste et les filtres
                generateStatusConfig();
                updateAgencyFilter();
                updateStatusFilter();
                
                // Réinitialiser la pagination si nécessaire
                const totalPages = Math.ceil(filteredClients.length / clientsPerPage);
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                } else if (filteredClients.length === 0) {
                    currentPage = 1;
                }
                
                displayClients();
                updateBulkActions();
                
                showAlertMessage(`Client "${clientName}" supprimé avec succès.`, "success");
                
            } catch (error) {
                console.error("Erreur lors de la suppression:", error);
                showAlertMessage("Erreur lors de la suppression du client.", "error");
            } finally {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) loadingOverlay.classList.remove('active');
            }
        }

        function updatePaginationInfo() {
            const paginationInfo = document.getElementById('paginationInfo');
            if (!paginationInfo) return;
            
            const startIndex = (currentPage - 1) * clientsPerPage + 1;
            const endIndex = Math.min(currentPage * clientsPerPage, filteredClients.length);
            
            paginationInfo.textContent = `Affichage de ${startIndex} à ${endIndex} sur ${filteredClients.length} clients`;
        }

        function updatePaginationControls() {
            const paginationControls = document.getElementById('paginationControls');
            if (!paginationControls) return;
            
            const totalPages = Math.ceil(filteredClients.length / clientsPerPage);
            
            let controlsHTML = '';
            
            controlsHTML += `
                <button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            if (startPage > 1) {
                controlsHTML += `
                    <button class="pagination-btn" onclick="changePage(1)">1</button>
                    ${startPage > 2 ? '<span class="pagination-btn" disabled>...</span>' : ''}
                `;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                controlsHTML += `
                    <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>
                `;
            }
            
            if (endPage < totalPages) {
                controlsHTML += `
                    ${endPage < totalPages - 1 ? '<span class="pagination-btn" disabled>...</span>' : ''}
                    <button class="pagination-btn" onclick="changePage(${totalPages})">${totalPages}</button>
                `;
            }
            
            controlsHTML += `
                <button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            paginationControls.innerHTML = controlsHTML;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredClients.length / clientsPerPage);
            
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            displayClients();
            
            const tableContainer = document.querySelector('.table-container');
            if (tableContainer) {
                tableContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // ==================== FILTRES ET RECHERCHE ====================
        function setupSearchAndFilters() {
            const searchInput = document.getElementById('searchInput');
            const statusFilter = document.getElementById('statusFilter');
            const agencyFilter = document.getElementById('agencyFilter');
            
            if (searchInput) {
                searchInput.addEventListener('input', debounce(applyFilters, 300));
            }
            
            if (statusFilter) {
                statusFilter.addEventListener('change', function() {
                    activeStatusFilter = this.value || null;
                    applyFilters();
                });
            }
            
            if (agencyFilter) {
                agencyFilter.addEventListener('change', applyFilters);
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const agencyFilter = document.getElementById('agencyFilter').value;
            
            filteredClients = allClients.filter(client => {
                const matchesSearch = !searchTerm || 
                    client.fullName.toLowerCase().includes(searchTerm) ||
                    client.id.toLowerCase().includes(searchTerm) ||
                    client.phone.includes(searchTerm) ||
                    client.salesperson.toLowerCase().includes(searchTerm);
                
                const matchesStatus = !statusFilter || client.status === statusFilter;
                const matchesAgency = !agencyFilter || client.agency === agencyFilter;
                
                return matchesSearch && matchesStatus && matchesAgency;
            });
            
            currentPage = 1;
            clearSelection();
            displayClients();
        }

        function updateAgencyFilter() {
            const agencyFilter = document.getElementById('agencyFilter');
            if (!agencyFilter) return;
            
            const agencies = [...new Set(allClients.map(client => client.agency).filter(Boolean))];
            agencies.sort();
            
            let optionsHTML = '<option value="">Toutes les agences</option>';
            agencies.forEach(agency => {
                optionsHTML += `<option value="${escapeHtml(agency)}">${escapeHtml(agency)}</option>`;
            });
            
            agencyFilter.innerHTML = optionsHTML;
        }

        // ==================== GESTION DES CASES À COCHER ====================
        function toggleSelectAll(checkbox) {
            const isChecked = checkbox.checked;
            const checkboxes = document.querySelectorAll('.client-checkbox');
            
            selectedClients.clear();
            
            checkboxes.forEach(clientCheckbox => {
                clientCheckbox.checked = isChecked;
                if (isChecked) {
                    selectedClients.add(clientCheckbox.dataset.clientId);
                }
            });
            
            updateBulkActions();
        }

        function toggleClientSelection(checkbox, clientId) {
            if (checkbox.checked) {
                selectedClients.add(clientId);
            } else {
                selectedClients.delete(clientId);
            }
            
            updateSelectAllCheckbox();
            updateBulkActions();
        }

        function updateSelectAllCheckbox() {
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');
            const checkboxes = document.querySelectorAll('.client-checkbox');
            const checkedCount = document.querySelectorAll('.client-checkbox:checked').length;
            
            if (checkedCount === 0) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            } else if (checkedCount === checkboxes.length) {
                selectAllCheckbox.checked = true;
                selectAllCheckbox.indeterminate = false;
            } else {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = true;
            }
        }

        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (selectedClients.size > 0) {
                bulkActions.classList.add('show');
                selectedCount.textContent = selectedClients.size;
            } else {
                bulkActions.classList.remove('show');
            }
        }

        function clearSelection() {
            selectedClients.clear();
            const checkboxes = document.querySelectorAll('.client-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            updateSelectAllCheckbox();
            updateBulkActions();
        }

        async function fetchClientDetails(clientId) {
            const apiUrl = 'https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=dataclient';
            
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error(`Erreur HTTP: ${response.status}`);
            }
            
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.message || "Erreur du serveur");
            }
            
            const clientRow = result.data.rows.find(row => row[0] === clientId);
            if (!clientRow) {
                throw new Error("Client non trouvé");
            }
            
            const headers = result.data.headers;
            const headerMap = {};
            headers.forEach((header, index) => {
                headerMap[header] = index;
            });
            
            return {
                typeVerre: clientRow[headerMap["Type de Verre"]] || "",

        // ==================== VALIDATION DE LA COMMANDE ====================
        async function validerCommande() {
            if (!selectedFournisseur) {
                showAlertMessage("Veuillez sélectionner un fournisseur", "error");
                return;
            }
            
            // Vérifier que toutes les dates de livraison sont renseignées
            let toutesDatesRenseignees = true;
            for (const commande of commandesData) {
                if (!datesLivraison.get(commande.clientId)) {
                    toutesDatesRenseignees = false;
                    break;
                }
            }
            
            if (!toutesDatesRenseignees) {
                const confirmed = await confirmAction(
                    "Certaines dates de livraison ne sont pas renseignées. Voulez-vous continuer quand même ?",
                    'warning'
                );
                if (!confirmed) return;
            }
            
            try {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.add('active');
                }
                
                // Préparer les données pour l'API
                const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");
                const currentDate = new Date().toISOString().split('T')[0];
                
                const updates = [];
                
                for (const commande of commandesData) {
                    const client = allClients.find(c => c.id === commande.clientId);
                    
                    updates.push({
                        id: commande.clientId,
                        ancienStatut: client ? client.status : '',
                        nouveauStatut: "Commande passée",
                        dateMiseAJour: currentDate,
                        utilisateur: username,
                        fournisseur: selectedFournisseur,
                        dateLivraisonPrevue: datesLivraison.get(commande.clientId) || ''
                    });
                }
                
                // Envoyer à l'API
                await fetch('https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=addpo', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ updates })
                });
                
                // Mettre à jour les statuts localement
                updateLocalStatuses('Commande passée');
                
                // Générer et imprimer le bon de commande
                generateBonDeCommande();
                
                closeModal();
                
                showAlertMessage("Commande validée avec succès", "success");
                
            } catch (error) {
                console.error("Erreur lors de la validation de la commande:", error);
                showAlertMessage("Erreur lors de la validation de la commande", "error");
            } finally {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.remove('active');
                }
            }
        }

        // ==================== RÉCEPTION DE COMMANDE ====================
        async function markAsReceived(clientId) {
            // Utilisation de la confirmation personnalisée
            const confirmed = await confirmAction(
                "Voulez-vous marquer cette commande comme réceptionnée ?",
                'info'
            );
            
            if (!confirmed) return;
            
            try {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.add('active');
                }
                
                const client = allClients.find(c => c.id === clientId);
                const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");
                const currentDate = new Date().toISOString().split('T')[0];
                
                const updates = [{
                    id: clientId,
                    ancienStatut: client ? client.status : '',
                    nouveauStatut: "Réceptionné",
                    dateMiseAJour: currentDate,
                    utilisateur: username,
                    fournisseur: '',
                    dateLivraisonPrevue: currentDate
                }];
                
                // Envoyer à l'API
                await fetch('https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=addpo', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ updates })
                });
                
                // Mettre à jour localement
                allClients.forEach(c => {
                    if (c.id === clientId) {
                        c.status = "Réceptionné";
                    }
                });
                
                filteredClients.forEach(c => {
                    if (c.id === clientId) {
                        c.status = "Réceptionné";
                    }
                });
                
                // Mettre à jour l'affichage
                generateStatusConfig();
                displayClients();
                updateStatusFilter();
                
                showAlertMessage(`Client ${client.fullName} marqué comme réceptionné`, "success");
                
            } catch (error) {
                console.error("Erreur lors de la réception:", error);
                showAlertMessage("Erreur lors de la mise à jour du statut", "error");
            } finally {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.remove('active');
                }
            }
        }

        // ==================== FONCTIONS UTILITAIRES ====================
        function getInitials(fullName) {
            if (!fullName) return '?';
            return fullName
                .split(' ')
                .map(part => part.charAt(0))
                .join('')
                .toUpperCase()
                .substring(0, 2);
        }

        function formatPhoneNumber(phoneString) {
            if (!phoneString) return '';
            const phoneStr = String(phoneString);
            let digitsOnly = phoneStr.replace(/\D/g, '');
            if (digitsOnly.length > 10) {
                digitsOnly = digitsOnly.slice(-10);
            }
            return digitsOnly.length === 10 ? 
                digitsOnly.replace(/(\d{2})(?=\d)/g, '$1 ') : 
                phoneStr;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function closeModal() {
            const modal = document.querySelector('.modal-overlay.active');
            if (modal) {
                modal.remove();
            }
        }

                showAlertMessage("Impossible d'ouvrir la page. Contactez l'administrateur.", "error");
            }
        }

        function viewClientDetails(clientId) {
            localStorage.setItem("selectedClient", JSON.stringify([clientId]));
            window.location.href = "DetailClient.html";
        }

        function callClient(phoneNumber) {
            if (!phoneNumber) {
                showAlertMessage("Numéro de téléphone non disponible", "error");
                return;
            }
            
            const cleanedNumber = cleanPhoneNumber(phoneNumber);
            
            if (!cleanedNumber) {
                showAlertMessage("Numéro de téléphone invalide", "error");
                return;
            }
            
            customConfirm({
                title: "Appel téléphonique",
                message: `Voulez-vous appeler le numéro ${formatPhoneNumber(cleanedNumber)} ?`,
                type: "info",
                confirmText: "Appeler",
                cancelText: "Annuler"
            }).then(confirmed => {
                if (confirmed) {
                    window.location.href = `tel:${cleanedNumber}`;
                }
            });
        }

        function cleanPhoneNumber(phoneNumber) {
            if (!phoneNumber) return null;
            let digitsOnly = String(phoneNumber).replace(/\D/g, '');
            if (digitsOnly.length > 10) {
                digitsOnly = digitsOnly.slice(-10);
            }
            return digitsOnly.length === 10 ? digitsOnly : null;
        }

            loadClientsData();
            showAlertMessage("Liste des clients actualisée", "success");

                            </button>

            `;

        // ==================== MESSAGES ALERTE ====================
        function showAlertMessage(message, type) {
            const alertContainer = document.getElementById('alert-container');
            if (!alertContainer) return;
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-message alert-${type}`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i>
                <span>${escapeHtml(message)}</span>
            `;
            
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => {
                    if (alertContainer.contains(alertDiv)) {
                        alertContainer.removeChild(alertDiv);
                    }
                }, 300);
            }, 3000);
        }
    </script>
