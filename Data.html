                clientsSansType.push(client.clientName);
            }
        }
        return clientsSansType;
    }

    async function validerCommande() {
        if (!selectedFournisseur) { 
            showToast("Veuillez sélectionner un fournisseur", "error"); 
            return; 
        }
        
        const clientsSansType = verifierTypesClients();
        if (clientsSansType.length > 0) {
            const message = `Les clients suivants n'ont pas de type de commande sélectionné :\n\n${clientsSansType.join('\n')}\n\nVeuillez sélectionner un type pour chaque client.`;
            showToast(`Type manquant pour ${clientsSansType.length} client(s)`, "error");
            await customConfirm({
                title: "⚠️ Types de commande manquants",
                message: message,
                type: "warning",
                confirmText: "OK",
                cancelText: ""
            });
            return;
        }
        
        const allDates = commandesData.every(c => datesLivraison.get(c.clientId));
        if (!allDates) {
            const ok = await confirmAction("Certaines dates de livraison ne sont pas renseignées. Continuer ?", 'warning');
            if (!ok) return;
        }
        
        try {
            await loadCompanyInfo();
            showOverlay();
            const username = sessionStorage.getItem("utilisateur") || localStorage.getItem("utilisateur");
            const today = new Date().toISOString().split('T')[0];
            const updates = commandesData.map(c => ({
                id: c.clientId,
                ancienStatut: allClients.find(cl => cl.id === c.clientId)?.status || '',
                nouveauStatut: "Commande passée",
                dateMiseAJour: today,
                utilisateur: username,
                fournisseur: selectedFournisseur,
                typeCommande: typesCommandeParClient.get(c.clientId) || '',
                dateLivraisonPrevue: datesLivraison.get(c.clientId) || ''
            }));
            
            await fetch('https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=addpo', {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({updates})
            });
            
            [allClients, filteredClients].forEach(arr => arr.forEach(c => {
                if (selectedClients.has(c.id)) c.status = "Commande passée";
            }));
            
            buildStatusCards(); 
            displayClients(); 
            updateStatusFilter(); 
            clearSelection();
            generateBonDeCommande(); 
            closeModal();
            showToast("Commande validée avec succès", 'success');
        } catch (error) {
            console.error(error);
            showToast("Erreur lors de la validation", "error");
        } finally { 
            hideOverlay(); 
        }
    }

async function loadCompanyInfo() {
    try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbwdzHJGAL16KV_OnyoCIs5I7im2yNxrbEaEIbykQ8hy6ewQjJFQ0G4TfqYWWCMc7vfW/exec?action=infomonentreprise');
        const result = await response.json();
        
        if (result.success && result.data && result.data.rows) {
            const rows = result.data.rows;
            
            // Ligne 0 : Nom de l'entreprise

function formatDateForInput(dateString) {
    if (!dateString) return '';
    try {
        const date = new Date(dateString);
        if (!isNaN(date.getTime())) return date.toISOString().split('T')[0];
        const parts = dateString.split('/');
        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
    } catch (e) { /* ignore */ }
    return '';
}

function creerModalVenteAvecPreRemplissage(clientData) {
    
    if (venteModal) { venteModal.remove(); venteModal = null; }

    venteModal = document.createElement('div');
    venteModal.id        = 'newSaleModal';
    venteModal.className = 'modal-overlay';
    venteModal.innerHTML = generateSaleModalHTML();
    document.body.appendChild(venteModal);
    venteModal.classList.add('active');
    document.body.style.overflow = 'hidden';

    requestAnimationFrame(() => initSaleModalWithAllData(clientData));
}

async function loadCatalogueDataVente() {
    try {
        const response = await fetch(`${API_BASE}?action=catalogue`);
        const data     = await response.json();
        if (!data.success) return null;

        const fields = {
            entreprise:      data.data.entreprises,
            agence:          data.data.agences,
            commercial:      data.data.commerciaux,
            type_verre:      data.data.typesVerre,
            gamme_verre:     data.data.gammesVerre,
            vente_assurance: data.data.assurances,   
            vente_compagnie: data.data.compagnies,   
            clinique:        data.data.cliniques,
            ophtalmo:        data.data.ophtalmos
        };

        Object.entries(fields).forEach(([id, values]) => {
            const select = vEl(id);  
            if (select && select.tagName === 'SELECT' && Array.isArray(values)) {
                select.innerHTML = '<option value="">-- Choisir --</option>';
                values.forEach(v => {
                    if (v && typeof v === 'string') {
                        const opt = document.createElement('option');
                        opt.value = v; opt.textContent = v;
                        select.appendChild(opt);
                    }
                });
            } else {
                console.warn(`⚠️ Select #${id} introuvable dans le modal`);
            }
        });

        const sphereValues = data.data.sphere || ['0.00'];
        const axeValues    = data.data.axe    || ['0°'];
        const addValues    = data.data.add    || data.data.ajouter || ['0.00'];

        const populatePresc = (id, values) => {
            const select = vEl(id);
            if (select && select.tagName === 'SELECT') {
                select.innerHTML = '<option value="">--</option>';
                values.forEach(v => {
                    if (v && typeof v === 'string') {
                        const opt = document.createElement('option');
                        opt.value = v; opt.textContent = v;
                        select.appendChild(opt);
                    }
                });
            }
        };

        ['od_sphere','od_cylindre','og_sphere','og_cylindre'].forEach(n => populatePresc(n, sphereValues));
        ['od_axe','og_axe'].forEach(n => populatePresc(n, axeValues));
        ['od_add','og_add'].forEach(n => populatePresc(n, addValues));

        return data;
    } catch (error) {
        console.error('Erreur chargement catalogue:', error);
        return null;
    }
}

async function loadMonturesForAgenceVente(agenceValue = null) {
    const agence = agenceValue || vEl('agence')?.value;
    const select = vEl('choix_monture');
    if (!agence || !select) return null;

    select.disabled = true;
    select.innerHTML = '<option value="">-- Chargement --</option>';

    try {
        const response = await fetch(`${API_BASE}?action=stockmonture`);
        const data     = await response.json();

        if (data.success && data.data.rows) {
            select.innerHTML = '<option value="">-- Sélectionner --</option>';
            data.data.rows
                .filter(row => row[1]?.toLowerCase() === agence.toLowerCase())
                .forEach(row => {
                    const opt = document.createElement('option');
                    opt.value = row[0] || ''; opt.textContent = row[0] || '';
                    select.appendChild(opt);
                });
        } else {
            select.innerHTML = '<option value="">-- Aucune monture --</option>';
        }
    } catch (error) {
        console.error('Erreur chargement montures:', error);
        select.innerHTML = '<option value="">-- Erreur --</option>';
    } finally {
        select.disabled = false;
    }
    return select;
}

function vSetSelect(id, value) {
    const el = vEl(id);
    if (!el || !value) return;
    const norm = String(value).toLowerCase().trim();
    for (let i = 0; i < el.options.length; i++) {
        if (el.options[i].value.toLowerCase().trim() === norm ||
            el.options[i].text.toLowerCase().trim()  === norm) {
            el.value = el.options[i].value;
            return;
        }
    }
    const opt = new Option(value, value);
    el.add(opt);
    el.value = value;
}

function vSetValue(id, value) {
    const el = vEl(id);
    if (!el || value === undefined || value === null || value === '') return;
    el.value = value;
    if (el.tagName === 'SELECT') el.dispatchEvent(new Event('change', { bubbles: true }));
}

function cleanPhoneNumber(phone) {
    if (!phone) return '';
    return String(phone).replace(/\s+/g, '').replace(/^(\+?229|00229)/, '');
}

function updateStepDisplay() {
    for (let i = 1; i <= 4; i++) {
        vEl(`step-${i}`)?.classList.toggle('active', i === AppState.currentStep);
    }
    const prevBtn   = vEl('prevStepBtn');
    const nextBtn   = vEl('nextStepBtn');
    const submitBtn = vEl('submitBtn');
    if (prevBtn)   prevBtn.style.display   = AppState.currentStep > 1 ? 'block' : 'none';
    if (nextBtn)   nextBtn.style.display   = AppState.currentStep < 4 ? 'block' : 'none';
    if (submitBtn) submitBtn.style.display = AppState.currentStep === 4 ? 'block' : 'none';
}

function validateStep(step) {
    if (step === 1) {
        for (const id of ['nom_complet','numero','agence','commercial']) {
            if (!vEl(id)?.value) { showToast(`Champ obligatoire : ${id.replace(/_/g,' ')}`, 'error'); return false; }
        }
    }
    if (step === 2) {
        for (const id of ['type_verre','choix_monture']) {
            if (!vEl(id)?.value) { showToast(`Veuillez sélectionner ${id === 'type_verre' ? 'un type de verre' : 'une monture'}`, 'error'); return false; }
        }
    }
    if (step === 4) {
        for (const id of ['date_livraison','contact_livraison_type','telephone_contact','adresse_livraison']) {
            if (!vEl(id)?.value) { showToast(`Champ obligatoire : ${id.replace(/_/g,' ')}`, 'error'); return false; }
        }
    }
    return true;
}

function calculerTotalVente() {
    const getVal = (id) => parseFloat(vEl(id)?.value || '0') || 0;

    const totalBrutEl   = vEl('total_brut_display');
    const netAPayerEl   = vEl('net_a_payer_display');
    const resteAPayerEl = vEl('reste_a_payer_display');
    if (!totalBrutEl || !netAPayerEl || !resteAPayerEl) return;

    const brut         = getVal('montant_monture') + getVal('montant_verres') + getVal('frais_livraison');
    const remise       = getVal('remise');
    const remiseType   = vEl('remise_type')?.value || 'FCFA';
    const remiseVal    = remiseType === '%' ? brut * remise / 100 : remise;
    const partAssur    = getVal('part_assurance');
    const net          = Math.max(0, brut - remiseVal - partAssur);
    const reste        = Math.max(0, net - getVal('acompte'));

    totalBrutEl.textContent   = brut.toLocaleString();
    netAPayerEl.textContent   = net.toLocaleString();
    resteAPayerEl.textContent = reste.toLocaleString();
}

function toggleAssurePrincipalVente() {
    const val       = vEl('assure_principal')?.value;
    const container = vEl('assure_principal_nom_container');
    const input     = vEl('assure_principal_nom');
    if (val === 'oui' || val === 'non') {
        if (container) container.style.display = 'block';
        if (val === 'oui' && input) { input.value = vEl('nom_complet')?.value || ''; input.readOnly = true; }
        else if (input)             { input.value = ''; input.readOnly = false; }
    } else if (container) {
        container.style.display = 'none';
    }
}

function updateContactFieldsVente() {
    const type = vEl('contact_livraison_type')?.value;
    const tel  = vEl('telephone_contact');
    const addr = vEl('adresse_livraison');
    if (type === 'client') {
        const indicatif = vEl('indicatif')?.value || '';
        const numero    = vEl('numero')?.value    || '';
        if (tel)  { tel.value  = indicatif + ' ' + numero; tel.readOnly  = true; }
        const agenceText = vEl('agence')?.selectedOptions?.[0]?.text || '';
        if (addr) { addr.value = agenceText; addr.readOnly = true; }
    } else {
        if (tel)  { tel.readOnly  = false; tel.value  = ''; }
        if (addr) { addr.readOnly = false; addr.value = ''; }
    }
}

function resetSaleForm() {
    if (confirm('Réinitialiser le formulaire ?')) {
        vEl('vente-form')?.reset();
        const delivery = new Date();
        delivery.setDate(delivery.getDate() + 15);
        const dl = vEl('date_livraison');
        if (dl) dl.value = delivery.toISOString().split('T')[0];
        const cu = vEl('current_user');
        if (cu) cu.value = AppState.user.nom;
        calculerTotalVente();
        AppState.currentStep = 1;
        updateStepDisplay();
    }
}

async function submitSaleForm(clientId) {
    for (let step = 1; step <= 4; step++) {
        if (!validateStep(step)) return;
    }

    const submitBtn = vEl('submitBtn');
    if (submitBtn) { 
        submitBtn.disabled = true; 
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...'; 
    }

    const data = {};
    venteModal.querySelectorAll('#vente-form input, #vente-form select, #vente-form textarea').forEach(el => {
        if (el.name && !el.disabled && el.id !== 'indicatif') {
            data[el.name] = el.value;
        }
    });

    data.assurance = vEl('vente_assurance_input')?.style.display === 'block'
        ? vEl('vente_assurance_input')?.value || vEl('vente_assurance')?.value
        : vEl('vente_assurance')?.value || '';
    data.compagnie = vEl('vente_compagnie_input')?.style.display === 'block'
        ? vEl('vente_compagnie_input')?.value || vEl('vente_compagnie')?.value
        : vEl('vente_compagnie')?.value || '';

    ['entreprise','commercial','clinique','ophtalmo'].forEach(field => {
        const inp = vEl(field + '_input');
        if (inp?.style.display === 'block' && inp.value) data[field] = inp.value;
    });

    const indicatif = vEl('indicatif')?.value || '+229';
    const numero    = vEl('numero')?.value    || '';
    data.numero = indicatif + ' ' + numero;

    data.total_brut    = parseFloat(vEl('total_brut_display')?.textContent?.replace(/[^0-9.-]/g,'') || '0') || 0;
    data.net_a_payer   = parseFloat(vEl('net_a_payer_display')?.textContent?.replace(/[^0-9.-]/g,'') || '0') || 0;
    data.reste_a_payer = parseFloat(vEl('reste_a_payer_display')?.textContent?.replace(/[^0-9.-]/g,'') || '0') || 0;
    data.utilisateur   = AppState.user.nom;
    data.id_client     = clientId;
        try {
    await fetch(`${API_BASE}?action=updateCommandeClient`, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    // Avec no-cors, on ne peut pas lire la réponse
    // On considère que c'est réussi, c'est volontaire
    showToast('Vente modifiée avec succès !', 'success');
    setTimeout(() => fermerModalVente(), 1500);
    
} catch (error) {
    console.error('Erreur soumission:', error);
    showToast("Erreur de connexion", 'error');
    if (submitBtn) { 
        submitBtn.disabled = false; 
        submitBtn.innerHTML = '✓ Enregistrer'; 
    }
}
}

function toggleCustomInputVente(fieldName) {
    const select = vEl(fieldName);
    const input  = vEl(fieldName + '_input');
    const button = event.currentTarget;
    if (!select || !input || !button) return;

    if (input.style.display === 'none' || input.style.display === '') {
        select.style.display = 'none';
        input.style.display  = 'block';
        input.value = '';
        button.innerHTML = '<i class="fas fa-list"></i> Choisir existant';
    } else {
        select.style.display = 'block';
        input.style.display  = 'none';
        button.innerHTML = '<i class="fas fa-plus"></i> Ajouter nouveau';
        if (input.value?.trim() && select.tagName === 'SELECT') {
            let exists = false;
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].text === input.value.trim()) { exists = true; break; }
            }
            if (!exists) select.appendChild(new Option(input.value.trim(), input.value.trim()));
            select.value = input.value.trim();
        }
    }
}
